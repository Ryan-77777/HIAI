        };
        const headerStyle = {
          display: "flex",
          alignItems: "center",
          gap: v.headerGap,
        };
        const titleStyle = {
          fontSize: v.titleFontSize,
          fontWeight: v.titleFontWeight,
          color: v.textMain,
          flex: 1,
          overflow: "hidden",
          textOverflow: "ellipsis",
          whiteSpace: "nowrap",
        };
        const shimBarStyle = {
          height: 12,
          borderRadius: v.shimmerRadius,
          background: `linear-gradient(90deg,${v.shimmerBase} 25%,rgba(255,255,255,0.70) 50%,${v.shimmerBase} 75%)`,
          backgroundSize: "200% 100%",
          animation: `sandboxShimmer ${v.shimmerDuration}s ease-in-out infinite`,
        };

        if (scenario === "loading") {
          return (
            <div style={outerStyle}>
              <div style={headerStyle}>
                <img src="./summary-icon.png" width={v.iconSize} height={v.iconSize} alt="" />
                <div style={{ ...shimBarStyle, flex: 1, height: 12, animationDelay: "0s" }} />
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: v.bodyGap }}>
                {[100, 78, 55].map((w, i) => (
                  <div key={i} style={{ ...shimBarStyle, width: `${w}%`, animationDelay: `${(i + 1) * 0.18}s` }} />
                ))}
              </div>
            </div>
          );
        }

        if (scenario === "error") {
          return (
            <div style={outerStyle}>
              <div style={headerStyle}>
                <img src="./summary-icon.png" width={v.iconSize} height={v.iconSize} alt="" />
                <span style={{ ...titleStyle, color: "#f74331" }}>获取摘要失败</span>
              </div>
              <div style={{ fontSize: v.bodyFontSize, color: v.textSub, lineHeight: "1.5" }}>
                服务暂时不可用，请刷新重试
              </div>
            </div>
          );
        }

        if (scenario === "empty") {
          return (
            <div style={outerStyle}>
              <div style={headerStyle}>
                <img src="./summary-icon.png" width={v.iconSize} height={v.iconSize} alt="" />
                <span style={titleStyle}>暂无摘要</span>
              </div>
              <div style={{ fontSize: v.bodyFontSize, color: v.textSub }}>
                当前工单内容较少，无法生成摘要
              </div>
            </div>
          );
        }

        // ready state
        const bodyPs = [
          "上次进线：视频内容被标记为违规，申请复审。希望将视频内容与抖音平台政策进行对照并确认是否违规。",
          "本次进线：账号被封禁，非本人操作申诉未通过，想解除个人信息认证；诉求注销或释放账号；服务方案请用户提供对应页面截图，告知多种客服联系途径。",
        ];
        const tags = [
          { label: "外溢风险", bg: v.tagPinkBg, fg: v.tagPinkFg },
          { label: "已签收",   bg: v.tagTealBg, fg: v.tagTealFg },
          { label: "已赔付 ¥5", bg: v.tagVioletBg, fg: v.tagVioletFg },
        ];
        return (
          <div style={outerStyle}>
            <div style={headerStyle}>
              <img src="./summary-icon.png" width={v.iconSize} height={v.iconSize} alt="" />
              <span style={titleStyle}>智能摘要</span>
              <span style={{ fontSize: 10, color: v.textSub, whiteSpace: "nowrap" }}>03-30 12:00</span>
              <span style={{ fontSize: 14, color: v.textSub, cursor: "pointer" }}>∧</span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: v.bodyGap }}>
              {bodyPs.map((p, i) => (
                <p key={i} style={{ margin: 0, fontSize: v.bodyFontSize, lineHeight: "16px", color: v.textMain }}>
                  {p}
                </p>
              ))}
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
              {tags.map((tag, i) => (
                <span key={i} style={{
                  fontSize: 12, lineHeight: "16px",
                  padding: "2px 8px", borderRadius: 3,
                  background: tag.bg, color: tag.fg,
                }}>
                  {tag.label}
                </span>
              ))}
            </div>
          </div>
        );
      }

      function SpecFormRecommend({ v, scenario }) {
        const FF = '"PingFang SC",-apple-system,sans-serif';
        const recos = scenario === "single"
          ? ["视频被误判违规，申诉未通过"]
          : scenario === "multi"
          ? ["账号无法登录，验证码一直失败", "申诉入口找不到，页面一直跳转", "订单退款失败，进度长时间卡住"]
          : [];

        return (
          <div style={{ display: "flex", flexDirection: "column", gap: v.gapOuter, fontFamily: FF, width: "100%" }}>
            {/* Title row */}
            <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <span style={{ fontSize: v.titleFontSize, fontWeight: v.titleFontWeight, color: v.titleColor }}>
                问题描述
              </span>
              <span style={{ padding: "0 4px", borderRadius: 3, backgroundImage: v.aiBadgeBg }}>
                <span style={{ fontSize: 12, fontWeight: 600, backgroundImage: v.aiBadgeTextGrad,
                  WebkitBackgroundClip: "text", color: "transparent", backgroundClip: "text" }}>
                  AI
                </span>
              </span>
            </div>
            {/* Input */}
            <div style={{
              width: "100%", boxSizing: "border-box",
              padding: `${v.inputPadY}px ${v.inputPadX}px`,
              borderRadius: v.inputRadiusPx,
              border: `1px solid ${v.inputBorder}`,
              background: v.inputBg,
              fontSize: v.placeholderSize,
              color: v.placeholderColor,
            }}>
              请输入用户问题…
            </div>
            {/* Loading stripe */}
            {scenario === "loading" && (
              <div style={{
                height: v.recoBarHeight,
                borderRadius: v.recoBarRadius,
                background: "linear-gradient(90deg,rgba(77,212,180,0.10) 0%,rgba(103,216,231,0.14) 15%,rgba(108,147,239,0.14) 35%,rgba(170,120,243,0.13) 55%,rgba(231,140,225,0.11) 72%,rgba(170,120,243,0.13) 85%,rgba(77,212,180,0.10) 100%)",
                backgroundSize: "300% 100%",
                animation: "sandboxStripeFlow 3s ease-in-out infinite",
              }} />
            )}
            {/* Recommend list */}
            {recos.length > 0 && (
              <div style={{
                borderRadius: v.recoWrapRadius, padding: v.recoWrapPad,
                display: "flex", flexDirection: "column", gap: v.recoWrapGap,
                backgroundImage: "linear-gradient(135deg,rgba(63,226,213,0.06),rgba(122,97,250,0.06))",
              }}>
                {recos.map((txt, i) => (
                  <div key={i} style={{
                    padding: `${v.recoItemPadY}px ${v.recoItemPadX}px`,
                    borderRadius: v.recoItemRadius,
                    fontSize: v.recoItemFontSize,
                    lineHeight: `${v.recoItemLineH}px`,
                    color: v.recoItemColor,
                    cursor: "pointer",
                  }}
                    onMouseEnter={e => e.currentTarget.style.background = v.recoItemBgHover}
                    onMouseLeave={e => e.currentTarget.style.background = ""}
                  >
                    {txt}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      function SpecAiInput({ v, scenario }) {
        const FF = '"PingFang SC",-apple-system,sans-serif';
        const recos = scenario === "single"
          ? ["理解您的心情～麻烦您提供下相关页面截图/提示文案，我们这边马上帮您核实处理～（已结合您当前对话内容生成）"]
          : scenario === "multi"
          ? [
              "理解您的心情～麻烦您提供下相关页面截图，我们马上帮您核实处理～（已结合您当前对话内容生成）",
              "收到～为更快定位问题，辛苦您补充下账号ID与截图，我们会第一时间核实～（已结合您当前对话内容生成）",
              "了解～我先帮您记录诉求并核实风控原因；如需人工复核会同步您操作路径～（已结合您当前对话内容生成）",
            ]
          : [];

        return (
          <div style={{
            borderRadius: v.outerRadius, padding: v.outerPadding, gap: v.outerGap,
            background: v.outerBg, fontFamily: FF, width: "100%", boxSizing: "border-box",
            display: "flex", flexDirection: "column", position: "relative", overflow: "hidden",
          }}>
            {/* Status row */}
            <div style={{ fontSize: v.statusFontSize, color: v.statusColor, padding: "4px 8px" }}>
              已回复用户，等待用户新消息
            </div>

            {/* Input card */}
            <div style={{
              borderRadius: v.cardRadius, background: v.cardBg,
              border: `1px solid ${v.cardBorder}`, padding: v.cardPad,
              display: "flex", flexDirection: "column", gap: 12,
              boxShadow: "0 0 0 1px rgba(45,66,107,0.08)",
            }}>
              {/* Reply recommend */}
              {recos.length > 0 && (
                <div style={{
                  background: v.recoOuterBg, borderRadius: v.recoOuterRadius,
                  padding: v.recoOuterPad, display: "flex", flexDirection: "column", gap: 6,
                }}>
                  <div style={{ display: "flex", alignItems: "center" }}>
                    <span style={{
                      fontSize: 13, fontWeight: 600,
                      backgroundImage: v.recoTitleGrad,
                      WebkitBackgroundClip: "text", color: "transparent", backgroundClip: "text",
                    }}>
                      回复推荐
                    </span>
                    <span style={{ marginLeft: "auto", fontSize: 14, color: "rgba(34,39,39,0.4)", cursor: "pointer" }}>×</span>
                  </div>
                  {recos.map((txt, i) => (
                    <div key={i} style={{
                      fontSize: v.recoItemFontSize, lineHeight: `${v.recoItemLineH}px`,
                      color: v.recoItemColor, padding: "6px 8px", borderRadius: 6,
                      cursor: "pointer",
                    }}
                      onMouseEnter={e => e.currentTarget.style.background = v.hoverFill}
                      onMouseLeave={e => e.currentTarget.style.background = ""}
                    >{txt}</div>
                  ))}
                </div>
              )}

              {/* Text area */}
              <div style={{
                fontSize: v.textFontSize, lineHeight: `${v.textLineHeight}px`,
                color: v.textColorPH, minHeight: v.textLineHeight * 2,
              }}>
                托管中
              </div>

              {/* Actions */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div style={{ display: "flex", gap: 4 }}>
                  {["✨", "😊", "🖼", "U", "B", "≡₁", "≡", "🔗", "🎨"].map((ic, i) => (
                    <span key={i} style={{ fontSize: 13, width: v.iconSize, height: v.iconSize, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>{ic}</span>
                  ))}
                </div>
                <div style={{
                  height: v.sendBtnHeight, padding: `0 ${v.cardPad}px`,
                  borderRadius: v.sendBtnRadius,
                  background: v.sendBtnBgDis,
                  display: "flex", alignItems: "center",
                  fontSize: 14, color: "rgba(34,39,39,0.4)",
                }}>
                  ➤
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ─── Sandbox Modal (markdown-driven) ──────────────────────────────────────
      function SandboxModal({ componentId, mdText, onClose }) {
        const defaultTab =
          componentId === "smartSummary"  ? "ready"  :
          componentId === "formRecommend" ? "multi"  : "single";
        const [activeTab, setActiveTab] = React.useState(defaultTab);

        const v = React.useMemo(
          () => parseMdDesignValues(mdText, componentId),
          [mdText, componentId],
        );

        const scenarios =
          componentId === "smartSummary"
            ? [{ id: "ready", label: "正常态" }, { id: "loading", label: "加载中" },
               { id: "error", label: "错误态" }, { id: "empty",   label: "空态"   }]
            : componentId === "formRecommend"
            ? [{ id: "loading", label: "加载中" }, { id: "single", label: "单条推荐" },
               { id: "multi",   label: "多条推荐" }]
            : [{ id: "off", label: "无推荐" }, { id: "single", label: "单条推荐" },
               { id: "multi", label: "多条推荐" }];

        const checks = React.useMemo(() => {
          if (componentId === "smartSummary") return [
            { id: "r1",  label: "外卡片圆角 = 12px",            pass: v.outerRadius === 12 },
            { id: "r2",  label: "外卡片内边距 = 12px",          pass: v.outerPadding === 12 },
            { id: "r3",  label: "标题字号 = 12px",              pass: v.titleFontSize === 12 },
            { id: "r4",  label: "外层 gap ∈ [4,8,12,16]px",    pass: [4,8,12,16].includes(v.gapOuter) },
            { id: "r5",  label: "Shimmer 时长已在 Skill 中定义", pass: v.shimmerDuration > 0 },
            { id: "r6",  label: "焦点环颜色已定义",             pass: Boolean(v.focusRing) },
            { id: "r7",  label: "Shimmer 底色已定义",           pass: Boolean(v.shimmerBase) },
            { id: "r8",  label: "正文颜色已定义且非纯黑",        pass: Boolean(v.textMain) && v.textMain !== "#000000" },
            { id: "r9",  label: "Logo 图标尺寸 = 16px",         pass: v.iconSize === 16 },
            { id: "r10", label: "悬停填充色已定义",             pass: Boolean(v.hoverFill) },
          ];
          if (componentId === "formRecommend") return [
            { id: "r1",  label: "标题字号已在 Skill 中定义",     pass: v.titleFontSize > 0 },
            { id: "r2",  label: "输入框圆角 ∈ [4,8,12,16]px",   pass: [4,8,12,16].includes(v.inputRadiusPx) },
            { id: "r3",  label: "推荐条高度已定义",              pass: v.recoBarHeight > 0 },
            { id: "r4",  label: "焦点环颜色已定义",             pass: Boolean(v.focusRing) },
            { id: "r5",  label: "外层 gap 已定义",              pass: v.gapOuter > 0 },
            { id: "r6",  label: "AI 徽章背景渐变已定义",         pass: Boolean(v.aiBadgeBg) },
            { id: "r7",  label: "占位符颜色已定义且非纯黑",      pass: Boolean(v.placeholderColor) && v.placeholderColor !== "#000000" },
            { id: "r8",  label: "推荐项选中背景已定义",          pass: Boolean(v.recoItemBgSel) },
            { id: "r9",  label: "推荐列表圆角 ∈ [4,8,12,16]px", pass: [4,8,12,16].includes(v.recoWrapRadius) },
            { id: "r10", label: "推荐条圆角 > 0",               pass: v.recoBarRadius > 0 },
          ];
          return [
            { id: "r1",  label: "外层圆角 = 12px",              pass: v.outerRadius === 12 },
            { id: "r2",  label: "外层内边距 = 12px",            pass: v.outerPadding === 12 },
            { id: "r3",  label: "输入卡片圆角 ≥ 8px",           pass: v.cardRadius >= 8 },
            { id: "r4",  label: "图标尺寸 = 16px",              pass: v.iconSize === 16 },
            { id: "r5",  label: "发送按钮高度已定义",            pass: v.sendBtnHeight > 0 },
            { id: "r6",  label: "焦点环颜色已定义",             pass: Boolean(v.focusRing) },
            { id: "r7",  label: "推荐标题渐变已定义",           pass: Boolean(v.recoTitleGrad) },
            { id: "r8",  label: "动效透明度 ∈ [0,1]",           pass: v.motionOpacity >= 0 && v.motionOpacity <= 1 },
            { id: "r9",  label: "外层背景色已定义",             pass: Boolean(v.outerBg) },
            { id: "r10", label: "输入卡片背景色已定义",          pass: Boolean(v.cardBg) },
          ];
        }, [componentId, v]);

        const passCount = checks.filter(c => c.pass).length;
        const allPass   = passCount === checks.length;

        function renderPreview() {
          if (componentId === "smartSummary")  return <SpecSmartSummary v={v} scenario={activeTab} />;
          if (componentId === "formRecommend") return <SpecFormRecommend v={v} scenario={activeTab} />;
          return <SpecAiInput v={v} scenario={activeTab} />;
        }

        const compLabel =
          componentId === "smartSummary"  ? "智能摘要组件面板" :
          componentId === "formRecommend" ? "表单推荐" : "AI 输入框";

        return (
          <div
            className="fixed inset-0 flex items-center justify-center"
            style={{ zIndex: 9999, background: "rgba(34,39,39,0.52)", backdropFilter: "blur(4px)" }}
            onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}
          >
            <style>{`
              @keyframes sandboxShimmer {
                0%   { background-position: 200% center; }
                100% { background-position: -200% center; }
              }
              @keyframes sandboxStripeFlow {
                0%, 100% { background-position: 0%   50%; }
                50%      { background-position: 100% 50%; }
              }
            `}</style>
            <div
              className="bg-[#ffffff] rounded-[16px] flex flex-col overflow-hidden"
              style={{
                width: "min(980px, 95vw)", height: "min(740px, 93vh)",
                boxShadow: "0 32px 80px rgba(34,39,39,0.22), 0 0 0 1px rgba(45,66,107,0.10)",
              }}
            >
              {/* Header */}
              <div className="flex items-center justify-between px-[24px] py-[16px] border-b border-[rgba(45,66,107,0.12)] shrink-0">
                <div className="flex flex-col gap-[3px]">
                  <div className="flex items-center gap-[10px]">
                    <span className="text-[15px] font-bold text-[#222727]">🧪 沙盒测试</span>
                    <span className={cx(
                      "px-[8px] py-[2px] rounded-[99px] text-[11px] font-semibold",
                      allPass ? "bg-[rgba(0,0,0,0.07)] text-black" : "bg-[rgba(233,30,99,0.10)] text-[#c0174a]",
                    )}>
                      {passCount} / {checks.length} 项通过
                    </span>
                    <span className="text-[12px] text-[rgba(34,39,39,0.45)]">— {compLabel}</span>
                  </div>
                  <div className="text-[12px] text-[rgba(34,39,39,0.45)]">
                    仅读取 Design Skill Markdown 中的约束值，模拟 LLM 阅读 Skill 后生成的真实 UI 效果
                  </div>
                </div>
                <button
                  type="button"
                  className="flex items-center justify-center w-[30px] h-[30px] rounded-[8px] hover:bg-[rgba(83,96,143,0.09)] text-[rgba(34,39,39,0.4)] text-[20px] font-light outline-none focus:ring-1 focus:ring-black"
                  onClick={onClose} aria-label="关闭沙盒"
                >×</button>
              </div>

              {/* Body */}
              <div className="flex flex-1 overflow-hidden">
                {/* Left: Spec-driven preview */}
                <div className="flex-1 flex flex-col overflow-hidden border-r border-[rgba(45,66,107,0.10)]">
                  <div className="flex items-center gap-[4px] px-[16px] py-[10px] border-b border-[rgba(45,66,107,0.08)] shrink-0" style={{ background: "rgba(83,96,143,0.025)" }}>
                    <span className="text-[11px] font-semibold text-[rgba(34,39,39,0.4)] mr-[6px]">数据场景</span>
                    {scenarios.map(s => (
                      <button
                        key={s.id} type="button"
                        className={cx(
                          "px-[10px] h-[26px] rounded-[6px] text-[12px] font-medium transition-colors outline-none focus:ring-1 focus:ring-black",
                          activeTab === s.id ? "bg-black text-[#ffffff]" : "text-[rgba(34,39,39,0.65)] hover:bg-[rgba(83,96,143,0.08)]",
                        )}
                        onClick={() => setActiveTab(s.id)}
                      >{s.label}</button>
                    ))}
                  </div>
                  <div className="flex-1 overflow-auto p-[28px]" style={{ background: "rgba(83,96,143,0.025)" }}>
                    <div className="max-w-[500px] mx-auto">
                      <div className="flex items-center gap-[6px] mb-[14px]">
                        <div className="w-[6px] h-[6px] rounded-full" style={{ background: "#000000" }} />
                        <span className="text-[11px] text-[rgba(34,39,39,0.4)] font-medium tracking-wide">
                          Skill 驱动生成 · {scenarios.find(s => s.id === activeTab)?.label}
                        </span>
                      </div>
                      {renderPreview()}
                    </div>
                  </div>
                </div>

                {/* Right: Validation checklist */}
                <div className="w-[268px] flex flex-col overflow-hidden shrink-0">
                  <div className="px-[16px] py-[10px] border-b border-[rgba(45,66,107,0.08)] shrink-0" style={{ background: "rgba(83,96,143,0.025)" }}>
                    <span className="text-[11px] font-semibold text-[rgba(34,39,39,0.4)] tracking-wide">SKILL 内容校验</span>
                  </div>
                  <div className="flex-1 overflow-auto p-[12px] flex flex-col gap-[4px]">
                    {checks.map(check => (
                      <div
                        key={check.id}
                        className={cx(
                          "flex items-start gap-[8px] px-[10px] py-[8px] rounded-[8px]",
                          check.pass ? "bg-[rgba(0,0,0,0.04)]" : "bg-[rgba(233,30,99,0.07)]",
                        )}
                      >
                        <span className="shrink-0 text-[13px] leading-[18px]">{check.pass ? "✅" : "❌"}</span>
                        <span className={cx("text-[12px] leading-[18px]", check.pass ? "text-[rgba(34,39,39,0.7)]" : "text-[#c0174a]")}>
                          {check.label}
                        </span>
                      </div>
                    ))}
                  </div>
                  <div className={cx(
                    "px-[16px] py-[13px] border-t border-[rgba(45,66,107,0.12)] shrink-0",
                    allPass ? "bg-[rgba(0,0,0,0.04)]" : "bg-[rgba(233,30,99,0.05)]",
                  )}>
                    <div className={cx("text-[12px] font-semibold", allPass ? "text-black" : "text-[#c0174a]")}>
                      {allPass ? "✅ Skill 约束完整，可安全交付 AI 使用" : `❌ Skill 中有 ${checks.length - passCount} 项约束缺失或异常`}
                    </div>
                    <div className="text-[11px] text-[rgba(34,39,39,0.45)] mt-[3px]">
                      {allPass ? "所有设计约束均已在 Markdown 中明确定义" : "请在左侧 Token 面板调整对应参数，Skill 将同步更新"}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────────────────

      ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
    </script>
  </body>
</html>
