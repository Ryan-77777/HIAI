                >
                  {label}
                </p>
              </div>
              <div
                className={cx("flex items-center px-[4px] relative shrink-0", `rounded-[${t.aiBadgeRadiusPx}px]`, hl("aiBadge"))}
                style={{ backgroundImage: t.aiBadgeBg }}
              >
                <p
                  className={cx(
                    "bg-clip-text text-[transparent] whitespace-nowrap",
                    `text-[${t.aiBadgeTextSizePx}px] leading-[${t.aiBadgeTextLineHeightPx}px] font-semibold`,
                  )}
                  style={{ backgroundImage: t.aiBadgeTextGradient, WebkitBackgroundClip: "text" }}
                >
                  AI
                </p>
              </div>
            </div>

            {/* Input + optional refresh button */}
            <div
              className={cx("w-full relative", hl("inputWrap"))}
              onMouseEnter={() => setInputHovered(true)}
              onMouseLeave={() => setInputHovered(false)}
            >
              <div
                className={cx(
                  cx(
                    "w-full flex justify-between border border-solid outline-none",
                    value ? "items-start" : "items-center",
                  ),
                  `pl-[${t.inputPadX}px] pr-[${t.inputRightPadX}px] py-[${t.inputPadY}px] rounded-[${t.inputRadiusPx}px]`,
                  "focus-within:ring-1",
                  `focus-within:ring-[${t.focusRing}]`,
                  !disabled && `hover:bg-[${t.hoverFill}]`,
                  hl("input"),
                )}
                style={{ backgroundColor: t.inputBg, borderColor: t.inputBorder }}
                aria-disabled={disabled ? "true" : "false"}
              >
                <div className={cx("flex-1 flex", value ? "items-start" : "items-center", `gap-[${t.inputContentGapPx}px]`)}>
                  <p
                    className={cx(
                      `text-[${t.placeholderFontSizePx}px] leading-[${t.placeholderLineHeightPx}px]`,
                      value ? `text-[${t.valueColor}]` : `text-[${t.placeholderColor}]`,
                      value ? "whitespace-pre-wrap break-words" : "whitespace-nowrap overflow-hidden text-ellipsis",
                    )}
                  >
                    {value || placeholder}
                  </p>
                </div>
                <div className={cx("shrink-0", `size-[16px]`)} />
              </div>

              {/* Hover 时始终显示【刷新推荐】按钮，不论是否已采纳推荐 */}
              {inputHovered && !disabled && (
                <button
                  onClick={handleRefresh}
                  title="刷新推荐"
                  aria-label="刷新推荐"
                  style={{
                    position: "absolute",
                    right: 6,
                    top: "50%",
                    transform: "translateY(-50%)",
                    background: "#ffffff",
                    border: "1px solid rgba(34,39,39,0.09)",
                    borderRadius: 6,
                    padding: 4,
                    cursor: refreshing ? "not-allowed" : "pointer",
                    boxShadow: "0 2px 8px rgba(31,69,77,0.05), 0 2px 4px rgba(31,69,77,0.04), 0 1px 2px rgba(31,69,77,0.04)",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    zIndex: 2,
                    transition: "box-shadow 0.15s, opacity 0.15s",
                    opacity: refreshing ? 0.5 : 1,
                  }}
                  onMouseEnter={e => { if (!refreshing) e.currentTarget.style.boxShadow = "0 4px 12px rgba(31,69,77,0.10), 0 2px 6px rgba(31,69,77,0.07), 0 1px 2px rgba(31,69,77,0.05)"; }}
                  onMouseLeave={e => { e.currentTarget.style.boxShadow = "0 2px 8px rgba(31,69,77,0.05), 0 2px 4px rgba(31,69,77,0.04), 0 1px 2px rgba(31,69,77,0.04)"; }}
                >
                  <span
                    className="inline-flex"
                    style={{ animation: refreshing ? "spin 0.8s linear infinite" : "none" }}
                    aria-hidden="true"
                  >
                    {renderIconFromLibrary({
                      name: "refresh",
                      size: 16,
                      fallbackUrl: hiaiSvgUrl("refresh-ccw-02-stroked.svg"),
                      fallbackInset: "inset-[8.33%_8.33%_8.33%_4.17%]",
                    })}
                  </span>
                </button>
              )}
            </div>

            {/* Loading stripe (only when loading & has recommend) */}
            {showStripe ? (
              <div
                className={cx(
                  "w-full shrink-0",
                  `h-[${t.recommendBarHeightPx}px] rounded-[${t.recommendBarRadiusPx}px]`,
                  hl("recommendBar"),
                )}
                style={{
                  background: "linear-gradient(90deg,rgba(77,212,180,0.10) 0%,rgba(103,216,231,0.14) 15%,rgba(108,147,239,0.14) 35%,rgba(170,120,243,0.13) 55%,rgba(231,140,225,0.11) 72%,rgba(170,120,243,0.13) 85%,rgba(77,212,180,0.10) 100%)",
                  backgroundSize: "300% 100%",
                  animation: `aiStripeFlow ${t.stripeAnimDurationSec * 2.5}s ease-in-out infinite`,
                }}
                aria-label="AI 推荐加载中"
              />
            ) : null}

            {/* Recommend list (below) */}
            {showList ? (
              <div
                className={cx(
                  "w-full flex flex-col items-start",
                  `rounded-[${t.recommendWrapRadiusPx}px] p-[${t.recommendWrapPadPx}px]`,
                  `gap-[${t.recommendWrapGapPx}px]`,
                  hl("recommendList"),
                  disabled && "opacity-70",
                )}
                style={{ backgroundImage: t.recommendWrapBg }}
                role="listbox"
                aria-label="AI 推荐内容"
              >
                {(recommendItems || []).slice(0, 3).map((txt, idx) => {
                  const isSel = idx === selectedIdx;
                  const isHover = idx === hoverIdx && !isSel;
                  return (
                    <button
                      key={idx}
                      type="button"
                      className={cx(
                        cx("w-full text-left flex", isHover ? "items-start" : "items-center"),
                        `px-[${t.recommendItemPadX}px] py-[${t.recommendItemPadY}px] rounded-[${t.recommendItemRadiusPx}px]`,
                        "outline-none focus:ring-1",
                        `focus:ring-[${t.focusRing}]`,
                      )}
                      style={
                        isSel
                          ? { backgroundImage: t.recommendItemBgSelected }
                          : isHover
                            ? { backgroundImage: t.recommendItemBgHover }
                            : undefined
                      }
                      onClick={() => adopt(idx)}
                      onMouseEnter={() => setHoverIdx(idx)}
                      onMouseLeave={() => setHoverIdx(-1)}
                      disabled={disabled}
                      aria-selected={isSel ? "true" : "false"}
                    >
                      <div
                        className={cx(
                          cx(
                            "flex-1",
                            isHover ? "whitespace-normal break-words" : "overflow-hidden text-ellipsis whitespace-nowrap",
                          ),
                          `text-[${t.recommendItemTextSizePx}px] leading-[${t.recommendItemLineHeightPx}px]`,
                        )}
                        style={{
                          color: isSel
                            ? t.recommendItemTextColorSelected
                            : isHover
                              ? t.recommendItemTextColorHover
                              : t.recommendItemTextColor,
                        }}
                      >
                        {txt}
                      </div>
                    </button>
                  );
                })}
              </div>
            ) : null}
          </div>
        );
      }

      function AiInputBox({
        statusText = "已回复用户，等待用户新消息",
        placeholder = "托管中",
        value = "",
        onChangeValue,
        replyRecommendMode = "single", // off | single | multi
        replyRecommendClick = "adopt", // adopt | send
        replyRecommendHideAfterPick = true,
        highlightTarget,
        tokens,
      }) {
        const t = tokens || AI_INPUT_TOKENS;
        const sendIconLibName = t.sendIconName || t.iconRecoSendName || "hiai-send";
        const hl = (key) =>
          highlightTarget === key ? `ring-2 ring-[${t.focusRing}] ring-offset-2 ring-offset-[rgba(255,255,255,0.75)]` : "";

        const isEmpty = !String(value || "").trim();
        const sendDisabled = isEmpty;
        const [recoDismissed, setRecoDismissed] = useState(false);
        const [recoHoverTipIndex, setRecoHoverTipIndex] = useState(null);
        const [toast, setToast] = useState(null);

        useEffect(() => {
          setRecoDismissed(false);
          setRecoHoverTipIndex(null);
        }, [replyRecommendMode, replyRecommendClick, replyRecommendHideAfterPick]);

        function buildReplyRecommendations() {
          const topic = String(value || "").trim();
          // 动态：基于聊天上下文/输入内容生成（示例仅用于演示布局密度）
          const base =
            topic ||
            "用户反馈账号突然被封禁，提示存在异常风险；希望尽快恢复登录与发布权限，并确认如何避免再次触发风控。";

          const one =
            "理解您的心情～麻烦您提供下相关页面截图/提示文案，我们这边马上帮您核实处理；若系统误判会尽快协助恢复～";
          const two =
            "收到～为更快定位问题，辛苦您补充下账号ID与提示页面截图，我们会第一时间核实；期间建议先按页面指引完成安全校验～";
          const three =
            "了解～我先帮您记录诉求并核实风控原因；后续如需人工复核会同步您操作路径与预计时效，您看方便提供下截图吗？";

          // 让推荐更贴合上下文（轻量拼接，不改变布局）
          const ctxHint = base.length > 24 ? "（已结合您当前对话内容生成）" : "";
          const r1 = `${one}${ctxHint}`;
          const r2 = `${two}${ctxHint}`;
          const r3 = `${three}${ctxHint}`;

          return replyRecommendMode === "single" ? [r1] : [r1, r2, r3];
        }

        const showReco = replyRecommendMode !== "off" && !recoDismissed;
        const recos = useMemo(() => (showReco ? buildReplyRecommendations() : []), [showReco, replyRecommendMode, value]);

        function showToast(message) {
          setToast(message);
          window.clearTimeout(showToast._t);
          showToast._t = window.setTimeout(() => setToast(null), 1400);
        }

        function IconBtn({ iconName, fallbackSrc, label, tokenKey, fallbackInsetCls }) {
          return (
            <button
              type="button"
              className={cx(
                "shrink-0",
                `p-[${t.iconBtnPadPx}px] rounded-[${t.iconBtnRadiusPx}px]`,
                !sendDisabled && `hover:bg-[${t.hoverFill}]`,
                hl(tokenKey || "iconButton"),
              )}
              aria-label={label}
            >
              {renderIconFromLibrary({
                name: iconName,
                size: t.iconSizePx,
                fallbackUrl: fallbackSrc,
                fallbackInset: fallbackInsetCls,
              })}
            </button>
          );
        }

        return (
          <div
            className={cx(
              "w-full relative overflow-hidden flex flex-col items-start",
              `rounded-[${t.outerRadiusPx}px] p-[${t.outerPadPx}px]`,
              `gap-[${t.outerGapPx}px]`,
              hl("outerShell"),
            )}
            style={{ backgroundColor: t.outerBg, fontFamily: t.fontFamily }}
          >
            {/* Motion overlay (MUST be bottom-most layer) */}
            <div
              className={cx("absolute bottom-0", hl("motionLayer"))}
              style={{
                height: t.motionHeightPx,
                left: `${t.motionInsetXPercentLeft}%`,
                right: `${t.motionInsetXPercentRight}%`,
                opacity: t.motionOpacity,
                pointerEvents: "none",
                zIndex: 0,
              }}
              aria-hidden="true"
            >
              <div
                className="absolute inset-[-75%_-6.94%] will-change-[background-position]"
                style={{
                  backgroundImage: `url(${AI_INPUT_ASSETS.motionPng})`,
                  backgroundRepeat: "no-repeat",
                  backgroundPosition: "0% 50%",
                  // 放大纹理以产生更强烈的左右色彩流动感
                  backgroundSize: "140% 140%",
                  animation: `aiStripeMove ${t.motionDurationMs}ms linear ${t.motionDelayMs}ms infinite alternate`,
                }}
              >
              </div>
            </div>

            {/* Status row */}
            <div
              className={cx(
                "w-full flex items-center relative",
                `px-[${t.statusPadX}px] py-[${t.statusPadY}px]`,
                hl("statusRow"),
              )}
              style={{ zIndex: 10 }}
            >
              <p className={cx("flex-1 min-w-0", `text-[${t.statusFontSizePx}px] leading-[${t.statusLineHeightPx}px]`, hl("statusText"))} style={{ color: t.statusColor }}>
                {statusText}
              </p>
            </div>

            {/* Input card */}
            <div
              className={cx(
                "w-full flex flex-col items-center border border-solid overflow-hidden relative",
                `p-[${t.cardPadPx}px] rounded-[${t.cardRadiusPx}px]`,
                `gap-[${t.cardGapPx}px]`,
                hl("inputCard"),
              )}
              style={{ backgroundColor: t.cardBg, borderColor: t.cardBorder, borderWidth: t.cardBorderWidthPx, zIndex: 10 }}
            >
              {/* Reply recommend / 话术推荐 */}
              {showReco ? (
                <div
                  className={cx(
                    "w-full flex flex-col items-start justify-end",
                    `p-[${t.recoOuterPadPx}px] rounded-[${t.recoOuterRadiusPx}px]`,
                    `gap-[${t.recoOuterGapPx}px]`,
                    hl("replyRecommend"),
                  )}
                  style={{ backgroundColor: t.recoOuterBg }}
                >
                  <div
                    className={cx(
                      "w-full flex items-center",
                      `h-[${t.recoHeaderHeightPx}px]`,
                      `px-[${t.recoHeaderPadX}px]`,
                      hl("replyRecommendHeader"),
                    )}
                  >
                    <div className={cx("flex-1 flex items-center py-[1px] rounded-[99px] backdrop-blur-[2px]", hl("replyRecommendTitleWrap"))}>
                      <span
                        className={cx(
                          "bg-clip-text text-[transparent] whitespace-nowrap",
                          `text-[${t.recoTitleFontSizePx}px] leading-[${t.recoTitleLineHeightPx}px] font-semibold`,
                          hl("replyRecommendTitle"),
                        )}
                        style={{ backgroundImage: t.recoTitleGradient, fontWeight: t.recoTitleFontWeight }}
                      >
                        回复推荐
                      </span>
                    </div>

                    <div className={cx("flex items-center gap-[8px] shrink-0", hl("replyRecommendActions"))}>
                      <button
                        type="button"
                        className={cx(`p-[4px] rounded-[${t.iconBtnRadiusPx}px] hover:bg-[${t.hoverFill}]`, hl("replyRecommendActionButton"))}
                        aria-label="关闭推荐"
                        onClick={() => setRecoDismissed(true)}
                      >
                        {renderIconFromLibrary({
                          name: t.iconRecoCloseName || "x-close-stroked",
                          size: t.iconSizePx,
                          fallbackUrl: hiaiSvgUrl("x-close-stroked.svg"),
                          fallbackInset: "inset-[20.83%]",
                        })}
                      </button>
                      <div className={cx("shrink-0 w-[1px] h-[12px]", hl("replyRecommendDivider"))} style={{ backgroundColor: t.recoDividerColor }} />
                      <button
                        type="button"
                        className={cx(`p-[4px] rounded-[${t.iconBtnRadiusPx}px] hover:bg-[${t.hoverFill}]`, hl("replyRecommendActionButton"))}
                        aria-label="刷新推荐"
                        onClick={() => {
                          // 仅用于 demo：触发一次“重新生成”
                          showToast("已刷新推荐");
                        }}
                      >
                        {renderIconFromLibrary({
                          name: t.iconRecoRefreshName || "refresh",
                          size: t.iconSizePx,
                          fallbackUrl: hiaiSvgUrl("refresh-ccw-02-stroked.svg"),
                          fallbackInset: "inset-[8.33%_8.33%_8.33%_4.17%]",
                        })}
                      </button>
                      {replyRecommendClick === "adopt" ? (
                        <>
                          <div className={cx("shrink-0 w-[1px] h-[12px]", hl("replyRecommendDivider"))} style={{ backgroundColor: t.recoDividerColor }} />
                          <button
                            type="button"
                            className={cx(`p-[4px] rounded-[${t.iconBtnRadiusPx}px] hover:bg-[${t.hoverFill}]`, hl("replyRecommendActionButton"))}
                            aria-label="复制到输入框"
                            onClick={() => {
                              const first = recos?.[0] || "";
                              onChangeValue?.(first);
                              showToast("已复制到输入框");
                              if (replyRecommendHideAfterPick) setRecoDismissed(true);
                            }}
                          >
                            {renderIconFromLibrary({
                              name: t.iconRecoCopyName || "IconCopyStroked2",
                              size: t.iconSizePx,
                              fallbackUrl: hiaiSvgUrl("copy-stroked2.svg"),
                              fallbackInset: "inset-[8.33%]",
                            })}
                          </button>
                        </>
                      ) : null}
                      <div className={cx("shrink-0 w-[1px] h-[12px]", hl("replyRecommendDivider"))} style={{ backgroundColor: t.recoDividerColor }} />
                      <button
                        type="button"
                        className={cx(`p-[4px] rounded-[${t.iconBtnRadiusPx}px] hover:bg-[${t.hoverFill}]`, hl("replyRecommendActionButton"))}
                        aria-label="直接发送"
                        onClick={() => {
                          const first = recos?.[0] || "";
                          showToast(first ? "已发送" : "无可发送内容");
                          if (replyRecommendHideAfterPick) setRecoDismissed(true);
                        }}
                      >
                        {renderIconFromLibrary({
                          name: sendIconLibName,
                          size: t.iconSizePx,
                          fallbackUrl: hiaiSvgUrl("send_stroked.svg"),
                          fallbackInset: "inset-[8.66%_8.66%_3.54%_3.54%]",
                        })}
                      </button>
                    </div>
                  </div>

                  {recos.map((txt, idx) => {
                    const tipText = replyRecommendClick === "adopt" ? "点击复制到输入框" : "点击直接发送";
                    return (
                      <button
                        key={idx}
                        type="button"
                        className={cx(
                          "w-full text-left relative flex flex-col items-start",
                          `p-[${t.recoItemPadPx}px] rounded-[${t.recoItemRadiusPx}px]`,
                          "transition-colors",
                          `hover:bg-[${t.recoItemBgHover}]`,

        const v = String(m[1] || "").trim();
        if (!v) return { inset: 0 };
        const parts = v.split("_").map((s) => s.trim()).filter(Boolean);
        const [a, b, c, d] = parts;
        if (parts.length === 1) return { top: a, right: a, bottom: a, left: a };
        if (parts.length === 2) return { top: a, right: b, bottom: a, left: b };
        if (parts.length === 3) return { top: a, right: b, bottom: c, left: b };
        if (parts.length >= 4) return { top: a, right: b, bottom: c, left: d };

      function IconLibraryView({ tokens, selectedIconName, onSelectIcon }) {
        const t = tokens || ICON_LIBRARY_TOKENS;
        const [sections, setSections] = useState([]);
        const [query, setQuery] = useState("");
        const [copiedName, setCopiedName] = useState("");
        const [err, setErr] = useState("");
        const [loading, setLoading] = useState(true);

        useEffect(() => {
          let alive = true;
          (async () => {
            try {
              setErr("");
              setLoading(true);
              const m = await loadIconLibraryManifest();
              if (!alive) return;
              const cats = m?.categories || [];
              const next = [];
              const dict = window.__ICON_LIBRARY__?.byName;
              for (const c of cats) {
                if (!c?.file) continue;
                try {
                  const data = await loadIconLibraryCategory(c.file);
                  if (!alive) return;
                  let list = data?.icons || [];
                  if (!list.length && c.id) {
                    try {
                      const r = await fetch(resolveAssetUrl("./icon-library-data.json"), { cache: "no-store" });
                      if (r.ok) {
                        const agg = await r.json();
                        const extra = agg?.categories?.[c.id];
                        if (Array.isArray(extra) && extra.length) list = extra.slice();
                      }
                    } catch {}
                  }
                  next.push({ id: c.id, label: c.label || c.id, icons: list });
                  if (dict) {
                    list.forEach((ic) => {
                      if (ic?.name) dict[String(ic.name)] = ic;
                    });
                  }
                } catch {
                  if (!alive) return;
                  next.push({ id: c.id, label: c.label || c.id, icons: [] });
                }
              }
              if (!alive) return;
              setSections(next);
            } catch (e) {
              if (!alive) return;
              setErr(String(e?.message || e));
            } finally {
              if (alive) setLoading(false);
            }
          })();
          return () => {
            alive = false;
          };
        }, []);

        const filteredSections = useMemo(() => {
          const q = String(query || "").trim().toLowerCase();
          return (sections || []).map((sec) => ({
            ...sec,
            icons: q
              ? (sec.icons || []).filter((ic) => String(ic.name || "").toLowerCase().includes(q))
              : (sec.icons || []).slice(),
          })).filter((sec) => (sec.icons || []).length > 0);
        }, [sections, query]);

        const totalAll = useMemo(
          () => (sections || []).reduce((n, s) => n + (s.icons || []).length, 0),
          [sections],
        );
        const totalShown = useMemo(
          () => filteredSections.reduce((n, s) => n + (s.icons || []).length, 0),
          [filteredSections],
        );

        function copyName(name) {
          const v = String(name || "");
          try {
            navigator.clipboard?.writeText?.(v);
          } catch {}
          setCopiedName(v);
          window.clearTimeout(copyName._t);
          copyName._t = window.setTimeout(() => setCopiedName(""), 900);
        }

        function IconGlyph({ icon }) {
          const size = t.previewSizePx;
          const insetCls = icon?.inset || "inset-[0px]";
          return (
            <div className="relative shrink-0" style={{ width: size, height: size }}>
              <span className="absolute" style={insetClassToStyle(insetCls)}>
                <img alt="" src={icon?.url} className="block w-full h-full" draggable={false} />
              </span>
            </div>
          );
        }

        const tile = Math.max(36, Number(t.cellSizePx) || 44);

        return (
          <div className="w-full h-full flex flex-col min-h-0" style={{ fontFamily: t.fontFamily }}>
            <div className="px-[16px] py-[10px] border-b border-[rgba(45,66,107,0.12)] flex items-center gap-[12px] shrink-0">
              <div className="flex-1 min-w-0">
                <input
                  className={cx(
                    "w-full border bg-[#ffffff] px-[12px] text-sm outline-none focus:ring-1",
                    `h-[${t.searchHeightPx}px] rounded-[${t.searchRadiusPx}px]`,
                    `border-[${t.searchBorder}]`,
                    `focus:ring-[${t.focusRing}]`,
                  )}
                  placeholder="搜索图标 name（悬停格子可看全称）"
                  value={query}
                  onChange={(e) => setQuery(e.target.value)}
                />
              </div>
              <div className="shrink-0 text-xs text-[rgba(34,39,39,0.55)] whitespace-nowrap tabular-nums">
                {copiedName ? `已复制 ${copiedName}` : `${totalShown}/${totalAll}`}
              </div>
            </div>

            {err ? (
              <div className="p-[16px] text-sm text-[#f74331]">{err}</div>
            ) : loading ? (
              <div className="flex-1 flex items-center justify-center text-sm text-[rgba(34,39,39,0.45)]">加载图标库…</div>
            ) : (
              <div className="flex-1 min-h-0 overflow-auto px-[16px] py-[14px]">
                {filteredSections.length === 0 ? (
                  <div className="text-sm text-[rgba(34,39,39,0.45)]">无匹配图标</div>
                ) : (
                  <div className="flex flex-col gap-[20px]">
                    {filteredSections.map((sec) => (
                      <section key={sec.id}>
                        {sec.id !== "AIInput" ? (
                          <h3 className="text-[11px] font-bold text-[rgba(34,39,39,0.45)] tracking-wide uppercase mb-[10px]">
                            {sec.label}
                          </h3>
                        ) : null}
                        <div
                          className="grid"
                          style={{
                            gridTemplateColumns: `repeat(auto-fill, ${tile}px)`,
                            gap: `${t.gridGapPx}px`,
                          }}
                        >
                          {(sec.icons || []).map((ic) => {
                            const sel = selectedIconName && ic.name === selectedIconName;
                            return (
                              <button
                                key={`${sec.id}-${ic.name}`}
                                type="button"
                                aria-label={ic.name}
                                title={ic.name}
                                className={cx(
                                  "flex items-center justify-center outline-none transition-colors rounded-[10px]",
                                  "border-0 bg-transparent",
                                  sel
                                    ? "ring-2 ring-black ring-offset-1 ring-offset-white"
                                    : "hover:bg-[rgba(83,96,143,0.08)]",
                                  "focus-visible:ring-2 focus-visible:ring-black focus-visible:ring-offset-1",
                                )}
                                style={{ width: tile, height: tile, padding: 0 }}
                                onClick={() => {
                                  copyName(ic.name);
                                  if (typeof onSelectIcon === "function") onSelectIcon(ic.name);
                                }}
                              >
                                <IconGlyph icon={ic} />
                              </button>
                            );
                          })}
                        </div>
                      </section>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      }
      
      /**
       * 智能摘要 / 服务摘要（基于 Figma 节点 1859:41080 的骨架还原）
       * - 支持交互态：hover/focus/active/disabled/loading/empty/error/success + 折叠/复制/刷新/反馈
       */
      function SmartSummaryCard({
        title,
        items,
        tags,
        updatedAt,
        defaultCollapsed = false,
        state = "ready", // ready | loading | empty | error
        disabled = false,
        showActions = { copy: false, refresh: false, feedback: false },
        tokens,
        highlightTarget,
        showUpdatedAt = true,
        showTags = true,
        onRetry,
        onRefresh,
        onCopy,
        onFeedback,
        onTagClick,
      }) {
        const panelId = useId();
        const [collapsed, setCollapsed] = useState(defaultCollapsed);
        const [toast, setToast] = useState(null); // { type: 'success'|'danger', text: string }
        const [feedback, setFeedback] = useState(null); // 'up' | 'down' | null
        const liveRef = useRef(null);
        const containerRef = useRef(null);
        const [measuredH, setMeasuredH] = useState(0);
        
        const computedTags = useMemo(() => {
          return (tags || []).slice(0, 6);
        }, [tags]);
        
        function pushToast(next) {
          setToast(next);
          window.clearTimeout(pushToast._t);
          pushToast._t = window.setTimeout(() => setToast(null), 1600);
        }
        
        async function handleCopy() {
          if (disabled || state !== "ready") return;
          const text = (items || []).join("\\n");
          try {
            await navigator.clipboard.writeText(text);
            pushToast({ type: "success", text: "已复制" });
            onCopy?.(text);
          } catch (e) {
            pushToast({ type: "danger", text: "复制失败" });
          }
        }
        
        function handleRefresh() {
          if (disabled) return;
          pushToast({ type: "success", text: "已触发刷新" });
          onRefresh?.();
        }
        
        function handleRetry() {
          if (disabled) return;
          pushToast({ type: "success", text: "已重试" });
          onRetry?.();
        }
        
        function handleFeedback(next) {
          if (disabled || state !== "ready") return;
          const v = feedback === next ? null : next;
          setFeedback(v);
          onFeedback?.(v);
          if (v) pushToast({ type: "success", text: v === "up" ? "已反馈：有帮助" : "已反馈：无帮助" });
        }
        
        const isInteractive = !disabled;
        const isBusy = state === "loading";
        const isError = state === "error";
        const isEmpty = state === "empty";
        
        const t = tokens || SMART_SUMMARY_TOKENS;
        const gradientStopPct =
          measuredH > 0 && measuredH < t.gradientThresholdPx ? t.gradientStopSmallPct : t.gradientStopLargePct;
        const containerGradient =
          `linear-gradient(180deg, rgba(255,255,255,0) 0%, #ffffff ${gradientStopPct}%), ` +
          `linear-gradient(${t.gradientAngleDeg}deg, ${t.gradient2}), ` +
          "linear-gradient(90deg, #ffffff 0%, #ffffff 100%)";
        const hl = (key) =>
          highlightTarget === key ? `ring-2 ring-[${t.focusRing}] ring-offset-2 ring-offset-[rgba(255,255,255,0.75)]` : "";
        
        const outer = cx(
          // 宽度：自适应撑满父容器
          `relative w-full rounded-[${t.radiusOuterPx}px] border border-[${t.borderOuter}] p-[${t.paddingOuterPx}px] flex flex-col gap-[${t.gapOuterPx}px]`,
          disabled && "opacity-60 cursor-not-allowed",
        );
        
        useEffect(() => {
          const el = containerRef.current;
          if (!el || typeof ResizeObserver === "undefined") return;
          const ro = new ResizeObserver((entries) => {
            const box = entries?.[0]?.contentRect;
            if (!box) return;
            setMeasuredH(box.height);
          });
          ro.observe(el);
          return () => ro.disconnect();
        }, []);
        
        return (
          <section
            ref={containerRef}
            className={cx(outer, "bg-[#ffffff]")}
            style={{ backgroundImage: containerGradient }}
            aria-busy={isBusy ? "true" : "false"}
            aria-disabled={disabled ? "true" : "false"}
          >
            {/* Toast */}
            <div className="absolute right-[12px] top-[12px] z-10 pointer-events-none">
              {toast ? (
                <div
                  className={cx(
                    "px-[10px] py-[6px] rounded-[8px] text-xs border",
                    toast.type === "success"
                      ? "bg-[rgba(62,179,70,0.12)] border-[rgba(62,179,70,0.25)] text-[#3eb346]"
                      : "bg-[rgba(247,67,49,0.12)] border-[rgba(247,67,49,0.25)] text-[#f74331]",
                  )}
                  role="status"
                  aria-live="polite"
                  ref={liveRef}
                >
                  {toast.text}
                </div>
              ) : null}
            </div>
            
            {/* Header */}
            <div className={cx(`w-full rounded-[8px] px-[${t.headerPadX}px] py-[${t.headerPadY}px] flex items-center gap-[${t.headerGap}px]`, hl("header"))}>
              <span className={cx("shrink-0", hl("icon"))}>
                {renderIconFromLibrary({
                  name: t.iconMarkName || "smart-summary-mark",
                  size: t.iconSize,
                  fallbackUrl: resolveAssetUrl(SUMMARY_ICON_SRC),
                  fallbackInset: "inset-[0px]",
                })}
              </span>
              <div className={cx(`flex-1 overflow-hidden text-ellipsis whitespace-nowrap text-[${t.titleFontSizePx}px] leading-[${t.titleLineHeightPx}px] font-semibold`, hl("title"))}>
                {title}
              </div>
              
              <div className="flex items-center gap-[4px]">
                {showActions?.copy ? (
                  <button
                    type="button"
                    className={cx(
                      "h-[24px] w-[24px] rounded-[6px] p-[4px] flex items-center justify-center transition-colors",
                      isInteractive && "hover:bg-[rgba(83,96,143,0.07)]",
                      "outline-none focus:ring-1 focus:ring-black",
                      (!isInteractive || isBusy) && "pointer-events-none opacity-60",
                    )}
                    aria-label="复制摘要"
                    onClick={handleCopy}
                    disabled={!isInteractive || isBusy || isError || isEmpty}
                  >
                    {renderIconFromLibrary({
                      name: t.iconCopyName || "IconCopyStroked2",
                      size: t.iconSize,
                      fallbackUrl: hiaiSvgUrl("copy-stroked2.svg"),
                      fallbackInset: "inset-[8.33%]",
                    })}
                  </button>
                ) : null}
                
                {showActions?.refresh ? (
                  <button
                    type="button"
                    className={cx(
                      "h-[24px] w-[24px] rounded-[6px] p-[4px] flex items-center justify-center transition-colors",
                      isInteractive && "hover:bg-[rgba(83,96,143,0.07)] active:opacity-90",
                      "outline-none focus:ring-1 focus:ring-black",
                      (!isInteractive || isBusy) && "pointer-events-none opacity-60",
                    )}
                    aria-label="刷新摘要"
                    onClick={handleRefresh}
                    disabled={!isInteractive || isBusy}
                  >
                    {renderIconFromLibrary({
                      name: t.iconRefreshName || "refresh",
                      size: t.iconSize,
                      fallbackUrl: hiaiSvgUrl("refresh-ccw-02-stroked.svg"),
                      fallbackInset: "inset-[8.33%_8.33%_8.33%_4.17%]",
                      imgStyle: isBusy ? { opacity: 0.6 } : undefined,
                    })}
                  </button>
                ) : null}
                
                <button
                  type="button"
                  className={cx(
                    `h-[${t.iconButtonSize}px] w-[${t.iconButtonSize}px] rounded-[${t.radiusIconButtonPx}px] p-[${t.iconButtonPad}px] flex items-center justify-center transition-colors`,
                    isInteractive && `hover:bg-[${t.hoverFill}] active:opacity-90`,
                    `outline-none focus:ring-1 focus:ring-[${t.focusRing}]`,
                    hl("collapse"),
                  )}
                  aria-label={collapsed ? "展开" : "收起"}
                  aria-expanded={collapsed ? "false" : "true"}
                  aria-controls={panelId}
                  onClick={() => {
                    if (!isInteractive) return;
                    setCollapsed((v) => !v);
                  }}
                  disabled={!isInteractive}
                >
                  <IconChevronUp
                    className={cx(
                      `size-[${t.iconSize}px] text-[${t.iconNeutral}] transition-transform`,
                      collapsed && "rotate-180",
                    )}
                  />
                </button>
              </div>
            </div>
            
            {/* Body */}
            <div
              id={panelId}
              className={cx(
                "w-full rounded-[6px] border border-[rgba(255,255,255,0)] bg-[rgba(255,255,255,0)]",
                collapsed && "hidden",
                hl("body"),
              )}
            >
              {isBusy ? (
                <div className="flex flex-col gap-[8px] text-[12px] leading-[16px] px-[0px] py-[0px]">
                  <ShimmerLine delay="0s" />
                  <ShimmerLine delay="0.18s" />
                  <div className="flex gap-[8px] pt-[8px]">
                    <ShimmerLine w="w-[84px]" delay="0.32s" />
                    <ShimmerLine w="w-[64px]" delay="0.44s" />
                    <ShimmerLine w="w-[92px]" delay="0.56s" />
                  </div>
                </div>
              ) : isError ? (
                <div className="flex items-start justify-between gap-[12px]">
                  <div className="flex flex-col gap-[4px]">
                    <div className="text-[12px] leading-[16px] font-semibold text-[#f74331]">摘要生成失败</div>
                    <div className="text-[12px] leading-[16px] text-[rgba(34,39,39,0.6)]">
                      请检查网络或稍后重试。你也可以点击刷新重新生成。
                    </div>
                  </div>
                  <button
                    type="button"
                    className={cx(
                      "h-[36px] px-[16px] rounded-[8px] border border-[rgba(45,66,107,0.12)] bg-[#ffffff]",
                      "text-[12px] font-semibold text-[#222727] transition-colors",
                      isInteractive && "hover:bg-[rgba(83,96,143,0.07)] active:opacity-90",
                      "outline-none focus:ring-1 focus:ring-black",
                      !isInteractive && "opacity-60 cursor-not-allowed",
                    )}
                    onClick={handleRetry}
                    disabled={!isInteractive}
                  >
                    重试
                  </button>
                </div>
              ) : isEmpty ? (
                <div className="flex items-center justify-between gap-[12px]">
                  <div className="text-[12px] leading-[16px] text-[rgba(34,39,39,0.6)]">暂无可生成的摘要内容</div>
                  <button
                    type="button"
                    className={cx(
                      "h-[36px] px-[16px] rounded-[8px] bg-black text-[#ffffff] text-[12px] font-semibold transition-opacity",
                      isInteractive && "hover:opacity-90 active:opacity-90",
                      "outline-none focus:ring-1 focus:ring-black",
                      !isInteractive && "opacity-60 cursor-not-allowed",
                    )}
                    onClick={handleRefresh}
                    disabled={!isInteractive}
                  >
                    重新生成
                  </button>
                </div>
              ) : (
                <div className={`flex flex-col gap-[${SMART_SUMMARY_TOKENS.paragraphGap}px] text-[${SMART_SUMMARY_TOKENS.bodyFontSizePx}px] leading-[${SMART_SUMMARY_TOKENS.bodyLineHeightPx}px]`}>
                  {(items || []).map((t, idx) => (
                    <p key={idx} className="w-full">
                      {t}
                    </p>
                  ))}
                </div>
              )}
            </div>
            
            {/* Footer: tags + feedback + updatedAt
                需求：收起时仅显示 Header；Footer 仅展开时显示 */}
            {!collapsed ? (
              <div className="w-full flex items-center justify-between gap-[12px]">
                {showTags ? (
                  <div className={cx("flex flex-wrap items-start gap-[8px]", hl("tags"))}>
                    {computedTags.map((tag) => (
                      <button
                        key={tag.label}
                        type="button"
                        className={cx(
                          `h-[${t.tag.height}px] px-[${t.tag.padX}px] py-[${t.tag.padY}px] rounded-[${t.tag.radius}px] border border-[rgba(45,66,107,0.0)]`,
                          "text-[12px] leading-[16px] whitespace-nowrap transition-colors",
                          tag.tone === "pink"
                            ? `bg-[${t.tag.tones.pink.bg}] text-[${t.tag.tones.pink.fg}]`
                            : tag.tone === "teal"
                              ? `bg-[${t.tag.tones.teal.bg}] text-[${t.tag.tones.teal.fg}]`
                              : `bg-[${t.tag.tones.violet.bg}] text-[${t.tag.tones.violet.fg}]`,
                          isInteractive && `hover:bg-[${t.hoverFill}]`,
                          `outline-none focus:ring-1 focus:ring-[${t.focusRing}]`,
                          (!isInteractive || isBusy) && "pointer-events-none opacity-70",
                        )}
                        onClick={() => onTagClick?.(tag)}
                        disabled={!isInteractive || isBusy}
                        aria-label={`标签：${tag.label}`}
                      >
                        {tag.label}
                      </button>
                    ))}
                  </div>
                ) : (
                  <div />
                )}
                
                <div className="flex items-center gap-[10px] shrink-0">
                  {showActions?.feedback ? (
                    <div className="flex items-center gap-[4px]">
                      <button
                        type="button"
                        className={cx(
                          "h-[24px] w-[24px] rounded-[6px] p-[4px] flex items-center justify-center transition-colors",
                          isInteractive && "hover:bg-[rgba(83,96,143,0.07)] active:opacity-90",
                          feedback === "up" && "bg-[rgba(62,179,70,0.12)]",
                          "outline-none focus:ring-1 focus:ring-black",
                          (!isInteractive || isBusy || state !== "ready") && "pointer-events-none opacity-60",
                        )}
                        aria-label="反馈：有帮助"
                        onClick={() => handleFeedback("up")}
                        disabled={!isInteractive || isBusy || state !== "ready"}
                      >
                        <IconThumbUp className={cx("size-[16px]", feedback === "up" ? "text-[#3eb346]" : "text-[rgba(34,39,39,0.75)]")} />
                      </button>
                      <button
                        type="button"
                        className={cx(
                          "h-[24px] w-[24px] rounded-[6px] p-[4px] flex items-center justify-center transition-colors",
                          isInteractive && "hover:bg-[rgba(83,96,143,0.07)] active:opacity-90",
                          feedback === "down" && "bg-[rgba(247,67,49,0.12)]",
                          "outline-none focus:ring-1 focus:ring-black",
                          (!isInteractive || isBusy || state !== "ready") && "pointer-events-none opacity-60",
                        )}
                        aria-label="反馈：无帮助"
                        onClick={() => handleFeedback("down")}
                        disabled={!isInteractive || isBusy || state !== "ready"}
                      >
                        <IconThumbDown className={cx("size-[16px]", feedback === "down" ? "text-[#f74331]" : "text-[rgba(34,39,39,0.75)]")} />
                      </button>
                    </div>
                  ) : null}
                  
                  {showUpdatedAt ? (
                    <div className="text-[12px] leading-[16px] text-[rgba(34,39,39,0.6)] whitespace-nowrap">
                      {updatedAt ? `更新于 ${updatedAt}` : ""}
                    </div>
                  ) : null}
                </div>
              </div>
            ) : null}
          </section>
        );
      }
      
      // ─── FOUNDATION TOKENS DATA (from Figma Variables) ───────────────────────
      const FOUNDATION_COLORS_INIT = {
        "semi-amber":       ["#FDFBED","#FCF4D1","#F8E6A4","#F5D679","#F1C34E","#EEAE25","#C6881D","#9F6515","#77460F","#4F2B09"],

        "semi-light-green": ["#F3F8EC","#E3F0D1","#C8E1A7","#AED280","#95C35E","#7DB43F","#669633","#507828","#3A5A1D","#263C13"],

        "semi-teal":        ["#E6F7F4","#C4F0E7","#8EE1D1","#2ECAB4","#26BFA9","#0EB39C","#0A9584","#07776B","#045A52","#003C3B"],
        "semi-violet":      ["#F1EEF9","#DCD4F3","#BBACE8","#9E86DC","#8464D1","#6D45C5","#6039B1","#542D9C","#482388","#3C1B73"],

      const FOUNDATION_COLOR_LABELS = {
        "semi-amber":"Amber","semi-blue":"Blue","semi-brand":"Brand","semi-cyan":"Cyan",

        { key:"spacing-super-loose",  label:"Super Loose",  value:40 },
        { key:"spacing-extra-loose",  label:"Extra Loose",  value:32 },
        { key:"spacing-loose",        label:"Loose",        value:24 },

        { key:"semi-color-text-0", label:"Text 0", alpha:1.00, desc:"主标题、一级正文" },
        { key:"semi-color-text-1", label:"Text 1", alpha:0.80, desc:"副标题、二级正文" },
        { key:"semi-color-text-2", label:"Text 2", alpha:0.60, desc:"占位符、提示文字" },

      function buildFoundationDesignSkill(palette, spacing, radius) {
        const colorSections = Object.entries(palette).map(([family, shades]) => {

          "",

          "",
          "## 3. 文字颜色（Text Colors）",

          "---",
          "",
          "## 4. 间距（Spacing）",

          spacingRows,
          "",
          "---",
          "",
          "## 5. 圆角（Border Radius）",
          "",
          "> 所有圆角值必须来自以下 Token，禁止使用未列出的数值。",
          "",
          "| Token | 数值 | 语义 |",
          "|-------|------|------|",
          radiusRows,
          "",
          "---",
          "",
          "## 6. 使用规范",
          "",
          "### 6.1 颜色语义映射（快速参考）",

          "",
          "### 6.2 禁止项",
          "- ❌ 禁止在业务组件中直接写 hex 色值（如 `#FF0000`），必须引用 palette token",
          "- ❌ 禁止使用 `spacing-*` 之外的间距数值（如 `7px`、`13px`）",

          "",

      // ─────────────────────────────────────────────────────────────────────────

      function ImBubbleView({
        tokens,
        highlightTarget,
        recommendText,
        draftValue,
        onDraftChange,
        onSend,
        lastSentPreview,
        showAvatar = true,
        showAiRecommend = true,
        previewAiHostedSelfBubble = false,
      }) {
        const t = tokens || IM_BUBBLE_TOKENS;
        const hi = (id) => highlightTarget === id;
        const sendIconName = t.sendIconName || "hiai-send";
        const R = t.peerBubbleRadiusPx;
        const peerBubbleRadius = `0 ${R}px ${R}px ${R}px`;
        const selfBubbleRadius = `${R}px 0 ${R}px ${R}px`;
        const rrName = t.readReceiptIconName || "im-read-receipt";
        const selfOutboundFill = previewAiHostedSelfBubble
          ? { background: t.selfAiBubbleGradient || t.recoGradient }
          : { background: t.selfBubbleBg };

        function adopt(text) {
          onDraftChange(text);
          try {
            navigator.clipboard.writeText(text);
          } catch {}
        }

        function send(text) {
          adopt(text);
          if (typeof onSend === "function") onSend(text);
        }

        function AvatarFace({ side }) {
          const s = t.avatarSizePx;
          const rel = side === "self" ? t.imAvatarSelfUrl : t.imAvatarPeerUrl;
          const src = resolveAssetUrl(rel || (side === "self" ? "./im-bubble-assets/avatar-self.png" : "./im-bubble-assets/avatar-peer.png"));
          return (
            <div className="shrink-0 rounded-full overflow-hidden" style={{ width: s, height: s }} aria-hidden>
              <img

        function clamp(n, min, max) {
          return Math.max(min, Math.min(max, n));
        }

        const LAYOUT_PAD = 12;    // outer padding each side
        const HANDLE_W = 12;      // each drag-handle width

        function getAvailableW() {
          const vw = Math.max(1080, viewportW || 0);
          const asideW = showComponentAside ? asidePx : 0;
          const nHandles = showComponentAside
            ? 3
            : (iconLibraryMidHidden ? 1 : 2);
          return Math.max(0, vw - LAYOUT_PAD * 2 - asideW - HANDLE_W * nHandles);
        }

          e.preventDefault();
          dragRef.current = {
            active: which,
            startX: e.clientX,
            startLeft: leftPx,
            startRight: rightPx,
            startMid: midPx,
            startAside: asidePx,
          };
          window.addEventListener("pointermove", onDragMove);
          window.addEventListener("pointerup", onDragEnd, { once: true });
        }

        useEffect(() => {
          const minAside = 120; const maxAside = 260;
          const minLeft = 320; const maxLeft = 900;
          const minMid = 260; const maxMid = 700;
          const minRight = 280; const maxRight = 800;

          const avail = getAvailableW();
          if (!avail) return;

          if (iconLibraryMidHidden) {
            let l = clamp(leftPx, minLeft, maxLeft);
            let r = avail - l;
            r = clamp(r, minRight, maxRight);
            l = avail - r;
            l = clamp(l, minLeft, maxLeft);
            setLeftPx(l);
            setMidPx(0);
            setRightPx(r);
            return;
          }

          let m = midPx < minMid ? 380 : midPx;
          m = clamp(m, minMid, maxMid);
          let l = clamp(leftPx, minLeft, maxLeft);
          let r = clamp(rightPx, minRight, maxRight);

          const sum = l + m + r;
          if (sum === avail) return;

          r = clamp(avail - l - m, minRight, maxRight);
          if (l + m + r !== avail) m = clamp(avail - l - r, minMid, maxMid);
          if (l + m + r !== avail) l = clamp(avail - m - r, minLeft, maxLeft);
          r = clamp(avail - l - m, minRight, maxRight);

          setLeftPx(l); setMidPx(m); setRightPx(r);

        function onDragMove(e) {

          const minLeft = 320; const maxLeft = 900;

          const minRight = 280; const maxRight = 800;

            let r = avail - l;
            r = clamp(r, minRight, maxRight);
            l = avail - r;
            l = clamp(l, minLeft, maxLeft);
            setLeftPx(l);
            setMidPx(0);
            setRightPx(r);
          } else if (d.active === "left") {
            let l = clamp(d.startLeft + dx, minLeft, maxLeft);
            let m = clamp(avail - l - d.startRight, minMid, maxMid);
            l = clamp(avail - m - d.startRight, minLeft, maxLeft);
            const r = clamp(avail - l - m, minRight, maxRight);
            setLeftPx(l); setMidPx(m); setRightPx(r);
          } else if (d.active === "right") {
            let m = clamp(d.startMid + dx, minMid, maxMid);
            let r = clamp(avail - d.startLeft - m, minRight, maxRight);
            m = clamp(avail - d.startLeft - r, minMid, maxMid);
            const l = clamp(avail - m - r, minLeft, maxLeft);
            setLeftPx(l); setMidPx(m); setRightPx(r);
          }
        }

          dragRef.current.active = null;

          const re = new RegExp('data-token-path="' + safe + '">([^<]+)</code>');
          const m = md.match(re);
          return m ? m[1].trim() : (fallback !== undefined ? fallback : "");
        }
        function num(path, fallback) {
          const v = parseFloat(tkn(path, ""));
          return isNaN(v) ? fallback : v;
        }
        function col(path, fallback) {

      // ─── Spec-driven Preview Components (from-scratch, inline-style only) ──

      // ─── Sandbox Modal (markdown-driven) ──────────────────────────────────────
      function SandboxModal({ componentId, mdText, onClose }) {
        const defaultTab =
          componentId === "smartSummary"  ? "ready"  :
          componentId === "formRecommend" ? "multi"  :
          componentId === "imBubble" ? "im" : "single";
        const [activeTab, setActiveTab] = React.useState(defaultTab);

        const v = React.useMemo(
          () => parseMdDesignValues(mdText, componentId),
          [mdText, componentId],
        );

        const scenarios =
          componentId === "smartSummary"
            ? [{ id: "ready", label: "正常态" }, { id: "loading", label: "加载中" },
               { id: "error", label: "错误态" }, { id: "empty",   label: "空态"   }]
            : componentId === "formRecommend"
            ? [{ id: "loading", label: "加载中" }, { id: "single", label: "单条推荐" },
               { id: "multi",   label: "多条推荐" }]
            : componentId === "imBubble"
            ? [{ id: "im", label: "对话预览" }]
            : [{ id: "off", label: "无推荐" }, { id: "single", label: "单条推荐" },
               { id: "multi", label: "多条推荐" }];

        const checks = React.useMemo(() => {
          if (componentId === "smartSummary") return [
            { id: "r1",  label: "外卡片圆角 = 12px",            pass: v.outerRadius === 12 },
            { id: "r2",  label: "外卡片内边距 = 12px",          pass: v.outerPadding === 12 },
            { id: "r3",  label: "标题字号 = 12px",              pass: v.titleFontSize === 12 },
            { id: "r4",  label: "外层 gap ∈ [4,8,12,16]px",    pass: [4,8,12,16].includes(v.gapOuter) },
            { id: "r5",  label: "Shimmer 时长已在 Skill 中定义", pass: v.shimmerDuration > 0 },
            { id: "r6",  label: "焦点环颜色已定义",             pass: Boolean(v.focusRing) },
            { id: "r7",  label: "Shimmer 底色已定义",           pass: Boolean(v.shimmerBase) },
            { id: "r8",  label: "正文颜色已定义且非纯黑",        pass: Boolean(v.textMain) && v.textMain !== "#000000" },
            { id: "r9",  label: "Logo 图标尺寸 = 16px",         pass: v.iconSize === 16 },
            { id: "r10", label: "悬停填充色已定义",             pass: Boolean(v.hoverFill) },
          ];
          if (componentId === "formRecommend") return [
            { id: "r1",  label: "标题字号已在 Skill 中定义",     pass: v.titleFontSize > 0 },
            { id: "r2",  label: "输入框圆角 ∈ [4,8,12,16]px",   pass: [4,8,12,16].includes(v.inputRadiusPx) },
            { id: "r3",  label: "推荐条高度已定义",              pass: v.recoBarHeight > 0 },
            { id: "r4",  label: "焦点环颜色已定义",             pass: Boolean(v.focusRing) },
            { id: "r5",  label: "外层 gap 已定义",              pass: v.gapOuter > 0 },
            { id: "r6",  label: "AI 徽章背景渐变已定义",         pass: Boolean(v.aiBadgeBg) },
            { id: "r7",  label: "占位符颜色已定义且非纯黑",      pass: Boolean(v.placeholderColor) && v.placeholderColor !== "#000000" },
            { id: "r8",  label: "推荐项选中背景已定义",          pass: Boolean(v.recoItemBgSel) },
            { id: "r9",  label: "推荐列表圆角 ∈ [4,8,12,16]px", pass: [4,8,12,16].includes(v.recoWrapRadius) },
            { id: "r10", label: "推荐条圆角 > 0",               pass: v.recoBarRadius > 0 },
          ];
          if (componentId === "imBubble") return [
            { id: "r1",  label: "对方气泡圆角已定义",           pass: v.peerBubbleRadius > 0 },
            { id: "r2",  label: "气泡与推荐间距已定义",         pass: v.stackGap >= 0 },
            { id: "r3",  label: "recoGradient 已从 Skill 解析", pass: Boolean(v.recoGradient) && v.recoGradient.length > 8 },
            { id: "r4",  label: "推荐内边距已定义",             pass: v.recoPadX > 0 && v.recoPadY >= 0 },
            { id: "r5",  label: "焦点环颜色已定义",             pass: Boolean(v.focusRing) },
            { id: "r6",  label: "发送按钮 padding 已定义",      pass: v.sendBtnPad >= 0 },
            { id: "r7",  label: "发送图标边长 > 0",             pass: v.sendIconPx > 0 },
            { id: "r8",  label: "对方气泡底色的 token 已定义",   pass: Boolean(v.peerBubbleBg) },
            { id: "r9",  label: "推荐文字色已定义",             pass: Boolean(v.recoTextColor) },
            { id: "r10", label: "推荐与发送钮间距已定义",       pass: v.recoSendGap >= 0 },
            {
              id: "r11",
              label: "Skill 已声明固定头像 token（imAvatarPeerUrl / imAvatarSelfUrl）",
              pass:
                /data-token-path="imAvatarPeerUrl"/.test(String(mdText || "")) &&
                /data-token-path="imAvatarSelfUrl"/.test(String(mdText || "")),

          ];
          return [
            { id: "r1",  label: "外层圆角 = 12px",              pass: v.outerRadius === 12 },
            { id: "r2",  label: "外层内边距 = 12px",            pass: v.outerPadding === 12 },
            { id: "r3",  label: "输入卡片圆角 ≥ 8px",           pass: v.cardRadius >= 8 },
            { id: "r4",  label: "图标尺寸 = 16px",              pass: v.iconSize === 16 },
            { id: "r5",  label: "发送按钮高度已定义",            pass: v.sendBtnHeight > 0 },
            { id: "r6",  label: "焦点环颜色已定义",             pass: Boolean(v.focusRing) },
            { id: "r7",  label: "推荐标题渐变已定义",           pass: Boolean(v.recoTitleGrad) },
            { id: "r8",  label: "动效透明度 ∈ [0,1]",           pass: v.motionOpacity >= 0 && v.motionOpacity <= 1 },
            { id: "r9",  label: "外层背景色已定义",             pass: Boolean(v.outerBg) },
            { id: "r10", label: "输入卡片背景色已定义",          pass: Boolean(v.cardBg) },
          ];
        }, [componentId, v, mdText]);

        const passCount = checks.filter(c => c.pass).length;
        const allPass   = passCount === checks.length;

        function renderPreview() {
          if (componentId === "smartSummary")  return <SpecSmartSummary v={v} scenario={activeTab} />;

              style={{
                width: "min(980px, 95vw)", height: "min(740px, 93vh)",

                  <div className="flex items-center gap-[10px]">
                    <span className="text-[15px] font-bold text-[#222727]">🧪 沙盒测试</span>
                    <span className={cx(
                      "px-[8px] py-[2px] rounded-[99px] text-[11px] font-semibold",
                      allPass ? "bg-[rgba(0,0,0,0.07)] text-black" : "bg-[rgba(233,30,99,0.10)] text-[#c0174a]",
                    )}>
                      {passCount} / {checks.length} 项通过
                    </span>
                    <span className="text-[12px] text-[rgba(34,39,39,0.45)]">— {compLabel}</span>
                  </div>
                  <div className="text-[12px] text-[rgba(34,39,39,0.45)]">
                    仅读取 Design Skill Markdown 中的约束值，模拟 LLM 阅读 Skill 后生成的真实 UI 效果
                  </div>
                </div>
                <button
                  type="button"
                  className="flex items-center justify-center w-[30px] h-[30px] rounded-[8px] hover:bg-[rgba(83,96,143,0.09)] text-[rgba(34,39,39,0.4)] text-[20px] font-light outline-none focus:ring-1 focus:ring-black"

              {/* Body */}

                  <div className="flex items-center gap-[4px] px-[16px] py-[10px] border-b border-[rgba(45,66,107,0.08)] shrink-0" style={{ background: "rgba(83,96,143,0.025)" }}>

                      <button

                        className={cx(
                          "px-[10px] h-[26px] rounded-[6px] text-[12px] font-medium transition-colors outline-none focus:ring-1 focus:ring-black",

                    <div className="max-w-[500px] mx-auto">
                      <div className="flex items-center gap-[6px] mb-[14px]">
                        <div className="w-[6px] h-[6px] rounded-full" style={{ background: "#000000" }} />
                        <span className="text-[11px] text-[rgba(34,39,39,0.4)] font-medium tracking-wide">
                          Skill 驱动生成 · {scenarios.find(s => s.id === activeTab)?.label}
                        </span>
                      </div>
                      {renderPreview()}
                    </div>
                  </div>
                </div>

                {/* Right: Validation checklist */}
                <div className="w-[268px] flex flex-col overflow-hidden shrink-0">
                  <div className="px-[16px] py-[10px] border-b border-[rgba(45,66,107,0.08)] shrink-0" style={{ background: "rgba(83,96,143,0.025)" }}>
                    <span className="text-[11px] font-semibold text-[rgba(34,39,39,0.4)] tracking-wide">SKILL 内容校验</span>
                  </div>
                  <div className="flex-1 overflow-auto p-[12px] flex flex-col gap-[4px]">
                    {checks.map(check => (
                      <div
                        key={check.id}
                        className={cx(
                          "flex items-start gap-[8px] px-[10px] py-[8px] rounded-[8px]",
                          check.pass ? "bg-[rgba(0,0,0,0.04)]" : "bg-[rgba(233,30,99,0.07)]",
                        )}
                      >
                        <span className="shrink-0 text-[13px] leading-[18px]">{check.pass ? "✅" : "❌"}</span>
                        <span className={cx("text-[12px] leading-[18px]", check.pass ? "text-[rgba(34,39,39,0.7)]" : "text-[#c0174a]")}>
                          {check.label}
                        </span>
                      </div>
                    ))}
                  </div>
                  <div className={cx(
                    "px-[16px] py-[13px] border-t border-[rgba(45,66,107,0.12)] shrink-0",
                    allPass ? "bg-[rgba(0,0,0,0.04)]" : "bg-[rgba(233,30,99,0.05)]",
                  )}>
                    <div className={cx("text-[12px] font-semibold", allPass ? "text-black" : "text-[#c0174a]")}>
                      {allPass ? "✅ Skill 约束完整，可安全交付 AI 使用" : `❌ Skill 中有 ${checks.length - passCount} 项约束缺失或异常`}
                    </div>
                    <div className="text-[11px] text-[rgba(34,39,39,0.45)] mt-[3px]">
                      {allPass ? "所有设计约束均已在 Markdown 中明确定义" : "请在左侧 Token 面板调整对应参数，Skill 将同步更新"}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────────────────

      ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);

      // Icon picker now uses custom grid dropdown (no datalist needed).
    </script>
    <script>
      (function () {
        function showBootHint() {
          var root = document.getElementById("root");
          if (!root || root.children.length > 0) return;
          var issues = [];
          if (!window.React) issues.push("React");
          if (!window.ReactDOM) issues.push("ReactDOM");
          if (!window.Babel) issues.push("Babel");
          if (!window.marked) issues.push("marked");
          var detail = issues.length
            ? "<p><strong>未加载的脚本：</strong>" + issues.join("、") + "。请确认在项目根目录用 HTTP 访问（勿用 file://），并检查 <code>vendor/</code> 是否完整。</p>"
            : "<p>脚本已加载，但界面未渲染。请打开开发者工具 (F12) → Console 查看报错，并尝试强制刷新（Cmd+Shift+R / Ctrl+Shift+R）。</p>";
          root.innerHTML =
            '<div style="padding:24px;max-width:640px;margin:0 auto;font:14px/1.6 system-ui,-apple-system,sans-serif;color:#222727;background:#fff;border-radius:12px;border:1px solid rgba(45,66,107,0.15)">' +
            "<h1 style=\"font-size:16px;margin:0 0 10px\">HiAI Design.MD 未能启动</h1>" +
            detail +
            "<p style=\"opacity:.65;font-size:12px;margin-top:14px\">本地示例：<code style=\"background:#f2f4f7;padding:2px 6px;border-radius:4px\">python3 -m http.server 8080</code> → 浏览器打开 <code>http://127.0.0.1:8080/index.html</code></p>" +
            "</div>";
        }
        window.addEventListener("load", function () {
          setTimeout(showBootHint, 12000);
        });
      })();
    </script>
  </body>
</html>
