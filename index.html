      /* ── Platform Design Tokens (遵循基础参数) ──────────────────────────────
         颜色来源：基础参数色板
           --ui-primary    = semi-color-black  (#000000) 主按钮 / 激活态
           --ui-bg         = semi-bluegrey-0   (#FCFCFD) 页面底色
           --ui-surface    = #FFFFFF            卡片白底
           --ui-text       = semi-color-text-0 (#222727) 正文主色
           --ui-radius-sm  = semi-border-radius-small  (6px)
           --ui-radius-md  = semi-border-radius-medium (8px)
           --ui-radius-lg  = semi-border-radius-large  (12px)
      ────────────────────────────────────────────────────────────────────── */
      :root {
        --ui-primary:      #000000;
        --ui-primary-text: #ffffff;
        --ui-bg:           #f5f6f8;
        --ui-surface:      #ffffff;
        --ui-text:         #222727;
        --ui-radius-sm:    6px;
        --ui-radius-md:    8px;
        --ui-radius-lg:    12px;
        --ui-font: "PingFang SC", "PingFangSC", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      }
      html,
      body {
        font-family: var(--ui-font);
      }
      @keyframes shimmer {
        0%   { background-position: 200% center; }
        100% { background-position: -200% center; }
      }
      /* 彩条往返流动（FormRecommend 加载态专用） */
      @keyframes aiStripeFlow {
        0%, 100% { background-position: 0%   50%; }
        50%      { background-position: 100% 50%; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes aiStripeMove {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 100% 50%;
        }
      }
      @keyframes aiInputMotionDrift {
        0% {
          transform: translateX(-6%) translateY(0%) scale(1.02);
          opacity: 0.92;
        }
        100% {
          transform: translateX(6%) translateY(-2%) scale(1.02);
          opacity: 0.92;
        }
      }
      .md { font-size: 12px; line-height: 1.6; }
      .md h1 {
        font-size: 14px;
        font-weight: 700;
        color: #222727;
        margin: 0 0 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(45,66,107,0.12);
      }
      .md h2 {
        font-size: 12px;
        font-weight: 700;
        color: #222727;
        margin: 16px 0 6px;
        padding: 4px 8px;
        background: rgba(83,96,143,0.06);
        border-radius: 6px;
        border-left: 3px solid #000000;
      }
      .md h3 {
        font-size: 11.5px;
        font-weight: 600;
        color: #222727;
        margin: 12px 0 4px;
      }
      .md h4 {
        font-size: 11px;
        font-weight: 600;
        color: rgba(34,39,39,0.7);
        margin: 8px 0 4px;
      }
      .md p {
        font-size: 12px;
        line-height: 18px;
        color: rgba(34,39,39,0.82);
        margin: 4px 0;
      }
      .md li {
        font-size: 12px;
        line-height: 18px;
        color: rgba(34,39,39,0.82);
      }
      .md blockquote {
        margin: 6px 0;
        padding: 6px 10px;
        border-left: 3px solid rgba(0,0,0,0.25);
        background: rgba(0,0,0,0.04);
        border-radius: 0 6px 6px 0;
      }
      .md blockquote p { margin: 0; color: rgba(34,39,39,0.72); font-size: 11.5px; }
      .md code {
        font-size: 10.5px;
        font-family: "SF Mono", "Fira Code", "Consolas", monospace;
        background: rgba(83,96,143,0.07);
        border: 1px solid rgba(45,66,107,0.12);
        border-radius: 4px;
        padding: 1px 5px;
      }
      .md pre {
        background: rgba(34,39,39,0.04);
        border: 1px solid rgba(45,66,107,0.1);
        border-radius: 8px;
        margin: 6px 0;
        overflow: auto;
      }
      .md pre code {
        display: block;
        padding: 10px 12px;
        font-size: 10.5px;
        line-height: 16px;
        background: none;
        border: none;
      }
      .md ul, .md ol {
        padding-left: 16px;
        margin: 4px 0;
      }
      .md table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
        margin: 6px 0;
      }
      .md th {
        text-align: left;
        font-weight: 600;
        padding: 5px 8px;
        background: rgba(83,96,143,0.07);
        border: 1px solid rgba(45,66,107,0.12);
        color: #222727;
        white-space: nowrap;
      }
      .md td {
        padding: 4px 8px;
        border: 1px solid rgba(45,66,107,0.1);
        color: rgba(34,39,39,0.82);
        vertical-align: top;
      }
      .md tr:nth-child(even) td { background: rgba(83,96,143,0.03); }
      .md hr {
        border: 0;
        border-top: 1px solid rgba(45,66,107,0.1);
        margin: 10px 0;
      }
      .md [data-token-path] {
        border-radius: 4px;
        padding: 1px 5px;
        margin: 0 1px;
        transition: background-color 120ms ease, box-shadow 120ms ease;
      }
      .md .md-token-active {
        background: rgba(0,0,0,0.07);
        box-shadow: 0 0 0 1px rgba(0,0,0,0.2) inset;
      }

      const { useEffect, useId, useMemo, useRef, useState } = React;

      function cx(...parts) {
        return parts.filter(Boolean).join(" ");
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function mdToken(path, value) {
        return `<code data-token-path="${escapeHtml(path)}">${escapeHtml(value)}</code>`;
      }

      function safeCssEscape(s) {
        try {
          if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(String(s));
        } catch {}
        // Minimal fallback: escape quotes/backslashes and brackets for attribute selectors
        return String(s).replaceAll("\\\\", "\\\\\\\\").replaceAll('"', '\\"').replaceAll("[", "\\[").replaceAll("]", "\\]");
      }

      const SUMMARY_ICON_SRC = "./summary-icon.png";

      function resolveAssetUrl(relPath) {

        } catch {

        }
      }

      // ─── Foundation color resolver ──────────────────────────────────────────
      const FOUNDATION_TEXT_COLOR_MAP = {
        "semi-color-text-0": "rgba(34,39,39,1.0)",
        "semi-color-text-1": "rgba(34,39,39,0.8)",
        "semi-color-text-2": "rgba(34,39,39,0.6)",
        "semi-color-text-3": "rgba(34,39,39,0.35)",
      };
      // Resolve a foundation token reference (e.g. "semi-brand-5") to its actual CSS value.
      // Falls back to the literal string if it's not a known reference.
      function resolveFoundationColor(ref, palette) {
        if (!ref || typeof ref !== "string") return ref || "#000000";
        // Palette reference: "semi-{family}-{shade 0-9}"
        // Use greedy match to capture everything before the last "-digit" as the family name.
        const m = ref.match(/^(semi-.+)-(\d)$/);
        if (m) {
          const fam = m[1];
          const idx = parseInt(m[2]);
          if (palette && palette[fam] && palette[fam][idx] !== undefined)
            return palette[fam][idx];
        }
        if (ref === "semi-color-white") return "#FFFFFF";
        if (ref === "semi-color-black") return "#000000";
        if (ref === "semi-color-dark-text") return "#222727";
        if (FOUNDATION_TEXT_COLOR_MAP[ref]) return FOUNDATION_TEXT_COLOR_MAP[ref];
        return ref; // literal fallback (rgba, gradients, etc.)
      }
      // Recursively resolve all color references in a token tree.
      function resolveAllTokenColors(tokens, palette) {
        function rec(v) {
          if (typeof v === "string") return resolveFoundationColor(v, palette);
          if (Array.isArray(v)) return v.map(rec);
          if (v && typeof v === "object")
            return Object.fromEntries(Object.entries(v).map(([k, val]) => [k, rec(val)]));
          return v;
        }
        return rec(tokens);
      }

      function buildDesignSkillMarkdown(t) {
        const gradientLines = [

        return [

          "",
          "- **\u5bbd\u5ea6**\uff1a`width: 100%`\uff0c\u5fc5\u987b\u6491\u6ee1\u7236\u5bb9\u5668\uff0c**\u7981\u6b62\u8bbe\u5b9a `max-width`**\u3002",

          "- **\u5e03\u5c40**\uff1aFlex column\uff0cgap \u4e25\u683c\u4f7f\u7528 gapOuterPx\u3002",

          "",

          "",

          "- AUTO_STOP \u9700\u6839\u636e\u5b9e\u9645\u7ec4\u4ef6\u9ad8\u5ea6\u52a8\u6001\u8ba1\u7b97\uff08<200px \u7528 40%\uff1b\u2265200px \u7528 20%\uff09\u3002",

          "**\u63a8\u8350\u6761\u76ee Hover \u80cc\u666f\uff08\u5fc5\u987b\u539f\u6837\uff09**\uff1a",
          "```css",
          `background-image: ${t.recommendItemBgHover};`,
          "```",
          "",
          "---",
          "",
          "## \u00a73 Component Specifications\uff08\u7ec4\u4ef6\u89c4\u8303\uff09",
          "",
          "### 3.1 Anatomy \u2014 DOM \u89e3\u5256\u7ed3\u6784\uff08\u5fc5\u987b\u5305\u542b\uff0c\u4e0d\u5f97\u7701\u7565\u4efb\u610f\u5c42\uff09",
          "",
          "```html",
          "<!-- OuterWrapper: display:flex; flex-direction:column -->",
          `<div class=\"form-recommend\" style=\"gap:${t.gapOuterPx}px; width:100%;\">`,
          "",
          "  <!-- TitleRow: \u5b57\u6bb5\u540d + AI\u6807\u7b7e -->",
          `  <div class=\"title-row\" style=\"display:flex; align-items:center; gap:${t.titleGapPx}px;\">`,
          "    <label class=\"field-label\">\u5b57\u6bb5\u540d</label>",
          `    <span class=\"ai-badge\" style=\"border-radius:${t.aiBadgeRadiusPx}px; padding:0 ${t.aiBadgePadX}px;`,
          `                         font-size:${t.aiBadgeTextSizePx}px; font-weight:${t.aiBadgeTextWeight};\">AI</span>`,
          "  </div>",
          "",
          "  <!-- InputWrapper: \u8f93\u5165\u6846 + \u53f3\u4fa7\u5237\u65b0\u6309\u9215 -->",
          `  <div class=\"input-wrapper\" style=\"position:relative; border-radius:${t.inputRadiusPx}px;`,
          `                                    background:${t.inputBg}; border:1px solid ${t.inputBorder};\">`,
          `    <input style=\"padding:${t.inputPadY}px ${t.inputRightPadX}px ${t.inputPadY}px ${t.inputPadX}px;`,
          `                  font-size:${t.placeholderFontSizePx}px; line-height:${t.placeholderLineHeightPx}px;\" />`,
          `    <!-- \u5237\u65b0\u6309\u9215 \u2014 \u53f3\u4fa7\u6d6ee\u4f4d -->`,
          `    <button class=\"refresh-btn\" style=\"position:absolute; right:${t.refreshBtnOffsetRightPx}px;`,
          `                                       background:${t.refreshBtnBg}; border:1px solid ${t.refreshBtnBorder};`,
          `                                       border-radius:${t.refreshBtnRadiusPx}px; padding:${t.refreshBtnPadPx}px;\">`,
          "      \u5237\u65b0\u56fe\u6807",
          "    </button>",
          "  </div>",
          "",
          "  <!-- RecommendArea: \u52a0\u8f7d\u5f69\u6761 OR \u63a8\u8350\u5217\u8868 OR \u7a7a -->",
          "  <!-- \u72b6\u6001 A: loading \u5f69\u6761 -->",
          `  <div class=\"loading-bar\" style=\"height:${t.recommendBarHeightPx}px; border-radius:${t.recommendBarRadiusPx}px;`,
          `                                   animation: stripeMove ${t.stripeAnimDurationSec}s linear infinite;\"></div>`,
          "",
          "  <!-- \u72b6\u6001 B: \u63a8\u8350\u5217\u8868\uff08\u65e0\u8fb9\u6846\uff09 -->",
          `  <div class=\"recommend-list\" style=\"border-radius:${t.recommendWrapRadiusPx}px; padding:${t.recommendWrapPadPx}px;`,
          `                                     gap:${t.recommendWrapGapPx}px; border:0;\">`,
          `    <button class=\"recommend-item\" style=\"padding:${t.recommendItemPadY}px ${t.recommendItemPadX}px;`,
          `                                           border-radius:${t.recommendItemRadiusPx}px;\">\u63a8\u8350\u6587\u6848</button>`,
          "  </div>",
          "</div>",
          "```",
          "",
          "### 3.2 States\uff08\u4ea4\u4e92\u72b6\u6001\u673a\uff09\u2014\u2014\u5fc5\u987b\u8986\u76d6\u5168\u90e8",
          "",
          "| \u72b6\u6001 | RecommendArea \u5185\u5bb9 | \u8f93\u5165\u6846\u5185\u5bb9 | \u52a0\u8f7d\u5f69\u6761 |",
          "| --- | --- | --- | --- |",
          "| **Loading** | \u5f69\u6761\u52a8\u6548\uff08\u65e0\u63a8\u8350\u6587\u5b57\uff09 | placeholder | \u663e\u793a |",
          "| **\u5355\u6761\u63a8\u8350** | 1 \u6761\u53ef\u70b9\u51fb\u6761\u76ee | placeholder | \u4e0d\u663e\u793a |",
          "| **\u591a\u6761\u63a8\u8350** | 3 \u6761\u53ef\u70b9\u51fb\u6761\u76ee | placeholder | \u4e0d\u663e\u793a |",
          "| **\u8d85\u591a\u5b57\u6570** | \u5355\u884c\u7701\u7565; hover \u5c55\u5f00\u5168\u6587 | placeholder | \u4e0d\u663e\u793a |",
          "| **\u91c7\u7eb3\u540e** | **\u7acb\u523b\u6d88\u5931** RecommendArea | \u63a1\u7eb3\u6587\u6848\u9884\u586b | \u4e0d\u663e\u793a |",
          "| **\u91c7\u7eb3\u540e\u8f93\u5165\u6846** | \u65e0 | \u81ea\u9002\u5e94\u64a4\u9ad8\uff0c\u663e\u793a\u5168\u6587 | \u4e0d\u663e\u793a |",
          "| **Hover\uff08\u6761\u76ee\uff09** | \u6e10\u53d8\u53e0\u52a0\uff08\u89c1 \u00a72.5\uff09 | \u2014 | \u2014 |",
          "| **Focus\uff08\u8f93\u5165\u6846\uff09** | \u2014 | \u89e6\u53d1 focus ring | \u2014 |",
          "",
          "### 3.3 Component-Specific Tokens\uff08\u4ec5\u672c\u7ec4\u4ef6\u4f7f\u7528\uff09",
          "",
          `- \u5237\u65b0\u6309\u9215\u9634\u5f71\uff1a\`${t.refreshBtnShadow}\``,
          `- \u5237\u65b0\u6309\u9215 offset-right\uff1a${mdToken("refreshBtnOffsetRightPx", `${t.refreshBtnOffsetRightPx}px`)}`,
          `- \u5237\u65b0\u56fe\u6807\u8def\u5f84\uff1a\`${t.refreshIconSrc}\``,
          `- \u5f69\u6761\u52a8\u6548\u65f6\u957f\uff1a${mdToken("stripeAnimDurationSec", `${t.stripeAnimDurationSec}s`)}`,
          "",
          "---",
          "",
          "## \u00a74 Layout & Composition Logic\uff08\u5e03\u5c40\u4e0e\u7ec4\u5408\u903b\u8f91\uff09",
          "",
          "### 4.1 Container Rules\uff08\u5bb9\u5668\u89c4\u5219\uff09",
          "",
          "- **\u5bbd\u5ea6**\uff1a`width: 100%`\uff0c\u5fc5\u987b\u6491\u6ee1\u7236\u5bb9\u5668\uff0c**\u7981\u6b62 `max-width`**\u3002",
          "- **\u9ad8\u5ea6**\uff1a\u968f\u5185\u5bb9\u81ea\u9002\u5e94\uff08\u7981\u6b62\u56fa\u5b9a\u9ad8\u5ea6\uff09\u3002",
          "- **\u6ca1\u6709 AI \u63a8\u8350\u65f6**\uff1a\u8f93\u5165\u6846\u4e0b\u65b9**\u5b8c\u5168\u4e0d\u51fa\u73b0**\u5f69\u6761\u6216\u63a8\u8350\u5bb9\u5668\uff08\u4fdd\u6301\u5e72\u51c0\uff09\u3002",
          "",
          "### 4.2 Alignment\uff08\u5bf9\u9f50\uff09",
          "",
          "- TitleRow\uff1a`display:flex; align-items:center`\uff0c\u5b57\u6bb5\u540d\u4e0e AI \u6807\u7b7e\u5782\u76f4\u5c45\u4e2d\u5bf9\u9f50\u3002",
          `- InputWrapper\uff1a\u5237\u65b0\u6309\u9215 position:absolute \u53f3\u4fa7\u5b9a\u4f4d\uff0c\u5782\u76f4\u5c45\u4e2d\u3002`,
          "- RecommendList\uff1a`display:flex; flex-direction:column`\uff0c\u6761\u76ee\u5de6\u5bf9\u9f50\u3002",
          "",
          "### 4.3 Responsive Behavior\uff08\u54cd\u5e94\u5f0f\uff09",
          "",
          "- \u65e0\u65ad\u70b9\u53d8\u5316\uff0c\u5bbd\u5ea6\u59cb\u7ec8\u6091\u6ee1\u5bb9\u5668\u3002",
          "",
          "---",
          "",
          "## \u00a75 Motion & Interaction\uff08\u52a8\u6548\u4e0e\u5fae\u4ea4\u4e92\uff09",
          "",
          "### 5.1 Loading \u5f69\u6761\u52a8\u6548",
          "",
          `- **\u89e6\u53d1**\uff1aAI \u8bfb\u53d6\u63a8\u8350\u4e2d\uff08loading\u72b6\u6001\uff09\u65f6\u663e\u793a\u5f69\u6761\u3002`,
          `- **Duration**\uff1a${mdToken("stripeAnimDurationSec", `${t.stripeAnimDurationSec}s`)}\uff0cLinear\uff0c\u5faa\u73af\u3002`,
          "- **Easing**\uff1a`linear`",
          `- **\u5f69\u6761\u80cc\u666f**\uff1a\u89c1 \u00a72.5 \u4e2d\u7684 recommendBarBg\u3002`,
          `- **\u9ad8\u5ea6**\uff1a${mdToken("recommendBarHeightPx", `${t.recommendBarHeightPx}px`)}\uff1b\u5706\u89d2\uff1a${mdToken("recommendBarRadiusPx", `${t.recommendBarRadiusPx}px`)}\u3002`,
          "",
          "### 5.2 \u63a8\u8350\u6761\u76ee Hover",
          "",
          `- **Trigger**\uff1amouseenter \u63a8\u8350\u6761\u76ee \u2192 \u80cc\u666f\u53e0\u52a0 recommendItemBgHover\uff08\u89c1 \u00a72.5\uff09`,
          "- **Duration**\uff1a`transition: background-image 150ms ease`",
          "- **\u8d85\u591a\u5b57\u6570\u5c55\u5f00**\uff1ahover \u65f6\u53bb\u9664\u5355\u884c\u7701\u7565\uff0c\u5c55\u5f00\u5168\u6587\uff0c`transition: max-height 200ms ease`\u3002",
          "",
          "### 5.3 \u91c7\u7eb3\u4ea4\u4e92",
          "",
          "- **\u70b9\u51fb\u6761\u76ee**\uff1a\u6587\u6848\u9884\u586b\u81f3\u8f93\u5165\u6846\uff1bRecommendArea **\u7acb\u523b\u6d88\u5931**\uff08display:none\uff09\u3002",
          "- **\u7981\u6b62**\uff1a\u91c7\u7eb3\u540e RecommendArea \u6307\u5ef6\u6d88\u5931\uff08\u5fc5\u987b\u7acb\u5373\u6d88\u5931\uff09\u3002",
          "",
          "### 5.4 \u5237\u65b0\u6309\u9215\uff08Refresh Button\uff09\u4ea4\u4e92",
          "",
          `- **\u663e\u793a\u89e6\u53d1**\uff1amouseenter input-wrapper \u2192 \u5237\u65b0\u6309\u9215\u7acb\u5373\u51fa\u73b0\uff08position:absolute\uff0c right:${mdToken("refreshBtnOffsetRightPx", `${t.refreshBtnOffsetRightPx}px`)}\uff0c\u5782\u76f4\u5c45\u4e2d\uff09\u3002`,
          "- **\u9690\u85cf\u89e6\u53d1**\uff1amouseleave input-wrapper \u2192 \u6309\u9215\u7acb\u5373\u9690\u85cf\u3002",
          "- **\u70b9\u51fb\u884c\u4e3a**\uff1a\u70b9\u51fb\u5237\u65b0\u6309\u9215 \u2192 \u56fe\u6807\u5f00\u59cb\u65cb\u8f6c\u52a8\u6548\uff08spin 0.8s linear infinite\uff09\u2192 \u5237\u65b0\u5f69\u6761\u52a8\u6548\u51fa\u73b0 \u2192 \u65b0\u4e00\u8f6e\u63a8\u8350\u52a0\u8f7d\u5b8c\u6210\u540e\u5f69\u6761\u6d88\u5931\u3001\u63a8\u8350\u5185\u5bb9\u91cd\u65b0\u5c55\u793a\u3002",
          "- **\u4e0d\u5206\u5834\u666f**\uff1a\u4e0d\u8bba\u662f\u5426\u5df2\u91c7\u7eb3\u5185\u5bb9\uff0c\u6309\u9215 hover \u65f6\u5747\u53ef\u89c1\uff1b\u70b9\u51fb\u540e\u91cd\u7f6e\u91c7\u7eb3\u72b6\u6001\u5e76\u91cd\u65b0\u751f\u6210\u63a8\u8350\u3002",
          `- **\u56fe\u6807\u6837\u5f0f**\uff1a16\u00d716px SVG\uff0c\u586b\u5145\u5fc5\u987b\u4f7f\u7528 refreshIconGradient \u6e10\u53d8\uff08\u7981\u6b62\u7eaf\u8272\uff09\u3002`,
          `- **\u6309\u9215\u80cc\u666f**\uff1a${mdToken("refreshBtnBg", t.refreshBtnBg)}\uff0c\u8fb9\u6846\uff1a${mdToken("refreshBtnBorder", t.refreshBtnBorder)}\uff0c\u5706\u89d2\uff1a${mdToken("refreshBtnRadiusPx", `${t.refreshBtnRadiusPx}px`)}\uff0c\u9634\u5f71\uff1aL3\u3002`,
          "",
          "**\u5237\u65b0\u6309\u9215\u56fe\u6807\u6e10\u53d8\uff08\u5fc5\u987b\u539f\u6837\uff09**\uff1a",
          "```css",
          `background-image: ${t.refreshIconGradient};`,
          "background-clip: text; -webkit-background-clip: text; color: transparent;",
          "/* \u6216 SVG linearGradient stops \u63d0\u53d6\u81ea\u8be5\u6e10\u53d8\u5b57\u7b26\u4e32 */",
          "```",
          "",
          "---",
          "",
          "## \u00a76 Anti-Patterns & Constraints\uff08\u8d1f\u9762\u7ea6\u675f / \u907f\u5751\u6307\u5357\uff09",
          "",
          "### \u274c \u7edd\u5bf9\u7981\u6b62\uff08DON'Ts\uff09",
          "",
          "- **\u7981\u6b62**\u5f15\u5165 Tailwind \u9ed8\u8ba4\u8272\u677f\u540d\u2014\u2014\u5fc5\u987b\u4f7f\u7528 Token \u663e\u5f0f\u6570\u503c\u3002",
          "- **\u7981\u6b62**\u6539\u52a8 AI \u6807\u7b7e\u4e0e\u63a8\u8350\u5f69\u6761\u7684\u6e10\u53d8\u914d\u65b9\u4e0e\u987a\u5e8f\u3002",
          "- **\u7981\u6b62**\u5f15\u5165\u9634\u5f71\u3001\u73bb\u7483\u6001\u3001\u989d\u5916\u63cf\u8fb9\u4f53\u7cfb\u3002",
          "- **\u7981\u6b62**\u5f53\u6ca1\u6709 AI \u63a8\u8350\u65f6\u5c55\u793a\u5f69\u6761\u6216\u63a8\u8350\u5bb9\u5668\u3002",
          "- **\u7981\u6b62**\u91c7\u7eb3\u540e\u5ef6\u8fdf\u6d88\u5931 RecommendArea\uff08\u5fc5\u987b\u7acb\u5373\u6d88\u5931\uff09\u3002",
          "- **\u7981\u6b62**\u7ed9\u63a8\u8350\u5bb9\u5668\u52a0 border\uff08\u5c9b radius \u306f\u5fc5\u8981\uff0c\u4f46 border \u5fc5\u987b\u4e3a 0\uff09\u3002",
          "- **\u7981\u6b62**\u8bbe\u5b9a `max-width` \u6216\u56fa\u5b9a `height`\u3002",
          "- **\u7981\u6b62**\u4f7f\u7528\u7eaf\u9ed1 `#000000`\u2014\u2014\u6b63\u6587\u5fc5\u987b\u4e3a `#222727`\u3002",
          "- **\u7981\u6b62**\u5237\u65b0\u6309\u9215\u56fe\u6807\u4f7f\u7528\u7eaf\u8272\uff08\u5982 `#222727`\uff09\u2014\u2014\u5fc5\u987b\u4f7f\u7528 `refreshIconGradient` \u6e10\u53d8\u8272\u3002",
          "- **\u7981\u6b62**\u5c06\u5237\u65b0\u6309\u9215\u8bbe\u4e3a\u59cb\u7ec8\u53ef\u89c1\u2014\u2014\u5fc5\u987b\u5c45\u540d hover \u8f93\u5165\u6846\u533a\u57df\u65f6\u624d\u51fa\u73b0\u3002",
          "",
          "### \u2705 \u5fc5\u987b\u786e\u4fdd\uff08DOs\uff09",
          "",
          "- \u5916\u5c42\u5fc5\u987b `width: 100%`\u3002",
          "- \u5fc5\u987b\u652f\u6301\u5168\u90e8\u72b6\u6001\uff1aLoading / \u5355\u6761 / \u591a\u6761 / \u8d85\u591a\u5b57\u6570 / \u91c7\u7eb3\u540e\u3002",
          "- \u91c7\u7eb3\u540e RecommendArea \u5fc5\u987b\u7acb\u523b\u6d88\u5931\u3002",
          "- AI \u6807\u7b7e\u6e10\u53d8\u914d\u65b9\u5fc5\u987b\u4e0e \u00a72.5 \u4e00\u81f4\u3002",
          "",
          "---",
          "",
          "## \u00a77 Validation Rules\uff08\u6821\u9a8c\u6761\u4ef6 / \u4e0a\u7ebf\u524d\u5fc5\u67e5\u6e05\u5355\uff09",
          "",
          "> \u751f\u6210\u4ee3\u7801\u540e\uff0c\u8bf7\u9010\u6761\u6838\u67e5\u4ee5\u4e0b\u6761\u4ef6\uff0c**\u5168\u90e8\u901a\u8fc7**\u65b9\u53ef\u8ba4\u4e3a\u5b9e\u73b0\u5b8c\u6210\u3002",
          "",
          "- [ ] DOM \u5c42\u7ea7\u5305\u542b\uff1aform-recommend \u2192 title-row \u2192 input-wrapper \u2192 [loading-bar | recommend-list | (empty)]",
          "- [ ] title-row \u542b AI \u6807\u7b7e\uff08\u6e10\u53d8\u6587\u5b57 + \u6e10\u53d8\u80cc\u666f\uff09",
          `- [ ] input-wrapper background = ${t.inputBg}\uff0cborder-radius = ${t.inputRadiusPx}px`,
          "- [ ] loading \u65f6\u663e\u793a\u5f69\u6761\uff0c\u65e0\u63a8\u8350\u6587\u5b57",
          "- [ ] \u63a8\u8350\u5bb9\u5668 border = 0\uff08\u65e0\u8fb9\u6846\uff09",
          "- [ ] \u91c7\u7eb3\u540e RecommendArea \u7acb\u523b\u6d88\u5931",
          "- [ ] \u91c7\u7eb3\u540e\u8f93\u5165\u6846\u81ea\u9002\u5e94\u6491\u9ad8\u5c55\u793a\u5168\u6587",
          "- [ ] \u9f50\u4e0b\u65e0 AI \u63a8\u8350\u65f6\uff0c\u8f93\u5165\u6846\u4e0b\u65b9\u6ca1\u6709\u5f69\u6761\u6216\u63a8\u8350\u5e94\u5bb9\u5668",
          "- [ ] \u65e0 box-shadow\u3001\u65e0 Tailwind \u9ed8\u8ba4\u8272\u540d",
          `- [ ] \u5237\u65b0\u6309\u9215\uff1ahover input-wrapper \u65f6\u53ef\u89c1\uff0cright=${t.refreshBtnOffsetRightPx}px \u5782\u76f4\u5c45\u4e2d`,
          "- [ ] \u5237\u65b0\u56fe\u6807\u4f7f\u7528 AI \u4e3b\u9898\u6e10\u53d8\uff08\u9752\u2192\u84dd\u2192\u7d2b\u2192\u7c89\uff09\uff0c\u7981\u6b62\u7eaf\u8272",
          "- [ ] \u5237\u65b0\u70b9\u51fb\u540e\uff1a\u56fe\u6807\u65cb\u8f6c + \u5f69\u6761\u52a8\u6548\u51fa\u73b0 + \u5b8c\u6210\u540e\u63a8\u8350\u91cd\u65b0\u5c55\u793a",
          "",
          "---",
          "",
          "## \u00a78 Few-Shot Code Example\uff08\u53c2\u8003\u5b9e\u73b0\u7247\u6bb5\uff09",
          "",
          "```jsx",
          "// \u2705 \u6b63\u786e\uff1a\u8868\u5355\u63a8\u8350\u72b6\u6001\u5207\u6362\u793a\u4f8b",
          "function FormRecommend({ loading, recommendations, onAdopt }) {",
          "  const [adopted, setAdopted] = useState(false);",
          "  const showBar = loading;",
          "  const showList = !loading && recommendations.length > 0 && !adopted;",
          "  return (",
          `    <div style={{ display:'flex', flexDirection:'column', gap:'${t.gapOuterPx}px', width:'100%' }}>`,
          "      {/* TitleRow */}",
          `      <div style={{ display:'flex', alignItems:'center', gap:'${t.titleGapPx}px' }}>`,
          "        <label>{fieldName}</label>",
          "        <span style={{ /* AI \u6807\u7b7e\u6e10\u53d8 */ }}>\u2728 AI</span>",
          "      </div>",
          "      {/* InputWrapper */}",
          `      <div style={{ position:'relative', background:'${t.inputBg}', borderRadius:'${t.inputRadiusPx}px' }}>`,
          "        <input style={{ width:'100%' }} />",
          "        <RefreshButton />",
          "      </div>",
          "      {/* RecommendArea \u2014 \u4e09\u6001\u4e92\u65a5 */}",
          "      {showBar && <LoadingStripe />}",
          "      {showList && (",

      function getIn(obj, path) {
        return path.split(".").reduce((acc, key) => (acc == null ? acc : acc[key]), obj);
      }

      function setIn(obj, path, value) {
        const keys = path.split(".");
        const root = Array.isArray(obj) ? obj.slice() : { ...obj };
        let cur = root;
        for (let i = 0; i < keys.length - 1; i++) {
          const k = keys[i];
          const next = cur[k];
          cur[k] = Array.isArray(next) ? next.slice() : { ...(next || {}) };
          cur = cur[k];
        }
        cur[keys[keys.length - 1]] = value;
        return root;
      }

      function parseMaybeNumber(v) {
        if (typeof v !== "string") return v;
        const trimmed = v.trim();
        if (trimmed === "") return v;
        const n = Number(trimmed);
        return Number.isFinite(n) ? n : v;
      }

      function deepClone(v) {
        try {
          return structuredClone(v);
        } catch {
          return JSON.parse(JSON.stringify(v));
        }
      }

      function ColorSwatch({ value }) {
        return (
          <div
            className="shrink-0 h-[28px] w-[28px] rounded-[6px] border border-[rgba(45,66,107,0.15)] overflow-hidden"
            style={{
              background:
                "repeating-conic-gradient(rgba(0,0,0,0.06) 0% 25%, transparent 0% 50%) 0 0 / 10px 10px",
            }}
          >
            <div className="w-full h-full" style={{ background: String(value || "transparent") }} />
          </div>
        );
      }

      // ─── Foundation Color Picker ─────────────────────────────────────────────
      // Displays a dropdown with all foundation palette colors + special/text colors.
      // Value is stored as a foundation token reference (e.g. "semi-brand-5").
      function FoundationColorPicker({ value, onChange, palette }) {
        const [open, setOpen] = useState(false);
        const rootRef = useRef(null);

        useEffect(() => {
          if (!open) return;
          function onDown(e) {
            if (rootRef.current && !rootRef.current.contains(e.target)) setOpen(false);
          }
          document.addEventListener("mousedown", onDown);
          return () => document.removeEventListener("mousedown", onDown);
        }, [open]);

        const resolved = resolveFoundationColor(value, palette || {});
        const isRef = typeof value === "string" && value.startsWith("semi-");

        const specialColors = [
          { key: "semi-color-white",     label: "White",     hex: "#FFFFFF" },
          { key: "semi-color-black",     label: "Black",     hex: "#000000" },
          { key: "semi-color-dark-text", label: "Dark Text", hex: "#222727" },
        ];

        return (
          <div ref={rootRef} className="relative">
            {/* Trigger button */}
            <button
              type="button"
              onClick={() => setOpen(!open)}
              className="flex items-center gap-[6px] w-full h-[30px] px-[8px] bg-white border border-[rgba(45,66,107,0.12)] rounded-[7px] hover:border-black transition-colors outline-none"
            >
              {/* Swatch */}
              <div className="shrink-0 w-[16px] h-[16px] rounded-[3px] border border-[rgba(45,66,107,0.15)] overflow-hidden"
                style={{ background: "repeating-conic-gradient(rgba(0,0,0,0.06) 0% 25%, transparent 0% 50%) 0 0/6px 6px" }}>
                <div className="w-full h-full" style={{ background: resolved }} />
              </div>
              {/* Label */}
              <span className="text-[10px] font-mono text-[rgba(34,39,39,0.6)] flex-1 text-left truncate">
                {isRef ? value : resolved}
              </span>
              {/* Chevron */}
              <svg viewBox="0 0 8 5" width="8" height="5" className="shrink-0 text-[rgba(34,39,39,0.35)]" fill="none">
                <path d="M1 1l3 3 3-3" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </button>

            {/* Dropdown panel */}
            {open && (
              <div
                className="absolute top-[34px] left-0 right-0 z-[9999] bg-white border border-[rgba(45,66,107,0.12)] rounded-[10px] shadow-xl overflow-auto"
                style={{ maxHeight: 300 }}
              >
                {/* Special colors */}
                <div className="px-[10px] pt-[10px] pb-[8px] border-b border-[rgba(45,66,107,0.06)]">
                  <div className="text-[9px] font-bold text-[rgba(34,39,39,0.4)] uppercase tracking-wider mb-[6px]">特殊色</div>
                  <div className="flex gap-[5px]">
                    {specialColors.map(sc => (
                      <button
                        key={sc.key}
                        type="button"
                        title={`${sc.key} · ${sc.hex}`}
                        onClick={() => { onChange(sc.key); setOpen(false); }}
                        className={cx(
                          "w-[20px] h-[20px] rounded-[4px] border-[2px] transition-all",
                          value === sc.key ? "border-black scale-110" : "border-[rgba(45,66,107,0.15)] hover:border-[rgba(0,0,0,0.3)]",
                        )}
                        style={{ background: sc.hex, outline: sc.hex === "#FFFFFF" ? "1px solid rgba(45,66,107,0.08)" : "none" }}
                      />
                    ))}
                  </div>
                </div>

                {/* Text colors (rgba) */}
                <div className="px-[10px] pt-[8px] pb-[8px] border-b border-[rgba(45,66,107,0.06)]">
                  <div className="text-[9px] font-bold text-[rgba(34,39,39,0.4)] uppercase tracking-wider mb-[6px]">文字色</div>
                  <div className="flex gap-[5px]">
                    {(typeof FOUNDATION_TEXT_INIT !== "undefined" ? FOUNDATION_TEXT_INIT : []).map(t => (
                      <button
                        key={t.key}
                        type="button"
                        title={`${t.key} · rgba(34,39,39,${t.alpha})`}
                        onClick={() => { onChange(t.key); setOpen(false); }}
                        className={cx(
                          "w-[20px] h-[20px] rounded-[4px] border-[2px] transition-all",
                          value === t.key ? "border-black scale-110" : "border-[rgba(45,66,107,0.15)] hover:border-[rgba(0,0,0,0.3)]",

        const isColorType = type === "color" || type === "css-color";

        return (
          <div
            className="flex flex-col gap-[4px]"
            onMouseEnter={() => onHoverChange?.(path)}

              <FoundationColorPicker

      function FormRecommend({
        label = "问题描述",
        placeholder = "请输入",
        scenario = "multi", // 'loading' | 'single' | 'multi'
        resetNonce = 0,
        disabled = false,
        highlightTarget,
        tokens,
      }) {
        const t = tokens || FORM_RECOMMEND_TOKENS;
        const hl = (key) =>
          highlightTarget === key ? `ring-2 ring-[${t.focusRing}] ring-offset-2 ring-offset-[rgba(255,255,255,0.75)]` : "";

        const [value, setValue] = useState("");
        const [adopted, setAdopted] = useState(false);
        const [selectedIdx, setSelectedIdx] = useState(-1);
        const [hoverIdx, setHoverIdx] = useState(-1);
        const [inputHovered, setInputHovered] = useState(false);
        const [refreshing, setRefreshing] = useState(false);

        const recommendItems = useMemo(() => {
          if (scenario === "single")
            return [
              "视频被误判违规，申诉未通过",

          if (scenario === "multi")
            return [
              "账号无法登录，验证码一直失败",
              "申诉入口找不到，页面一直跳转",
              "订单退款失败，进度长时间卡住",

          if (scenario === "ultra")
            return [
              "用户反馈账号突然被封禁，提示存在异常风险，但其表示从未进行违规操作；已尝试提交申诉与补充材料仍未通过，希望尽快恢复账号登录与发布权限，并确认后续如何避免再次触发风控。",
              "用户表示短视频被系统判定违规下架，已对照社区规范但认为内容合规；多次申诉均被驳回，要求说明具体违规点、提供可修改建议，并希望尽快恢复作品展示以减少影响。",
              "用户咨询订单退款进度一直卡在“处理中”，已超过承诺时效；担心资金安全，要求查询退款状态、明确预计到账时间，并提供遇到异常时的处理路径与可联系的人工渠道。",
            ];
          return [];
        }, [scenario]);

        // Reset & scenario change should restore initial state
        useEffect(() => {
          setValue("");
          setAdopted(false);
          setSelectedIdx(-1);
          setHoverIdx(-1);
        }, [resetNonce, scenario]);

        function adopt(idx) {
          if (disabled) return;
          const next = recommendItems?.[idx] || "";
          if (!next) return;
          setSelectedIdx(idx);
          setValue(next);
          // after adopting, bottom stripe/list disappears (user accepted)
          setAdopted(true);
        }

        function handleRefresh() {
          if (disabled || refreshing) return;
          setRefreshing(true);
          setAdopted(false);
          setSelectedIdx(-1);
          setTimeout(() => setRefreshing(false), 1500);
        }

        const hasRecommend = recommendItems.length > 0;
        // loading 场景或手动刷新中：显示彩色渐变骨架动效条
        const showStripe = (scenario === "loading" || refreshing) && !adopted;
        const showList = (scenario === "single" || scenario === "multi" || scenario === "ultra") && hasRecommend && !adopted && !refreshing;

        return (

                      `text-[${t.placeholderFontSizePx}px] leading-[${t.placeholderLineHeightPx}px]`,

                      value ? "whitespace-pre-wrap break-words" : "whitespace-nowrap overflow-hidden text-ellipsis",

                  >

                <div className={cx("shrink-0", `size-[16px]`)} />

              {/* Hover 时始终显示【刷新推荐】按钮，不论是否已采纳推荐 */}

                  style={{
                    position: "absolute",
                    right: 6,
                    top: "50%",
                    transform: "translateY(-50%)",

                    border: "1px solid rgba(34,39,39,0.09)",
                    borderRadius: 6,

                    cursor: refreshing ? "not-allowed" : "pointer",

                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    zIndex: 2,

                            {stops.map((c, i) => <stop key={i} offset={offsets[i] || "100%"} stopColor={c} />)}

                        </defs>
                      );
                    })()}
                    <path
                      fillRule="evenodd"
                      clipRule="evenodd"
                      d="M0 6.66667C0 2.98477 2.98477 0 6.66667 0C8.50826 0 10.1765 0.747596 11.3823 1.95425C11.8088 2.38097 12.2654 2.90832 12.6667 3.39629V1.33333C12.6667 0.965143 12.9651 0.666667 13.3333 0.666667C13.7015 0.666667 14 0.965143 14 1.33333V5.33333C14 5.70152 13.7015 6 13.3333 6H9.33333C8.96514 6 8.66667 5.70152 8.66667 5.33333C8.66667 4.96514 8.96514 4.66667 9.33333 4.66667H11.9795C11.518 4.08752 10.9444 3.40224 10.4392 2.89674C9.47323 1.93009 8.14027 1.33333 6.66667 1.33333C3.72115 1.33333 1.33333 3.72115 1.33333 6.66667C1.33333 9.61218 3.72115 12 6.66667 12C9.09716 12 11.1495 10.3737 11.7916 8.1485C11.8937 7.79474 12.2632 7.59072 12.617 7.6928C12.9707 7.79488 13.1748 8.16441 13.0727 8.51817C12.2703 11.2987 9.70697 13.3333 6.66667 13.3333C2.98477 13.3333 0 10.3486 0 6.66667Z"
                      fill="url(#recoRefreshGrad)"

                  disabled && "opacity-70",

                style={{ backgroundImage: t.recommendWrapBg }}
                role="listbox"
                aria-label="AI 推荐内容"
              >
                {(recommendItems || []).slice(0, 3).map((txt, idx) => {
                  const isSel = idx === selectedIdx;
                  const isHover = idx === hoverIdx && !isSel;
                  return (
                    <button
                      key={idx}
                      type="button"
                      className={cx(
                        cx("w-full text-left flex", isHover ? "items-start" : "items-center"),
                        `px-[${t.recommendItemPadX}px] py-[${t.recommendItemPadY}px] rounded-[${t.recommendItemRadiusPx}px]`,
                        "outline-none focus:ring-1",
                        `focus:ring-[${t.focusRing}]`,

                      style={

                      onClick={() => adopt(idx)}

      async function loadIconLibraryManifest() {
        const url = resolveAssetUrl("./icon-library/manifest.json");

          return await res.json();

          return ICON_LIBRARY_INLINE.manifest;

      async function loadIconLibraryCategory(file) {
        const url = resolveAssetUrl(`./icon-library/${file}`);
        try {
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) throw new Error(String(res.status));
          return await res.json();

          const key = String(file || "").replace(/\\.json$/i, "");
          return ICON_LIBRARY_INLINE.categories?.[key] || { icons: [] };

      // Preload minimal icon set so other components can render icons
      // even if the user hasn't opened the Icon Library tab yet.
      (async () => {
        try {
          const data = await loadIconLibraryCategory("AIInput.json");
          const list = data?.icons || [];
          const dict = window.__ICON_LIBRARY__?.byName;
          if (dict) {
            list.forEach((ic) => {

            });

      function insetClassToStyle(insetCls) {
        // inset-[top_right_bottom_left] (underscore-separated), supports 1/2/3/4 values like CSS shorthand.
        const raw = String(insetCls || "");
        const m = raw.match(/^inset-\[(.*)\]$/);
        if (!m) return { inset: 0 };
        const v = String(m[1] || "").trim();
        if (!v) return { inset: 0 };
        const parts = v.split("_").map((s) => s.trim()).filter(Boolean);
        const [a, b, c, d] = parts;
        if (parts.length === 1) return { top: a, right: a, bottom: a, left: a };
        if (parts.length === 2) return { top: a, right: b, bottom: a, left: b };
        if (parts.length === 3) return { top: a, right: b, bottom: c, left: b };
        if (parts.length >= 4) return { top: a, right: b, bottom: c, left: d };
        return { inset: 0 };
      }

      function renderIconFromLibrary({ name, size, fallbackUrl, fallbackInset, imgStyle }) {
        const icon = window.getIcon?.(name);
        const url = icon?.url || fallbackUrl || "";
        const insetCls = icon?.inset || fallbackInset || "inset-[0px]";
        return (
          <span className={cx("relative block overflow-hidden", `size-[${size}px]`)}>
            <span className="absolute" style={insetClassToStyle(insetCls)}>
              <img alt="" src={url} className="block w-full h-full" style={imgStyle} />
            </span>

        );

      function IconLibraryView({ tokens }) {
        const t = tokens || ICON_LIBRARY_TOKENS;
        const [manifest, setManifest] = useState(null);
        const [activeCat, setActiveCat] = useState(null);
        const [icons, setIcons] = useState([]);
        const [query, setQuery] = useState("");
        const [copiedName, setCopiedName] = useState("");
        const [err, setErr] = useState("");

        useEffect(() => {
          let alive = true;
          (async () => {
            try {
              const m = await loadIconLibraryManifest();
              if (!alive) return;
              setManifest(m);
              const first = m?.categories?.[0]?.id || null;
              setActiveCat(first);
            } catch (e) {
              if (!alive) return;
              setErr(String(e?.message || e));
            }
          })();
          return () => {
            alive = false;
          };
        }, []);

        useEffect(() => {
          let alive = true;
          if (!manifest || !activeCat) return;
          const item = (manifest.categories || []).find((c) => c.id === activeCat);
          if (!item) return;
          (async () => {
            try {
              setErr("");
              const data = await loadIconLibraryCategory(item.file);
              if (!alive) return;
              const list = data?.icons || [];
              setIcons(list);
              try {
                const dict = window.__ICON_LIBRARY__?.byName;
                if (dict) {
                  list.forEach((ic) => {
                    if (ic?.name) dict[String(ic.name)] = ic;
                  });
                }
              } catch {}
            } catch (e) {
              if (!alive) return;
              setErr(String(e?.message || e));
            }
          })();
          return () => {
            alive = false;
          };
        }, [manifest, activeCat]);

        const filtered = useMemo(() => {
          const q = String(query || "").trim().toLowerCase();
          if (!q) return icons;
          return (icons || []).filter((ic) => String(ic.name || "").toLowerCase().includes(q));
        }, [icons, query]);

        function copyName(name) {
          const v = String(name || "");
          try {
            navigator.clipboard?.writeText?.(v);
          } catch {}
          setCopiedName(v);
          window.clearTimeout(copyName._t);
          copyName._t = window.setTimeout(() => setCopiedName(""), 900);
        }

        function IconGlyph({ icon }) {
          const size = t.previewSizePx;
          const insetCls = icon?.inset || "inset-[0px]";
          return (
            <div className="relative" style={{ width: size, height: size }}>
              <span className="absolute" style={insetClassToStyle(insetCls)}>
                <img alt="" src={icon?.url} className="block w-full h-full" />
              </span>
            </div>
          );
        }

        return (
          <div className="w-full h-full flex flex-col" style={{ fontFamily: t.fontFamily }}>
            <div className="p-[16px] border-b border-[rgba(45,66,107,0.12)] flex items-center gap-[12px]">
              <div className="flex items-center gap-[8px]">
                <div className="text-[#222727] text-sm font-semibold">分类</div>
                <select
                  className={cx(
                    "h-[36px] px-[10px] rounded-[10px] border bg-[#ffffff] text-sm outline-none focus:ring-1",
                    `border-[${t.searchBorder}]`,
                    `focus:ring-[${t.focusRing}]`,
                  )}
                  value={activeCat || ""}
                  onChange={(e) => setActiveCat(e.target.value)}
                >
                  {(manifest?.categories || []).map((c) => (
                    <option key={c.id} value={c.id}>
                      {c.label} ({c.count})
                    </option>
                  ))}
                </select>
              </div>

              <div className="flex-1 min-w-0">
                <input
                  className={cx(
                    "w-full border bg-[#ffffff] px-[12px] text-sm outline-none focus:ring-1",
                    `h-[${t.searchHeightPx}px] rounded-[${t.searchRadiusPx}px]`,
                    `border-[${t.searchBorder}]`,
                    `focus:ring-[${t.focusRing}]`,
                  )}
                  placeholder="搜索图标名称（如 user / send / chart）"
                  value={query}
                  onChange={(e) => setQuery(e.target.value)}
                />
              </div>

              <div className="shrink-0 text-xs text-[rgba(34,39,39,0.6)] whitespace-nowrap">
                {copiedName ? `已复制：${copiedName}` : `${filtered.length}/${icons.length}`}
              </div>
            </div>

            {err ? (
              <div className="p-[16px] text-sm text-[#f74331]">{err}</div>
            ) : (
              <div className="flex-1 overflow-auto p-[16px]">
                <div
                  className="grid"
                  style={{
                    gridTemplateColumns: `repeat(auto-fill, minmax(${t.cellSizePx}px, 1fr))`,
                    gap: `${t.gridGapPx}px`,
                  }}
                >
                  {filtered.map((ic) => (
                    <button
                      key={ic.name}
                      type="button"
                      className={cx(
                        "text-left border border-solid",
                        `rounded-[${t.cellRadiusPx}px]`,
                        "p-[10px] flex flex-col items-start gap-[8px]",
                        "outline-none focus:ring-1",
                        `focus:ring-[${t.focusRing}]`,
                      )}
                      style={{ backgroundColor: t.cellBg, borderColor: t.cellBorder }}
                      onClick={() => copyName(ic.name)}
                      title={`点击复制：${ic.name}`}
                    >
                      <IconGlyph icon={ic} />
                      <div className={cx("w-full overflow-hidden text-ellipsis whitespace-nowrap", `text-[${t.nameTextSizePx}px] leading-[${t.nameLineHeightPx}px]`)} style={{ color: t.nameColor }}>
                        {ic.name}
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      }
      
      /**
       * 智能摘要 / 服务摘要（基于 Figma 节点 1859:41080 的骨架还原）
       * - 支持交互态：hover/focus/active/disabled/loading/empty/error/success + 折叠/复制/刷新/反馈
       */
      function SmartSummaryCard({
        title,
        items,
        tags,
        updatedAt,
        defaultCollapsed = false,
        state = "ready", // ready | loading | empty | error
        disabled = false,
        showActions = { copy: false, refresh: false, feedback: false },
        tokens,
        highlightTarget,
        showUpdatedAt = true,
        showTags = true,
        onRetry,
        onRefresh,
        onCopy,
        onFeedback,
        onTagClick,
      }) {
        const panelId = useId();
        const [collapsed, setCollapsed] = useState(defaultCollapsed);
        const [toast, setToast] = useState(null); // { type: 'success'|'danger', text: string }
        const [feedback, setFeedback] = useState(null); // 'up' | 'down' | null
        const liveRef = useRef(null);
        const containerRef = useRef(null);
        const [measuredH, setMeasuredH] = useState(0);
        
        const computedTags = useMemo(() => {
          return (tags || []).slice(0, 6);
        }, [tags]);
        
        function pushToast(next) {
          setToast(next);
          window.clearTimeout(pushToast._t);
          pushToast._t = window.setTimeout(() => setToast(null), 1600);
        }
        
        async function handleCopy() {
          if (disabled || state !== "ready") return;
          const text = (items || []).join("\\n");
          try {
            await navigator.clipboard.writeText(text);
            pushToast({ type: "success", text: "已复制" });
            onCopy?.(text);
          } catch (e) {
            pushToast({ type: "danger", text: "复制失败" });
          }
        }
        
        function handleRefresh() {
          if (disabled) return;
          pushToast({ type: "success", text: "已触发刷新" });
          onRefresh?.();
        }
        
        function handleRetry() {
          if (disabled) return;
          pushToast({ type: "success", text: "已重试" });
          onRetry?.();
        }
        
        function handleFeedback(next) {
          if (disabled || state !== "ready") return;
          const v = feedback === next ? null : next;
          setFeedback(v);
          onFeedback?.(v);
          if (v) pushToast({ type: "success", text: v === "up" ? "已反馈：有帮助" : "已反馈：无帮助" });
        }
        
        const isInteractive = !disabled;
        const isBusy = state === "loading";
        const isError = state === "error";
        const isEmpty = state === "empty";
        
        const t = tokens || SMART_SUMMARY_TOKENS;
        const gradientStopPct =
          measuredH > 0 && measuredH < t.gradientThresholdPx ? t.gradientStopSmallPct : t.gradientStopLargePct;
        const containerGradient =
          `linear-gradient(180deg, rgba(255,255,255,0) 0%, #ffffff ${gradientStopPct}%), ` +
          `linear-gradient(${t.gradientAngleDeg}deg, ${t.gradient2}), ` +
          "linear-gradient(90deg, #ffffff 0%, #ffffff 100%)";
        const hl = (key) =>
          highlightTarget === key ? `ring-2 ring-[${t.focusRing}] ring-offset-2 ring-offset-[rgba(255,255,255,0.75)]` : "";
        
        const outer = cx(
          // 宽度：自适应撑满父容器
          `relative w-full rounded-[${t.radiusOuterPx}px] border border-[${t.borderOuter}] p-[${t.paddingOuterPx}px] flex flex-col gap-[${t.gapOuterPx}px]`,
          disabled && "opacity-60 cursor-not-allowed",
        );
        
        useEffect(() => {
          const el = containerRef.current;
          if (!el || typeof ResizeObserver === "undefined") return;
          const ro = new ResizeObserver((entries) => {
            const box = entries?.[0]?.contentRect;
            if (!box) return;
            setMeasuredH(box.height);
          });
          ro.observe(el);
          return () => ro.disconnect();
        }, []);
        
        return (
          <section
            ref={containerRef}
            className={cx(outer, "bg-[#ffffff]")}
            style={{ backgroundImage: containerGradient }}
            aria-busy={isBusy ? "true" : "false"}
            aria-disabled={disabled ? "true" : "false"}
          >
            {/* Toast */}
            <div className="absolute right-[12px] top-[12px] z-10 pointer-events-none">
              {toast ? (
                <div
                  className={cx(
                    "px-[10px] py-[6px] rounded-[8px] text-xs border",
                    toast.type === "success"
                      ? "bg-[rgba(62,179,70,0.12)] border-[rgba(62,179,70,0.25)] text-[#3eb346]"
                      : "bg-[rgba(247,67,49,0.12)] border-[rgba(247,67,49,0.25)] text-[#f74331]",
                  )}
                  role="status"
                  aria-live="polite"
                  ref={liveRef}
                >
                  {toast.text}
                </div>
              ) : null}
            </div>
            
            {/* Header */}
            <div className={cx(`w-full rounded-[8px] px-[${t.headerPadX}px] py-[${t.headerPadY}px] flex items-center gap-[${t.headerGap}px]`, hl("header"))}>
              <img
                src={SUMMARY_ICON_SRC}
                alt=""
                aria-hidden="true"
                className={cx(`shrink-0 size-[${t.iconSize}px]`, hl("icon"))}
              />
              <div className={cx(`flex-1 overflow-hidden text-ellipsis whitespace-nowrap text-[${t.titleFontSizePx}px] leading-[${t.titleLineHeightPx}px] font-semibold`, hl("title"))}>
                {title}
              </div>
              
              <div className="flex items-center gap-[4px]">
                {showActions?.copy ? (
                  <button
                    type="button"
                    className={cx(
                      "h-[24px] w-[24px] rounded-[6px] p-[4px] flex items-center justify-center transition-colors",
                      isInteractive && "hover:bg-[rgba(83,96,143,0.07)]",
                      "outline-none focus:ring-1 focus:ring-black",
                      (!isInteractive || isBusy) && "pointer-events-none opacity-60",
                    )}
                    aria-label="复制摘要"
                    onClick={handleCopy}
                    disabled={!isInteractive || isBusy || isError || isEmpty}
                  >
                    <img src={SUMMARY_ICON_SRC} alt="" aria-hidden="true" className={`size-[${t.iconSize}px]`} />
                  </button>
                ) : null}
                
                {showActions?.refresh ? (
                  <button
                    type="button"
                    className={cx(
                      "h-[24px] w-[24px] rounded-[6px] p-[4px] flex items-center justify-center transition-colors",
                      isInteractive && "hover:bg-[rgba(83,96,143,0.07)] active:opacity-90",
                      "outline-none focus:ring-1 focus:ring-black",
                      (!isInteractive || isBusy) && "pointer-events-none opacity-60",
                    )}
                    aria-label="刷新摘要"
                    onClick={handleRefresh}
                    disabled={!isInteractive || isBusy}
                  >
                    <img src={SUMMARY_ICON_SRC} alt="" aria-hidden="true" className={cx(`size-[${t.iconSize}px]`, isBusy && "opacity-60")} />
                  </button>
                ) : null}
                
                <button
                  type="button"
                  className={cx(
                    `h-[${t.iconButtonSize}px] w-[${t.iconButtonSize}px] rounded-[${t.radiusIconButtonPx}px] p-[${t.iconButtonPad}px] flex items-center justify-center transition-colors`,
                    isInteractive && `hover:bg-[${t.hoverFill}] active:opacity-90`,
                    `outline-none focus:ring-1 focus:ring-[${t.focusRing}]`,
                    hl("collapse"),
                  )}
                  aria-label={collapsed ? "展开" : "收起"}
                  aria-expanded={collapsed ? "false" : "true"}
                  aria-controls={panelId}
                  onClick={() => {
                    if (!isInteractive) return;
                    setCollapsed((v) => !v);
                  }}
                  disabled={!isInteractive}
                >
                  <IconChevronUp
                    className={cx(
                      `size-[${t.iconSize}px] text-[${t.iconNeutral}] transition-transform`,
                      collapsed && "rotate-180",
                    )}
                  />
                </button>
              </div>
            </div>
            
            {/* Body */}
            <div
              id={panelId}
              className={cx(
                "w-full rounded-[6px] border border-[rgba(255,255,255,0)] bg-[rgba(255,255,255,0)]",
                collapsed && "hidden",
                hl("body"),
              )}
            >
              {isBusy ? (
                <div className="flex flex-col gap-[8px] text-[12px] leading-[16px] px-[0px] py-[0px]">
                  <ShimmerLine delay="0s" />
                  <ShimmerLine delay="0.18s" />
                  <div className="flex gap-[8px] pt-[8px]">
                    <ShimmerLine w="w-[84px]" delay="0.32s" />
                    <ShimmerLine w="w-[64px]" delay="0.44s" />
                    <ShimmerLine w="w-[92px]" delay="0.56s" />
                  </div>
                </div>
              ) : isError ? (
                <div className="flex items-start justify-between gap-[12px]">
                  <div className="flex flex-col gap-[4px]">
                    <div className="text-[12px] leading-[16px] font-semibold text-[#f74331]">摘要生成失败</div>
                    <div className="text-[12px] leading-[16px] text-[rgba(34,39,39,0.6)]">
                      请检查网络或稍后重试。你也可以点击刷新重新生成。
                    </div>
                  </div>
                  <button
                    type="button"
                    className={cx(
                      "h-[36px] px-[16px] rounded-[8px] border border-[rgba(45,66,107,0.12)] bg-[#ffffff]",
                      "text-[12px] font-semibold text-[#222727] transition-colors",
                      isInteractive && "hover:bg-[rgba(83,96,143,0.07)] active:opacity-90",
                      "outline-none focus:ring-1 focus:ring-black",
                      !isInteractive && "opacity-60 cursor-not-allowed",
                    )}
                    onClick={handleRetry}
                    disabled={!isInteractive}
                  >
                    重试
                  </button>
                </div>
              ) : isEmpty ? (
                <div className="flex items-center justify-between gap-[12px]">
                  <div className="text-[12px] leading-[16px] text-[rgba(34,39,39,0.6)]">暂无可生成的摘要内容</div>
                  <button
                    type="button"
                    className={cx(
                      "h-[36px] px-[16px] rounded-[8px] bg-black text-[#ffffff] text-[12px] font-semibold transition-opacity",
                      isInteractive && "hover:opacity-90 active:opacity-90",
                      "outline-none focus:ring-1 focus:ring-black",
                      !isInteractive && "opacity-60 cursor-not-allowed",
                    )}
                    onClick={handleRefresh}
                    disabled={!isInteractive}
                  >
                    重新生成
                  </button>
                </div>
              ) : (
                <div className={`flex flex-col gap-[${SMART_SUMMARY_TOKENS.paragraphGap}px] text-[${SMART_SUMMARY_TOKENS.bodyFontSizePx}px] leading-[${SMART_SUMMARY_TOKENS.bodyLineHeightPx}px]`}>
                  {(items || []).map((t, idx) => (
                    <p key={idx} className="w-full">
                      {t}
                    </p>
                  ))}
                </div>
              )}
            </div>
            
            {/* Footer: tags + feedback + updatedAt
                需求：收起时仅显示 Header；Footer 仅展开时显示 */}
            {!collapsed ? (
              <div className="w-full flex items-center justify-between gap-[12px]">
                {showTags ? (
                  <div className={cx("flex flex-wrap items-start gap-[8px]", hl("tags"))}>
                    {computedTags.map((tag) => (
                      <button
                        key={tag.label}
                        type="button"
                        className={cx(
                          `h-[${t.tag.height}px] px-[${t.tag.padX}px] py-[${t.tag.padY}px] rounded-[${t.tag.radius}px] border border-[rgba(45,66,107,0.0)]`,
                          "text-[12px] leading-[16px] whitespace-nowrap transition-colors",
                          tag.tone === "pink"
                            ? `bg-[${t.tag.tones.pink.bg}] text-[${t.tag.tones.pink.fg}]`
                            : tag.tone === "teal"
                              ? `bg-[${t.tag.tones.teal.bg}] text-[${t.tag.tones.teal.fg}]`
                              : `bg-[${t.tag.tones.violet.bg}] text-[${t.tag.tones.violet.fg}]`,
                          isInteractive && `hover:bg-[${t.hoverFill}]`,
                          `outline-none focus:ring-1 focus:ring-[${t.focusRing}]`,
                          (!isInteractive || isBusy) && "pointer-events-none opacity-70",
                        )}
                        onClick={() => onTagClick?.(tag)}
                        disabled={!isInteractive || isBusy}
                        aria-label={`标签：${tag.label}`}
                      >
                        {tag.label}
                      </button>
                    ))}
                  </div>
                ) : (
                  <div />
                )}
                
                <div className="flex items-center gap-[10px] shrink-0">
                  {showActions?.feedback ? (
                    <div className="flex items-center gap-[4px]">
                      <button
                        type="button"
                        className={cx(
                          "h-[24px] w-[24px] rounded-[6px] p-[4px] flex items-center justify-center transition-colors",
                          isInteractive && "hover:bg-[rgba(83,96,143,0.07)] active:opacity-90",
                          feedback === "up" && "bg-[rgba(62,179,70,0.12)]",
                          "outline-none focus:ring-1 focus:ring-black",
                          (!isInteractive || isBusy || state !== "ready") && "pointer-events-none opacity-60",
                        )}
                        aria-label="反馈：有帮助"
                        onClick={() => handleFeedback("up")}
                        disabled={!isInteractive || isBusy || state !== "ready"}
                      >
                        <IconThumbUp className={cx("size-[16px]", feedback === "up" ? "text-[#3eb346]" : "text-[rgba(34,39,39,0.75)]")} />
                      </button>
                      <button
                        type="button"
                        className={cx(
                          "h-[24px] w-[24px] rounded-[6px] p-[4px] flex items-center justify-center transition-colors",
                          isInteractive && "hover:bg-[rgba(83,96,143,0.07)] active:opacity-90",
                          feedback === "down" && "bg-[rgba(247,67,49,0.12)]",
                          "outline-none focus:ring-1 focus:ring-black",
                          (!isInteractive || isBusy || state !== "ready") && "pointer-events-none opacity-60",
                        )}
                        aria-label="反馈：无帮助"
                        onClick={() => handleFeedback("down")}
                        disabled={!isInteractive || isBusy || state !== "ready"}
                      >
                        <IconThumbDown className={cx("size-[16px]", feedback === "down" ? "text-[#f74331]" : "text-[rgba(34,39,39,0.75)]")} />
                      </button>
                    </div>
                  ) : null}
                  
                  {showUpdatedAt ? (
                    <div className="text-[12px] leading-[16px] text-[rgba(34,39,39,0.6)] whitespace-nowrap">
                      {updatedAt ? `更新于 ${updatedAt}` : ""}
                    </div>
                  ) : null}
                </div>
              </div>
            ) : null}
          </section>
        );
      }
      
      // ─── FOUNDATION TOKENS DATA (from Figma Variables) ───────────────────────
      const FOUNDATION_COLORS_INIT = {
        "semi-amber":       ["#FDFBED","#FCF4D1","#F8E6A4","#F5D679","#F1C34E","#EEAE25","#C6881D","#9F6515","#77460F","#4F2B09"],
        "semi-blue":        ["#ECF6FE","#CFE9FE","#9FD1FC","#70B8FB","#429EF9","#1482F8","#0B69D4","#0451B1","#003D8D","#002C69"],
        "semi-brand":       ["#E6F6F2","#C5EDE3","#91DAC9","#63C8B2","#3BB59D","#1AA38A","#148875","#0F6D5F","#0B5248","#063631"],

        "semi-bluegrey":    ["#FCFCFD","#F9FAFB","#F2F4F7","#E4E7EC","#D0D5DD","#98A2B3","#667085","#475467","#344054","#182230"],
        "semi-indigo":      ["#ECEFF7","#D1D6F0","#A6B1E1","#7F8ED1","#5D6DC2","#3E4FB3","#32409F","#28338A","#1E2776","#161C61"],
        "semi-light-blue":  ["#EBF8FD","#CDEEFB","#9CDBF7","#6DC8F4","#3FB3F0","#139EEC","#0A81C8","#0365A5","#004C81","#00355D"],
        "semi-light-green": ["#F3F8EC","#E3F0D1","#C8E1A7","#AED280","#95C35E","#7DB43F","#669633","#507828","#3A5A1D","#263C13"],

        "semi-orange":      ["#FFF8EC","#FEEECF","#FDD9A0","#FCC271","#FBA842","#FA8B14","#D0690F","#A74B0A","#7D3206","#531D03"],
        "semi-pink":        ["#FDEDF1","#FAD2DC","#F5A7BD","#F17DA2","#EC558A","#E72E75","#C32165","#A01654","#7C0E43","#580731"],
        "semi-purple":      ["#F7EAF7","#F0CCF0","#DF9DE1","#CC73D1","#B74EC2","#A22DB3","#8B239F","#751A8A","#5F1376","#4B0D61"],
        "semi-red":         ["#FEF3EF","#FDDED5","#FCBAAB","#FA9582","#F96D59","#F74331","#D32E24","#B01C18","#8C0F10","#68080C"],
        "semi-teal":        ["#E6F7F4","#C4F0E7","#8EE1D1","#2ECAB4","#26BFA9","#0EB39C","#0A9584","#07776B","#045A52","#003C3B"],
        "semi-violet":      ["#F1EEF9","#DCD4F3","#BBACE8","#9E86DC","#8464D1","#6D45C5","#6039B1","#542D9C","#482388","#3C1B73"],
        "semi-yellow":      ["#FEFDEC","#FEFACF","#FCF29F","#FBE870","#F9DA42","#F8C914","#CF9D0F","#A5760A","#7C5206","#533203"],
      };
      const FOUNDATION_COLOR_LABELS = {
        "semi-amber":"Amber","semi-blue":"Blue","semi-brand":"Brand","semi-cyan":"Cyan",
        "semi-green":"Green","semi-grey":"Grey","semi-bluegrey":"Blue Grey","semi-indigo":"Indigo",

        "semi-teal":"Teal","semi-violet":"Violet","semi-yellow":"Yellow",
      };
      const FOUNDATION_SPACING_INIT = [
        { key:"spacing-super-loose",  label:"Super Loose",  value:40 },
        { key:"spacing-extra-loose",  label:"Extra Loose",  value:32 },
        { key:"spacing-loose",        label:"Loose",        value:24 },
        { key:"spacing-base-loose",   label:"Base Loose",   value:20 },

      function buildFoundationDesignSkill(palette, spacing, radius) {

          `| \`${s.key}\` | ${s.value}px | ${s.label} |`

          "## 5. 圆角（Border Radius）",

          "---",

          "## 6. 使用规范",

      // ─── Sandbox: parse Design Skill Markdown → design values ──────────────
      function parseMdDesignValues(mdText, componentId) {
        const md = String(mdText || "");

        // Extract a token value by its data-token-path attribute (exact match)
        function tkn(path, fallback) {
          const safe = path.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const re = new RegExp('data-token-path="' + safe + '">([^<]+)</code>');
          const m = md.match(re);
          return m ? m[1].trim() : (fallback !== undefined ? fallback : "");
        }
        function num(path, fallback) {
          const v = parseFloat(tkn(path, ""));
          return isNaN(v) ? fallback : v;
        }
        function col(path, fallback) {
          const v = tkn(path, "");
          return v || fallback || "";
        }

        if (componentId === "smartSummary") {
          // shimmer.base is embedded in a CSS code block, not in a data-token-path attribute
          const shimBaseMatch =
            md.match(/class="shimmer" style="[^"]*background:([^;"\\]+)/) ||
            md.match(/shimmer.*?background:([rgba(#][^;\\n"]+)/s);
          const shimBase = shimBaseMatch ? shimBaseMatch[1].trim() : col("shimmer.base", "rgba(45,66,107,0.10)");
          return {
            outerRadius:      num("radiusOuterPx", 12),
            outerPadding:     num("paddingOuterPx", 12),
            titleFontSize:    num("titleFontSizePx", 12),
            titleFontWeight:  num("titleFontWeight", 600),
            bodyFontSize:     num("bodyFontSizePx", 12),
            bodyGap:          num("paragraphGap", 4),
            gapOuter:         num("gapOuterPx", 12),
            headerGap:        num("headerGap", 8),
            shimmerDuration:  num("shimmer.durationSec", 1.2),
            shimmerRadius:    num("shimmer.radius", 6),
            shimmerBase:      shimBase,
            iconSize:         num("iconSize", 16),
            textMain:         col("textMain", "#222727"),
            textSub:          col("textSub", "rgba(34,39,39,0.6)"),
            focusRing:        col("focusRing", "#000000"),
            hoverFill:        col("hoverFill", "rgba(83,96,143,0.07)"),
            borderOuter:      col("borderOuter", "rgba(34,39,39,0.09)"),
            tagPinkBg:        col("tag.tones.pink.bg",   "rgba(233,30,99,0.15)"),
            tagPinkFg:        col("tag.tones.pink.fg",   "#8c0f3d"),
            tagTealBg:        col("tag.tones.teal.bg",   "rgba(0,179,161,0.15)"),
            tagTealFg:        col("tag.tones.teal.fg",   "#015a58"),
            tagVioletBg:      col("tag.tones.violet.bg", "rgba(106,58,199,0.15)"),
            tagVioletFg:      col("tag.tones.violet.fg", "#331c77"),
          };
        }

        if (componentId === "formRecommend") {
          return {
            titleFontSize:    num("titleFontSizePx", 14),
            titleFontWeight:  num("titleFontWeight", 600),
            titleColor:       col("titleColor", "rgba(34,39,39,0.8)"),
            inputRadiusPx:    num("inputRadiusPx", 8),
            inputBg:          col("inputBg", "rgba(83,96,143,0.07)"),
            inputBorder:      col("inputBorder", "rgba(45,66,107,0.10)"),
            inputPadX:        num("inputPadX", 12),
            inputPadY:        num("inputPadY", 8),
            focusRing:        col("focusRing", "#000000"),
            gapOuter:         num("gapOuterPx", 4),
            recoBarHeight:    num("recommendBarHeightPx", 4),
            recoBarRadius:    num("recommendBarRadiusPx", 4),
            aiBadgeBg:        col("aiBadgeBg", "linear-gradient(90deg,rgba(200,180,255,0.15),rgba(130,220,240,0.15))"),
            aiBadgeTextGrad:  col("aiBadgeTextGradient", "linear-gradient(90deg,#16DACB,#3186D4,#6F58E3,#E774DD)"),
            placeholderSize:  num("placeholderFontSizePx", 14),
            placeholderColor: col("placeholderColor", "rgba(34,39,39,0.35)"),
            valueColor:       col("valueColor", "#222727"),
            recoWrapRadius:   num("recommendWrapRadiusPx", 8),
            recoWrapPad:      num("recommendWrapPadPx", 8),
            recoWrapGap:      num("recommendWrapGapPx", 6),
            recoItemPadX:     num("recommendItemPadX", 8),
            recoItemPadY:     num("recommendItemPadY", 6),
            recoItemRadius:   num("recommendItemRadiusPx", 6),
            recoItemFontSize: num("recommendItemTextSizePx", 13),
            recoItemLineH:    num("recommendItemLineHeightPx", 18),
            recoItemColor:    col("recommendItemTextColor", "rgba(34,39,39,0.75)"),
            recoItemColorSel: col("recommendItemTextColorSelected", "#000000"),
            recoItemBgHover:  col("recommendItemBgHover", "rgba(83,96,143,0.07)"),
            recoItemBgSel:    col("recommendItemBgSelected", "rgba(0,0,0,0.05)"),
          };
        }

        // aiInput
        return {
          outerRadius:     num("outerRadiusPx", 12),
          outerPadding:    num("outerPadPx", 12),
          outerGap:        num("outerGapPx", 8),
          outerBg:         col("outerBg", "rgba(83,96,143,0.07)"),
          cardRadius:      num("cardRadiusPx", 12),
          cardBg:          col("cardBg", "#ffffff"),
          cardBorder:      col("cardBorder", "#ffffff"),
          cardPad:         num("cardPadPx", 12),
          iconSize:        num("iconSizePx", 16),
          sendBtnHeight:   num("sendBtnHeightPx", 36),
          sendBtnRadius:   num("sendBtnRadiusPx", 8),
          sendBtnBgDis:    col("sendBtnBgDisabled", "rgba(45,66,107,0.12)"),
          sendBtnBgEn:     col("sendBtnBgEnabled", "#000000"),
          focusRing:       col("focusRing", "#000000"),
          recoTitleGrad:   col("recoTitleGradient", "linear-gradient(90deg,#16DACB,#E774DD)"),
          motionOpacity:   num("motionOpacity", 0.4),
          statusColor:     col("statusColor", "rgba(34,39,39,0.6)"),
          statusFontSize:  num("statusFontSizePx", 12),
          textFontSize:    num("textFontSizePx", 14),
          textLineHeight:  num("textLineHeightPx", 20),
          textColorPH:     col("textColorPlaceholder", "rgba(34,39,39,0.35)"),
          recoOuterBg:     col("recoOuterBg", "rgba(83,96,143,0.04)"),
          recoOuterRadius: num("recoOuterRadiusPx", 8),
          recoOuterPad:    num("recoOuterPadPx", 12),
          recoItemFontSize:num("recoItemFontSizePx", 13),
          recoItemLineH:   num("recoItemLineHeightPx", 18),
          recoItemColor:   col("recoItemTextColor", "#222727"),
          recoDividerColor:col("recoDividerColor", "rgba(45,66,107,0.15)"),
          hoverFill:       col("hoverFill", "rgba(83,96,143,0.07)"),
        };
      }

      // ─── Spec-driven Preview Components (from-scratch, inline-style only) ──
      function SpecSmartSummary({ v, scenario }) {
        const FF = '"PingFang SC",-apple-system,BlinkMacSystemFont,sans-serif';
        const outerStyle = {
          borderRadius: v.outerRadius,
          padding: v.outerPadding,
          border: "1px solid " + (v.borderOuter || "rgba(34,39,39,0.09)"),
          background: "#ffffff",

          boxSizing: "border-box",
