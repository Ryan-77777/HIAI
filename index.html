      /* ── Platform Design Tokens (遵循基础参数) ──────────────────────────────
         颜色来源：基础参数色板
           --ui-primary    = semi-color-black  (#000000) 主按钮 / 激活态
           --ui-bg         = semi-bluegrey-0   (#FCFCFD) 页面底色
           --ui-surface    = #FFFFFF            卡片白底
           --ui-text       = semi-color-text-0 (#222727) 正文主色
           --ui-radius-sm  = semi-border-radius-small  (6px)
           --ui-radius-md  = semi-border-radius-medium (8px)
           --ui-radius-lg  = semi-border-radius-large  (12px)
      ────────────────────────────────────────────────────────────────────── */
      :root {
        --ui-primary:      #000000;
        --ui-primary-text: #ffffff;
        --ui-bg:           #f5f6f8;
        --ui-surface:      #ffffff;
        --ui-text:         #222727;
        --ui-radius-sm:    6px;
        --ui-radius-md:    8px;
        --ui-radius-lg:    12px;
        --ui-font: "PingFang SC", "PingFangSC", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: var(--ui-font);
      }
      #root {
        height: 100%;
      }
      @keyframes shimmer {
        0%   { background-position: 200% center; }
        100% { background-position: -200% center; }
      }
      /* 彩条往返流动（FormRecommend 加载态专用） */
      @keyframes aiStripeFlow {
        0%, 100% { background-position: 0%   50%; }
        50%      { background-position: 100% 50%; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes aiStripeMove {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 100% 50%;
        }
      }
      @keyframes aiInputMotionDrift {
        0% {
          transform: translateX(-6%) translateY(0%) scale(1.02);
          opacity: 0.92;
        }
        100% {
          transform: translateX(6%) translateY(-2%) scale(1.02);
          opacity: 0.92;
        }
      }
      .md { font-size: 12px; line-height: 1.6; }
      .md h1 {
        font-size: 14px;
        font-weight: 700;
        color: #222727;
        margin: 0 0 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(45,66,107,0.12);
      }
      .md h2 {
        font-size: 12px;
        font-weight: 700;
        color: #222727;
        margin: 16px 0 6px;
        padding: 4px 8px;
        background: rgba(83,96,143,0.06);
        border-radius: 6px;
        border-left: 3px solid #000000;
      }
      .md h3 {
        font-size: 11.5px;
        font-weight: 600;
        color: #222727;
        margin: 12px 0 4px;
      }
      .md h4 {
        font-size: 11px;
        font-weight: 600;
        color: rgba(34,39,39,0.7);
        margin: 8px 0 4px;
      }
      .md p {
        font-size: 12px;
        line-height: 18px;
        color: rgba(34,39,39,0.82);
        margin: 4px 0;
      }
      .md li {
        font-size: 12px;
        line-height: 18px;
        color: rgba(34,39,39,0.82);
      }
      .md blockquote {
        margin: 6px 0;
        padding: 6px 10px;
        border-left: 3px solid rgba(0,0,0,0.25);
        background: rgba(0,0,0,0.04);
        border-radius: 0 6px 6px 0;
      }
      .md blockquote p { margin: 0; color: rgba(34,39,39,0.72); font-size: 11.5px; }
      .md code {
        font-size: 10.5px;
        font-family: "SF Mono", "Fira Code", "Consolas", monospace;
        background: rgba(83,96,143,0.07);
        border: 1px solid rgba(45,66,107,0.12);
        border-radius: 4px;
        padding: 1px 5px;
      }
      .md pre {
        background: rgba(34,39,39,0.04);
        border: 1px solid rgba(45,66,107,0.1);
        border-radius: 8px;
        margin: 6px 0;
        overflow: auto;
      }
      .md pre code {
        display: block;
        padding: 10px 12px;
        font-size: 10.5px;
        line-height: 16px;
        background: none;
        border: none;
      }
      .md ul, .md ol {
        padding-left: 16px;
        margin: 4px 0;
      }
      .md table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
        margin: 6px 0;
      }
      .md th {
        text-align: left;
        font-weight: 600;
        padding: 5px 8px;
        background: rgba(83,96,143,0.07);
        border: 1px solid rgba(45,66,107,0.12);
        color: #222727;
        white-space: nowrap;
      }
      .md td {
        padding: 4px 8px;
        border: 1px solid rgba(45,66,107,0.1);
        color: rgba(34,39,39,0.82);
        vertical-align: top;
      }
      .md tr:nth-child(even) td { background: rgba(83,96,143,0.03); }
      .md hr {
        border: 0;
        border-top: 1px solid rgba(45,66,107,0.1);
        margin: 10px 0;
      }
      .md [data-token-path] {
        border-radius: 4px;
        padding: 1px 5px;
        margin: 0 1px;
        transition: background-color 120ms ease, box-shadow 120ms ease;
      }
      .md .md-token-active {
        background: rgba(0,0,0,0.07);
        box-shadow: 0 0 0 1px rgba(0,0,0,0.2) inset;
      }

      // Icon picker options (hydrated from icon library)
      window.__ICON_NAME_CACHE__ = window.__ICON_NAME_CACHE__ || { list: [], version: 0 };
      function getAllIconNames() {
        const dict = window.__ICON_LIBRARY__?.byName || {};
        const names = Object.keys(dict);
        names.sort((a, b) => a.localeCompare(b));
        return names;
      }

      const { useEffect, useId, useMemo, useRef, useState } = React;

      function cx(...parts) {
        return parts.filter(Boolean).join(" ");
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function mdToken(path, value) {
        return `<code data-token-path="${escapeHtml(path)}">${escapeHtml(value)}</code>`;
      }

      function safeCssEscape(s) {
        try {
          if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(String(s));
        } catch {}
        // Minimal fallback: escape quotes/backslashes and brackets for attribute selectors
        return String(s).replaceAll("\\\\", "\\\\\\\\").replaceAll('"', '\\"').replaceAll("[", "\\[").replaceAll("]", "\\]");
      }

      const SUMMARY_ICON_SRC = "./summary-icon.png";

      function resolveAssetUrl(relPath) {
        try {
          return new URL(relPath, window.location.href).toString();
        } catch {

        }
      }

      function hiaiSvgUrl(filename) {
        return resolveAssetUrl("./hiai%20icon%20svg/" + String(filename || ""));
      }

      // ─── Foundation color resolver ──────────────────────────────────────────
      const FOUNDATION_TEXT_COLOR_MAP = {
        "semi-color-text-0": "rgba(34,39,39,1.0)",
        "semi-color-text-1": "rgba(34,39,39,0.8)",
        "semi-color-text-2": "rgba(34,39,39,0.6)",
        "semi-color-text-3": "rgba(34,39,39,0.35)",
      };
      // Resolve a foundation token reference (e.g. "semi-brand-5") to its actual CSS value.
      // Falls back to the literal string if it's not a known reference.
      function resolveFoundationColor(ref, palette) {
        if (!ref || typeof ref !== "string") return ref || "#000000";
        // Palette reference: "semi-{family}-{shade 0-9}"
        // Use greedy match to capture everything before the last "-digit" as the family name.
        const m = ref.match(/^(semi-.+)-(\d)$/);
        if (m) {
          const fam = m[1];
          const idx = parseInt(m[2]);
          if (palette && palette[fam] && palette[fam][idx] !== undefined)
            return palette[fam][idx];
        }
        if (ref === "semi-color-white") return "#FFFFFF";
        if (ref === "semi-color-black") return "#000000";
        if (ref === "semi-color-danger") return "#E23E25";
        if (ref === "semi-color-dark-text") return "#222727";
        if (FOUNDATION_TEXT_COLOR_MAP[ref]) return FOUNDATION_TEXT_COLOR_MAP[ref];
        return ref; // literal fallback (rgba, gradients, etc.)
      }
      // Recursively resolve all color references in a token tree.
      function resolveAllTokenColors(tokens, palette) {
        function rec(v) {
          if (typeof v === "string") return resolveFoundationColor(v, palette);
          if (Array.isArray(v)) return v.map(rec);
          if (v && typeof v === "object")
            return Object.fromEntries(Object.entries(v).map(([k, val]) => [k, rec(val)]));
          return v;
        }
        return rec(tokens);
      }

      // ─── Token persistence (localStorage) ──────────────────────────────────
      function safeJsonParse(s) {
        try { return JSON.parse(s); } catch { return null; }
      }
      function storageKeyForTokens(componentId) {
        return `hiai.tokens.v1.${String(componentId || "")}`;
      }
      function loadSavedTokens(componentId, fallback) {
        try {
          const raw = window.localStorage?.getItem(storageKeyForTokens(componentId));
          const parsed = raw ? safeJsonParse(raw) : null;
          if (parsed && typeof parsed === "object") return parsed;
        } catch {}
        return deepClone(fallback);
      }
      function saveTokens(componentId, tokens) {
        try {
          window.localStorage?.setItem(storageKeyForTokens(componentId), JSON.stringify(tokens));
        } catch {}
      }

          "",
          "## \u00a73 Component Specifications\uff08\u7ec4\u4ef6\u89c4\u8303\uff09",
          "",
          "### 3.1 Anatomy \u2014 DOM \u89e3\u5256\u7ed3\u6784\uff08\u5fc5\u987b\u5305\u542b\uff0c\u4e0d\u5f97\u7701\u7565\u4efb\u610f\u5c42\uff09",
          "",
          "```html",
          `<!-- OuterCard: border-radius:${t.radiusOuterPx}px; padding:${t.paddingOuterPx}px; gap:${t.gapOuterPx}px; border:1px solid ${t.borderOuter} -->`,
          "<div class=\"smart-summary-card\">",
          "  <!-- Header \u533a\u57df -->",
          `  <div class=\"header\" style=\"gap:${t.headerGap}px;\">`,
          `    <img src="${SUMMARY_ICON_SRC}" width="${t.iconSize}" height="${t.iconSize}" aria-hidden="true" />`,
          "    <h2 class=\"title\">\u7ec4\u4ef6\u6807\u9898\uff08\u5fc5\u987b\u5355\u884c\u7701\u7565\uff09</h2>",
          "    <!-- \u5c55\u5f00/\u6298\u53e0\u6309\u9215 -->",
          `    <button class=\"collapse-btn\" style=\"padding:${t.iconButtonPad}px; border-radius:${t.radiusIconButtonPx}px;\">`,
          "      <svg class=\"chevron-icon\"></svg>",
          "    </button>",
          "  </div>",
          "  <!-- Body \u72b6\u6001\uff08\u4e09\u6001\u4e92\u65a5\uff09 -->",
          "  <!-- Ready \u6001: \u6b63\u6587\u6bb5\u843d -->",
          "  <div class=\"body-ready\">",
          `    <p style=\"font-size:${t.bodyFontSizePx}px; line-height:${t.bodyLineHeightPx}px;\">\u6458\u8981\u5185\u5bb9\u6bb5\u843d 1</p>`,
          `    <p style=\"margin-top:${t.paragraphGap}px;\">\u6458\u8981\u5185\u5bb9\u6bb5\u843d 2</p>`,
          "  </div>",
          "  <!-- Loading \u6001: shimmer skeleton -->",
          "  <div class=\"body-loading\">",
          `    <div class=\"shimmer\" style=\"border-radius:${t.shimmer.radius}px; background:${t.shimmer.base};\"></div>`,
          "  </div>",
          "  <!-- Tags \u533a\u57df\uff08\u53ef\u9009\uff09 -->",
          "  <div class=\"tags\">",
          `    <span class=\"tag\" style=\"height:${t.tag.height}px; padding:${t.tag.padY}px ${t.tag.padX}px; border-radius:${t.tag.radius}px;\">Pink Tag</span>`,
          "  </div>",
          "</div>",
          "```",
          "",
          "### 3.2 States\uff08\u4ea4\u4e92\u72b6\u6001\u673a\uff09",
          "",
          "| \u72b6\u6001 | \u89e6\u53d1\u6761\u4ef6 | Body \u5185\u5bb9 | \u5904\u7406\u65b9\u5f0f |",
          "| --- | --- | --- | --- |",
          `| **Ready** | \u6570\u636e\u52a0\u8f7d\u5b8c\u6210 | \u6628\u6587\u6b63\u6587\uff08\u6bb5\u843d\u95f4\u8ddd ${mdToken("paragraphGap", `${t.paragraphGap}px`)}\uff09 | \u6e32\u67d3\u5185\u5bb9 |`,
          `| **Loading** | \u6570\u636e\u52a0\u8f7d\u4e2d | Shimmer skeleton | duration ${mdToken("shimmer.durationSec", `${t.shimmer.durationSec}s`)}\uff0c\u5faa\u73af |`,
          "| **Empty** | \u6ca1\u6709\u6458\u8981\u5185\u5bb9 | \u7a7a\u6001\u63d0\u793a\u6587\u6848 | \u6587\u5b57\u989c\u8272\u7528 Text Sub |",
          "| **Error** | \u8bf7\u6c42\u5931\u8d25 | \u9519\u8bef\u6807\u9898 + \u8bf4\u660e + \u91cd\u8bd5\u6309\u9215 | \u6807\u9898\u7ea2\u8272 `#f74331` |",
          "| **Collapsed** | \u7528\u6237\u70b9\u51fb\u6298\u53e0 | \u9690\u85cf Body \u533a | Header \u4fdd\u7559 |",
          "| **Hover (Button)** | mouseenter \u6309\u9215 | \u2014 | \u80cc\u666f\u53e0\u52a0 hoverFill |",
          "",
          "### 3.3 Component-Specific Tokens\uff08\u4ec5\u672c\u7ec4\u4ef6\u4f7f\u7528\uff09",
          "",
          `- **\u5fc5\u987b\u4f7f\u7528\u5185\u7f6e Logo**\uff1a\`${SUMMARY_ICON_SRC}\`\uff08\u7981\u6b62\u66ff\u6362\u3001\u6539\u8272\u3001\u52a0\u6ee4\u955c\uff09`,
          `- Logo \u5c3a\u5bf8\u56fa\u5b9a\uff1a${mdToken("iconSize", `${t.iconSize}x${t.iconSize}px`)}`,
          "- Tag \u989c\u8272\u4ec5\u9650 Pink / Teal / Violet \u4e09\u5957\uff0c\u4e0d\u5f97\u65b0\u589e\u3002",
          "",
          "---",
          "",
          "## \u00a74 Layout & Composition Logic\uff08\u5e03\u5c40\u4e0e\u7ec4\u5408\u903b\u8f91\uff09",
          "",
          "### 4.1 Container Rules\uff08\u5bb9\u5668\u89c4\u5219\uff09",
          "",
          "- **\u5bbd\u5ea6**\uff1a`width: 100%`\uff0c\u5fc5\u987b\u6491\u6ee1\u7236\u5bb9\u5668\uff0c**\u7981\u6b62\u8bbe\u5b9a `max-width`**\u3002",
          "- **\u9ad8\u5ea6**\uff1a\u968f\u5185\u5bb9\u81ea\u9002\u5e94\uff08\u7981\u6b62\u56fa\u5b9a\u9ad8\u5ea6\uff09\uff1bSkeleton \u5141\u8bb8\u4f7f\u7528 `min-height`\u3002",
          "- **\u5e03\u5c40**\uff1aFlex column\uff0cgap \u4e25\u683c\u4f7f\u7528 gapOuterPx\u3002",
          "",
          "### 4.2 Alignment\uff08\u5bf9\u9f50\uff09",
          "",
          "- Header\uff1a`display:flex; align-items:center; gap:" + t.headerGap + "px`",
          "- \u6807\u9898\u5fc5\u987b\u5355\u884c\u7701\u7565\uff1a`white-space:nowrap; overflow:hidden; text-overflow:ellipsis`",
          "- Tags \u533a\uff1aflex wrap\uff0cgap 4px\uff0c\u6b6a\u5de6\u5bf9\u9f50\u3002",
          "",
          "### 4.3 Gradient Background \u5e94\u7528\u9006\u8f91",
          "",
          "- \u6e10\u53d8\u5c42\u5fc5\u987b\u6309 §2.6 \u7684\u987a\u5e8f\u53e0\u52a0\uff0c\u4e0d\u5f97\u6539\u53d8\u987a\u5e8f\u3002",
          "- AUTO_STOP \u9700\u6839\u636e\u5b9e\u9645\u7ec4\u4ef6\u9ad8\u5ea6\u52a8\u6001\u8ba1\u7b97\uff08<200px \u7528 40%\uff1b\u2265200px \u7528 20%\uff09\u3002",
          "",
          "### 4.4 Responsive Behavior\uff08\u54cd\u5e94\u5f0f\uff09",
          "",
          "- \u65e0\u65ad\u70b9\u53d8\u5316\uff1a\u9762\u677f\u5bbd\u5ea6\u6c38\u8fdc `width:100%`\uff0c\u5c0f\u5c4f\u65f6\u4e0d\u989d\u5916\u6539\u53d8 padding\u3002",
          "- \u6298\u53e0\u903b\u8f91\u4e0d\u56e0\u65ad\u70b9\u53d8\u5316\u800c\u6539\u53d8\u3002",
          "",
          "---",
          "",
          "## \u00a75 Motion & Interaction\uff08\u52a8\u6548\u4e0e\u5fae\u4ea4\u4e92\uff09",
          "",
          "### 5.1 Shimmer Loading \u52a8\u6548",
          "",
          `- **\u89e6\u53d1**\uff1a\u6570\u636e\u52a0\u8f7d\u4e2d\u65f6\u663e\u793a Skeleton\u3002`,
          `- **Duration**\uff1a${mdToken("shimmer.durationSec", `${t.shimmer.durationSec}s`)}`,
          "- **Easing**\uff1a`linear`\uff0c\u5faa\u73af\u64ad\u653e\u3002",
          `- **Skeleton \u5e95\u8272**\uff1a${mdToken("shimmer.base", t.shimmer.base)}`,
          "- **Shimmer \u79fb\u52a8\u52a8\u753b**\uff1a`translateX(-100%)` \u2192 `translateX(100%)`\uff0c\u53e0\u5728\u57fa\u5e95\u8272\u4e0a\u3002",
          "",
          "### 5.2 Collapse / Expand \u5fae\u4ea4\u4e92",
          "",
          "- **\u89e6\u53d1**\uff1a\u70b9\u51fb Header \u53f3\u4fa7\u6298\u53e0\u6309\u9215\u3002",
          "- **Chevron \u65cb\u8f6c**\uff1a\u5c55\u5f00\u6001\u2192 chevron-up\uff0c\u6298\u53e0\u6001\u2192 chevron-down\uff1b`transition: transform 200ms ease`\u3002",
          "- **Body \u663e\u9690**\uff1a\u7b80\u5355 `display:none / display:block`\uff08\u4e0d\u8981\u5f3a\u5236\u52a0 height \u52a8\u753b\uff09\u3002",
          "",
          "### 5.3 Hover \u5fae\u4ea4\u4e92",
          "",
          `- **Trigger**\uff1amouseenter \u56fe\u6807\u6309\u9215 \u2192 \u80cc\u666f\u53e0\u52a0 ${mdToken("hoverFill", t.hoverFill)}`,
          "- **Duration**\uff1a`transition: background-color 120ms ease`",
          "",
          "---",
          "",
          "## \u00a76 Anti-Patterns & Constraints\uff08\u8d1f\u9762\u7ea6\u675f / \u907f\u5751\u6307\u5357\uff09",
          "",
          "### \u274c \u7edd\u5bf9\u7981\u6b62\uff08DON'Ts\uff09",
          "",
          "- **\u7981\u6b62**\u4f7f\u7528\u5185\u8054\u6837\u5f0f\u4e2d\u7684 Tailwind \u9ed8\u8ba4\u8272\u540d\uff08\u5982 `text-gray-500`\uff09\u2014\u2014\u5fc5\u987b\u4f7f\u7528 Token \u663e\u5f0f\u6570\u503c\u3002",
          "- **\u7981\u6b62**\u5f15\u5165\u9634\u5f71\u3001\u73bb\u7483\u6001\u3001\u989d\u5916\u6e10\u53d8\u3001\u989d\u5916\u63cf\u8fb9\u3002",
          "- **\u7981\u6b62**\u7528\u4efb\u4f55 SVG/emoji/\u7b2c\u4e09\u65b9\u56fe\u6807\u66ff\u6362\u5185\u7f6e Logo\u3002",
          "- **\u7981\u6b62**\u5bf9 Logo \u6539\u8272\u3001\u52a0\u6ee4\u955c\u3001\u52a0\u963f\u5f71\u3001\u52a0\u5706\u89d2\u9010\u8499\uff08\u5fc5\u987b\u4fdd\u6301\u56fe\u7247\u539f\u6837\u547c\u73b0\uff09\u3002",
          "- **\u7981\u6b62**\u65b0\u589e Tag \u989c\u8272\u2014\u2014\u4ec5\u9650 Pink / Teal / Violet \u4e09\u5957\u3002",
          "- **\u7981\u6b62**\u4f7f\u7528\u7ea6\u5b9a\u5916\u7684\u95f4\u8ddd\u5024\uff08\u4ec5\u5141\u8bb8 4/8/12/16 px\uff09\u3002",
          "- **\u7981\u6b62**\u8bbe\u7f6e `max-width` \u6216\u56fa\u5b9a `height`\u3002",
          "- **\u7981\u6b62**\u4f7f\u7528\u7eaf\u9ed1 `#000000`\u2014\u2014\u6b63\u6587\u5fc5\u987b\u4e3a `#222727`\u3002",
          "- **\u7981\u6b62**\u5728\u9519\u8bef\u72b6\u6001\u6807\u9898\u5916\u5f15\u5165\u7ea2\u8272\u2014\u2014\u9519\u8bef\u6807\u9898\u987f\u8272\u4e3a `#f74331`\u3002",
          "",
          "### \u2705 \u5fc5\u987b\u786e\u4fdd\uff08DOs\uff09",
          "",
          "- \u5916\u5c42\u5361\u7247\u5fc5\u987b\u6709 `width:100%` \u4e14\u65e0 `max-width`\u3002",
          "- \u6e10\u53d8\u53e0\u52a0\u987a\u5e8f\u5fc5\u987b\u4e0e §2.6 \u4e00\u81f4\u3002",
          "- Header \u6807\u9898\u5fc5\u987b\u5355\u884c\u7701\u7565\u3002",
          "- Shimmer \u5fc5\u987b\u5b58\u5728\u4e14\u6709\u5faa\u73af\u52a8\u6548\u3002",
          "",
          "---",
          "",
          "## \u00a77 Validation Rules\uff08\u6821\u9a8c\u6761\u4ef6 / \u4e0a\u7ebf\u524d\u5fc5\u67e5\u6e05\u5355\uff09",
          "",
          "> \u751f\u6210\u4ee3\u7801\u540e\uff0c\u8bf7\u9010\u6761\u6838\u67e5\u4ee5\u4e0b\u6761\u4ef6\uff0c**\u5168\u90e8\u901a\u8fc7**\u65b9\u53ef\u8ba4\u4e3a\u5b9e\u73b0\u5b8c\u6210\u3002",
          "",
          "- [ ] DOM \u5c42\u7ea7\u5305\u542b\uff1aouter-card \u2192 header \u2192 body (ready/loading/empty/error) \u2192 [tags]",
          `- [ ] outer-card \u542b width:100% \u4e14\u65e0 max-width`,
          `- [ ] outer-card border-radius = ${t.radiusOuterPx}px`,
          `- [ ] outer-card padding = ${t.paddingOuterPx}px`,
          `- [ ] Logo \u4e3a <img src="${SUMMARY_ICON_SRC}"> \u4e14\u5c3a\u5bf8 ${t.iconSize}x${t.iconSize}px`,
          "- [ ] Logo \u672a\u88ab\u6539\u8272\u6216\u52a0\u6ee4\u955c\u5904\u7406",
          `- [ ] \u6807\u9898\u5b57\u53f7 = ${t.titleFontSizePx}px\uff0c\u5355\u884c\u7701\u7565`,
          `- [ ] \u6bb5\u843d\u95f4\u8ddd = ${t.paragraphGap}px`,
          "- [ ] Tag \u989c\u8272\u4ec5\u9650\u4e09\u5957\u5185\uff0c\u65e0\u81ea\u5b9a\u4e49\u989c\u8272",
          "- [ ] Loading \u6001\u6709 Shimmer \u52a8\u753b\u4e14\u65e0\u6b63\u6587\u5185\u5bb9",
          "- [ ] \u65e0 box-shadow\u3001\u65e0 text-shadow\u3001\u65e0 Tailwind \u9ed8\u8ba4\u8272\u540d",
          "",

          "## \u00a78 Few-Shot Code Example\uff08\u53c2\u8003\u5b9e\u73b0\u7247\u6bb5\uff09",
          "",
          "```jsx",
          "// \u2705 \u6b63\u786e\uff1a\u5916\u5c42\u5361\u7247\u7ed3\u6784\u4e0e Logo \u5fc5\u987b\u7528\u5e94\u793a\u4f8b",
          "<div style={{",
          `  width: '100%',`,

          "## \u00a79 Agent Prompt Guide\uff08\u5feb\u901f\u8c03\u7528\u63d0\u793a\u6a21\u677f\uff09",
          "",
          "```",
          "\u4f60\u662f\u50cf\u7d20\u7ea7 UI \u4e13\u5bb6\u3002\u8bf7\u4e25\u683c\u9075\u5faa DESIGN_SKILL \u00a71-\u00a78 \u4e2d\u7684\u201c\u667a\u80fd\u6458\u8981\u7ec4\u4ef6\u9762\u677f\uff08HiAI\uff09\u201d\u89c4\u8303\u751f\u6210 UI\u3002",
          "\u8981\u6c42\uff1a",
          "1. DOM \u5fc5\u987b\u5305\u542b outer-card / header / [body-ready|body-loading|body-empty|body-error] / [tags] \u5c42\u7ea7\u3002",

          "### 2.3 Spacing & Sizing\uff08\u95f4\u8ddd\u4e0e\u5c3a\u5bf8\uff09",

          `| RecoOuter gap | recoOuterGapPx | ${mdToken("recoOuterGapPx", `${t.recoOuterGapPx}px`)} |`,
          `| RecoHeader padX | recoHeaderPadX | ${mdToken("recoHeaderPadX", `${t.recoHeaderPadX}px`)} |`,
          `| RecoHeader height | recoHeaderHeightPx | ${mdToken("recoHeaderHeightPx", `${t.recoHeaderHeightPx}px`)} |`,
          `| RecoItem padding | recoItemPadPx | ${mdToken("recoItemPadPx", `${t.recoItemPadPx}px`)} |`,

          "",
          "## \u00a73 Component Specifications\uff08\u7ec4\u4ef6\u89c4\u8303\uff09",
          "",
          "### 3.1 Anatomy \u2014 DOM \u89e3\u5256\u7ed3\u6784\uff08\u5fc5\u987b\u5305\u542b\uff0c\u4e0d\u5f97\u7701\u7565\u4efb\u610f\u5c42\uff09",
          "",
          "```html",
          `<!-- OuterShell: background:${t.outerBg}; border-radius:${t.outerRadiusPx}px; padding:${t.outerPadPx}px; gap:${t.outerGapPx}px; overflow:hidden; position:relative -->`,
          "<div class=\"outer-shell\">",
          "  <!-- MotionLayer: position:absolute; bottom:0; pointer-events:none -->",
          `  <div class=\"motion-layer\" style=\"height:${t.motionHeightPx}px; opacity:${t.motionOpacity};\"></div>`,
          "  <!-- StatusRow -->",
          `  <div class=\"status-row\" style=\"padding:${t.statusPadY}px ${t.statusPadX}px;\">`,
          "    <p>\u52a8\u6001\u72b6\u6001\u6587\u6848</p>",
          "  </div>",
          `  <!-- InputCard: background:${t.cardBg}; border:1px solid ${t.cardBorder}; border-radius:${t.cardRadiusPx}px; padding:${t.cardPadPx}px; gap:${t.cardGapPx}px -->`,
          "  <div class=\"input-card\">",
          "    <!-- [\u53ef\u9009] RecoPanel: \u5728 TextArea \u4e4b\u4e0a -->",
          `    <div class=\"reco-panel\" style=\"background:${t.recoOuterBg}; border-radius:${t.recoOuterRadiusPx}px; padding:${t.recoOuterPadPx}px; gap:${t.recoOuterGapPx}px;\">`,
          `      <div class=\"reco-header\" style=\"height:${t.recoHeaderHeightPx}px; padding:0 ${t.recoHeaderPadX}px;\">`,
          "        <span class=\"reco-title\">\u56de\u590d\u63a8\u8350\uff08\u6e10\u53d8\u6587\u5b57\uff09</span>",
          "        <div class=\"reco-actions\">\u5173\u95ed/\u5237\u65b0/\u590d\u5236/\u53d1\u9001 \u56fe\u6807\u6309\u9215 + \u7ad6\u5206\u5272\u7ebf</div>",
          "      </div>",
          `      <button class=\"reco-item\" style=\"padding:${t.recoItemPadPx}px; border-radius:${t.recoItemRadiusPx}px; position:relative\">\u63a8\u8350\u6587\u6848</button>`,
          "    </div>",
          "    <!-- TextArea -->",
          `    <div role=\"textbox\" contenteditable=\"true\" style=\"font-size:${t.textFontSizePx}px; line-height:${t.textLineHeightPx}px; min-height:${t.textLineHeightPx*2}px;\"></div>`,
          "    <!-- ActionsRow -->",
          `    <div class=\"actions-row\" style=\"display:flex; align-items:center; gap:${t.actionsGapPx}px;\">`,
          "      <div class=\"left-icons\" style=\"flex:1; display:flex; align-items:center;\">\u9b54\u6cd5\u68d2/\u8868\u60c5/\u56fe\u7247/\u4e0b\u5212\u7ebf/\u52a0\u7c97/\u6709\u5e8f\u5217\u8868/\u65e0\u5e8f\u5217\u8868/\u94fe\u63a5/\u8c03\u8272\u677f</div>",
          `      <button class=\"send-btn\" style=\"height:${t.sendBtnHeightPx}px; padding:${t.sendBtnPadPx}px; border-radius:${t.sendBtnRadiusPx}px;\">send icon</button>`,
          "    </div>",
          "  </div>",
          "</div>",
          "```",
          "",
          "### 3.2 States\uff08\u4ea4\u4e92\u72b6\u6001\u673a\uff09",
          "",
          "| \u72b6\u6001 | \u89e6\u53d1\u6761\u4ef6 | SendButton \u80cc\u666f | \u56fe\u6807\u5904\u7406 | \u8f93\u5165\u533a\u989c\u8272 |",
          "| --- | --- | --- | --- | --- |",
          `| **Default\uff08\u7a7a\u6001\uff09** | value \u4e3a\u7a7a | ${mdToken("sendBtnBgDisabled", t.sendBtnBgDisabled)} | \u539f\u8272\u56fe\u6807 | placeholder \u8272 ${mdToken("textColorPlaceholder", t.textColorPlaceholder)} |`,
          `| **Typing\uff08\u6709\u5185\u5bb9\uff09** | value \u975e\u7a7a | ${mdToken("sendBtnBgEnabled", t.sendBtnBgEnabled)} | filter:brightness(0)invert(1) \u53d8\u767d | ${mdToken("textColorValue", t.textColorValue)} |`,
          `| **Hover\uff08\u56fe\u6807\u6309\u9215\uff09** | mouseenter | \u53e0\u52a0 ${mdToken("hoverFill", t.hoverFill)} | \u2014 | \u2014 |`,
          `| **Focus** | \u83b7\u5f97\u7126\u70b9 | \u2014 | \u2014 | outline: 1px solid ${mdToken("focusRing", t.focusRing)} |`,
          `| **RecoPanel \u663e\u793a** | \u6709\u63a8\u8350\u6570\u636e\u4e14\u672a\u5173\u95ed | \u2014 | \u2014 | \u63a8\u8350\u9762\u677f\u5728 InputCard \u5185\u6700\u9876\u90e8 |`,
          `| **RecoItem Hover** | hover \u63a8\u8350\u6761\u76ee | \u2014 | \u2014 | item bg \u2192 ${mdToken("recoItemBgHover", t.recoItemBgHover)}\uff1bTooltip \u51fa\u73b0 |`,
          "",
          "### 3.3 Component-Specific Tokens\uff08\u4ec5\u672c\u7ec4\u4ef6\u4f7f\u7528\uff09",
          "",
          `- \u56fe\u6807\u5c3a\u5bf8\u56fa\u5b9a\uff1aiconSizePx = ${t.iconSizePx}px\uff0c**\u4e0d\u5f97\u6539\u53d8**\u3002`,
          "- \u5de5\u5177\u680f/\u8bdd\u672f\u63a8\u8350\u56fe\u6807\uff1a**\u5fc5\u987b** \u901a\u8fc7\u56fe\u6807\u5e93 `getIcon(name)` \u5f15\u7528\uff08AIInput \u5206\u7c7b\uff0c\u8d44\u6e90\u4e3a `hiai icon svg/` \u5185 SVG\uff09\u3002",
          "",
          "```",
          `motion \u5c42\uff08\u975e\u56fe\u6807\u5e93\uff09: ${AI_INPUT_ASSETS.motionPng}`,
          "magic-wand  : getIcon(\"magic-wand\")",
          "smile       : getIcon(\"IconFaceSmileStroked\")",
          "image       : getIcon(\"image-01-stroked\")",
          "underline   : getIcon(\"underline-01-stroked\")",
          "bold        : getIcon(\"bold-01-stroked\")",
          "ol          : getIcon(\"icon_order-list_outlined\")",
          "ul          : getIcon(\"icon_disorder-list_outlined\")",
          "link        : getIcon(\"link-03-stroked\")",
          "palette     : getIcon(\"palette-stroked\")",
          "send        : getIcon(\"hiai-send\") (\u7981\u7528\u6001\u539f\u8272 / \u6709\u5185\u5bb9\u6001 filter:brightness(0)invert(1))",
          "reco-close  : getIcon(\"x-close-stroked\")",
          "reco-refresh: getIcon(\"refresh\")",
          "reco-copy   : getIcon(\"IconCopyStroked2\")",
          "reco-send   : getIcon(\"hiai-send\")",
          "```",
          "",
          "---",
          "",
          "## \u00a74 Layout & Composition Logic\uff08\u5e03\u5c40\u4e0e\u7ec4\u5408\u903b\u8f91\uff09",
          "",
          "### 4.1 Container Rules\uff08\u5bb9\u5668\u89c4\u5219\uff09",
          "",
          "- **\u5bbd\u5ea6**\uff1a`width: 100%`\uff0c\u968f\u7236\u5bb9\u5668\u6491\u6ee1\uff0c**\u7981\u6b62\u8bbe\u5b9a max-width**\u3002",
          `- **\u9ad8\u5ea6**\uff1a\u968f\u5185\u5bb9\u81ea\u9002\u5e94\uff08\u7981\u6b62\u56fa\u5b9a\u9ad8\u5ea6\uff09\uff1bTextArea \u6700\u5c0f\u9ad8\u5ea6 = textLineHeightPx \u00d7 2 = ${t.textLineHeightPx * 2}px\u3002`,
          "- **\u6ea2\u51fa**\uff1aOuterShell \u5fc5\u987b `overflow: hidden`\uff08\u4fdd\u8bc1\u52a8\u6548\u5c42\u88ab\u5706\u89d2\u88c1\u5207\uff09\u3002",
          "",
          "### 4.2 Alignment\uff08\u5bf9\u9f50\uff09",
          "",
          "- OuterShell \u5185\u5b50\u5143\u7d20\uff1a`flex-direction: column; align-items: flex-start`",
          "- ActionsRow\uff1a`display: flex; align-items: center`\uff1b\u5de6\u4fa7\u56fe\u6807\u7ec4 `flex: 1`\uff1bSendButton `flex-shrink: 0`",
          "- RecoHeader\uff1a`display: flex; align-items: center`\uff1b\u5de6\u4fa7 Title `flex: 1`\uff1b\u53f3\u4fa7 Actions `flex-shrink: 0`",
          "",
          "### 4.3 Responsive Behavior\uff08\u54cd\u5e94\u5f0f\uff09",
          "",
          "- \u65e0\u65ad\u70b9\u53d8\u5316\uff1a\u7ec4\u4ef6\u5bbd\u5ea6\u6c38\u8fdc\u8ddf\u968f\u7236\u5bb9\u5668\uff0c\u4e0d\u505a\u4efb\u4f55\u5185\u90e8\u6298\u884c\u5904\u7406\u3002",
          "- \u56fe\u6807\u884c\u56fe\u6807\u8fc7\u591a\u65f6\u4e0d\u6362\u884c\uff0c\u5141\u8bb8\u6c34\u5e73\u6ea2\u51fa\u88c1\u5207\u3002",
          "",
          "---",
          "",
          "## \u00a75 Motion & Interaction\uff08\u52a8\u6548\u4e0e\u5fae\u4ea4\u4e92\uff09",
          "",
          "### 5.1 Motion Layer\uff08\u5e95\u90e8\u52a8\u6548\u8499\u5c42\uff09",
          "",
          `- **\u89e6\u53d1**\uff1a\u7ec4\u4ef6\u6302\u8f7d\u540e\u7acb\u5373\u542f\u52a8\uff0c\u6301\u7eed\u5faa\u73af\u64ad\u653e\u3002`,
          `- **\u9ad8\u5ea6**\uff1a${mdToken("motionHeightPx", `${t.motionHeightPx}px`)}\uff1b**\u900f\u660e\u5ea6**\uff1a${mdToken("motionOpacity", String(t.motionOpacity))}`,
          `- **\u6c34\u5e73\u5185\u7f29**\uff1aleft ${mdToken("motionInsetXPercentLeft", `${t.motionInsetXPercentLeft}%`)}\uff1bright ${mdToken("motionInsetXPercentRight", `${t.motionInsetXPercentRight}%`)}`,
          `- **Duration\uff08\u65f6\u957f\uff09**\uff1a${mdToken("motionDurationMs", `${t.motionDurationMs}ms`)}`,
          `- **Delay\uff08\u9996\u6b21\u5ef6\u8fdf\uff09**\uff1a${mdToken("motionDelayMs", `${t.motionDelayMs}ms`)}`,
          "- **Easing\uff08\u7f13\u52a8\uff09**\uff1a`linear`\uff08\u5300\u901f\u5faa\u73af\uff0c`alternate` \u65b9\u5411\uff09",
          "- **\u7ea6\u675f**\uff1a\u5fc5\u987b `pointer-events: none`\uff0c\u4e0d\u53ef\u906e\u6321\u4efb\u4f55\u4ea4\u4e92\u5143\u7d20\u3002",
          "",
          "### 5.2 Hover \u5fae\u4ea4\u4e92",
          "",
          `- **Trigger**\uff1amouseenter \u56fe\u6807\u6309\u9215 \u2192 \u80cc\u666f\u53e0\u52a0 ${mdToken("hoverFill", t.hoverFill)}`,
          "- **Duration**\uff1a`transition: background-color 120ms ease`",
          "- **\u7981\u6b62**\uff1a\u9634\u5f71\u3001scale \u7f29\u653e\u3001\u53d1\u5149\u6548\u679c\u3002",
          "",
          "### 5.3 RecoItem Tooltip",
          "",
          "- **Trigger**\uff1amouseenter \u63a8\u8350\u6761\u76ee \u2192 Tooltip \u51fa\u73b0\uff08absolute \u5b9a\u4f4d\u5728\u6761\u76ee\u6b63\u4e0a\u65b9 `top: -44px`\uff09",
          "- **\u5185\u5bb9**\uff1a\u91c7\u7eb3\u6a21\u5f0f `\u70b9\u51fb\u590d\u5236\u5230\u8f93\u5165\u6846` / \u53d1\u9001\u6a21\u5f0f `\u70b9\u51fb\u76f4\u63a5\u53d1\u9001`",
          "- **\u7bad\u5934**\uff1aCSS border-trick \u4e09\u89d2\u5f62\uff0c\u5411\u4e0b\uff0c\u989c\u8272\u4e0e tooltipBg \u4e00\u81f4",
          "",
          "---",
          "",
          "## \u00a76 Anti-Patterns & Constraints\uff08\u8d1f\u9762\u7ea6\u675f / \u907f\u5751\u6307\u5357\uff09",
          "",
          "### \u274c \u7edd\u5bf9\u7981\u6b62\uff08DON'Ts\uff09",

      /**
       * 业务组件 → Design Skill 合并顺序（**综合 Skill** 与左侧单组件 Skill 预览共用数据源）。
       * 新增或下线业务组件时：必须同步改此数组（含 `sidebarGroup`）、Demo 侧栏分组与各 `*Tokens` state、`resolved*` / 持久化 key。
       */
      const PLATFORM_SKILL_BUSINESS_SECTIONS = [
        { id: "smartSummary", name: "智能摘要", tokenKey: "smartTokens", sidebarGroup: "business", build: (t) => buildDesignSkillMarkdown(t) },
        { id: "formRecommend", name: "表单推荐", tokenKey: "formTokens", sidebarGroup: "business", build: (t) => buildFormRecommendDesignSkillMarkdown(t) },
        { id: "aiInput", name: "AI输入框", tokenKey: "aiTokens", sidebarGroup: "business", build: (t) => buildAiInputDesignSkillMarkdown(t) },
        { id: "imBubble", name: "IM气泡", tokenKey: "bubbleTokens", sidebarGroup: "business", build: (t) => buildImBubbleDesignSkillMarkdown(t) },
        { id: "fusionWorkbench", name: "融合工作台框架", tokenKey: "fusionTokens", sidebarGroup: "business", build: (t) => buildFusionWorkbenchDesignSkillMarkdown(t) },
        { id: "hiuiButton", name: "按钮", tokenKey: "hiuiTokens", sidebarGroup: "basic", build: (t) => buildHiuiButtonDesignSkillMarkdown(t) },
        { id: "conversationList", name: "会话列表", tokenKey: "conversationListTokens", sidebarGroup: "business", build: (t) => buildConversationListDesignSkillMarkdown(t) },
      ];

      /**
       * 合并全部业务组件 + 可选图标库为单一 Markdown，供外部模型单文件读取。
       * 团队流程：导出 `DESIGN_SKILL_PLATFORM.md` → Git commit / PR（与 Skills Manager 类工具的「集中库 + 同步」思路一致）。
       */
      function buildUnifiedDesignSkillMarkdown(opts) {
        const {
          version = "1.0.0",
          generatedAt,
          includeIconLibrary = true,
          foundationPalette,
          smartTokens,
          formTokens,
          aiTokens,
          bubbleTokens,
          fusionTokens,
          hiuiTokens,
          conversationListTokens,
        } = opts || {};

        const gen = generatedAt || new Date().toISOString();
        const verSafe = JSON.stringify(String(version ?? "1.0.0"));
        const genSafe = JSON.stringify(String(gen));

        const r = (t) => resolveAllTokenColors(t, foundationPalette);

        const tokenBag = {
          smartTokens,
          formTokens,
          aiTokens,
          bubbleTokens,
          fusionTokens,
          hiuiTokens,
          conversationListTokens,
        };

        const sep = "\n\n---\n\n";

        const header = [
          "---",
          "hiai_design_skill_kind: platform-unified",
          `hiai_design_skill_version: ${verSafe}`,
          `hiai_design_skill_generated_at: ${genSafe}`,
          "---",
          "",
          "# DESIGN_SKILL — HiAI 平台（全业务组件汇总）",
          "",
          "> **单一入口**：将本文档整体提供给外部模型或工具，作为 HiAI 业务 UI 的**唯一综合约束**（各组件规范 + 图标引用规则）。",
          "> **Token 来源**：正文数值来自当前 Demo 各组件 Tokens（含浏览器本地已保存覆盖）与基础色板；正文由 `PLATFORM_SKILL_BUSINESS_SECTIONS` 顺序拼接，与单组件 Skill 预览同源、随编辑实时一致。",
          "> **版本与协作**：更新组件后在本文档重新导出，将 `DESIGN_SKILL_PLATFORM.md` 提交到 Git，团队通过 PR 审阅与对比（可参考 [Skills Manager 说明](https://github.com/xingkongliang/skills-manager/blob/main/README.zh-CN.md) 的集中技能库与同步理念）。",
          "",
          "## 文档结构",
          "",
          "以下按模块依次拼接各组件完整 Design Skill 正文；实现某一功能时可在对应章节检索标题或关键词。",
          "",
        ].join("\n");

        const blocks = PLATFORM_SKILL_BUSINESS_SECTIONS.map((sec) => sec.build(r(tokenBag[sec.tokenKey])));
        if (includeIconLibrary) blocks.push(buildIconLibraryDesignSkillMarkdown());

        return header + sep + blocks.join(sep);
      }

      function getIn(obj, path) {
        return path.split(".").reduce((acc, key) => (acc == null ? acc : acc[key]), obj);
      }

      function setIn(obj, path, value) {
        const keys = path.split(".");
        const root = Array.isArray(obj) ? obj.slice() : { ...obj };
        let cur = root;
        for (let i = 0; i < keys.length - 1; i++) {
          const k = keys[i];
          const next = cur[k];
          cur[k] = Array.isArray(next) ? next.slice() : { ...(next || {}) };
          cur = cur[k];
        }
        cur[keys[keys.length - 1]] = value;
        return root;
      }

      function parseMaybeNumber(v) {
        if (typeof v !== "string") return v;
        const trimmed = v.trim();
        if (trimmed === "") return v;
        const n = Number(trimmed);
        return Number.isFinite(n) ? n : v;
      }

      function deepClone(v) {
        try {
          return structuredClone(v);
        } catch {
          return JSON.parse(JSON.stringify(v));
        }
      }

      function ColorSwatch({ value }) {
        return (
          <div
            className="shrink-0 h-[28px] w-[28px] rounded-[6px] border border-[rgba(45,66,107,0.15)] overflow-hidden"
            style={{
              background:
                "repeating-conic-gradient(rgba(0,0,0,0.06) 0% 25%, transparent 0% 50%) 0 0 / 10px 10px",
            }}
          >
            <div className="w-full h-full" style={{ background: String(value || "transparent") }} />
          </div>
        );
      }

      // ─── Foundation Color Picker ─────────────────────────────────────────────
      // Displays a dropdown with all foundation palette colors + special/text colors.
      // Value is stored as a foundation token reference (e.g. "semi-brand-5").
      function FoundationColorPicker({ value, onChange, palette }) {
        const [open, setOpen] = useState(false);
        const rootRef = useRef(null);

        useEffect(() => {
          if (!open) return;
          function onDown(e) {
            if (rootRef.current && !rootRef.current.contains(e.target)) setOpen(false);
          }
          document.addEventListener("mousedown", onDown);
          return () => document.removeEventListener("mousedown", onDown);
        }, [open]);

        const resolved = resolveFoundationColor(value, palette || {});
        const isRef = typeof value === "string" && value.startsWith("semi-");

        const specialColors = [
          { key: "semi-color-white",     label: "White",     hex: "#FFFFFF" },
          { key: "semi-color-black",     label: "Black",     hex: "#000000" },
          { key: "semi-color-dark-text", label: "Dark Text", hex: "#222727" },
        ];

        return (
          <div ref={rootRef} className="relative">
            {/* Trigger button */}
            <button
              type="button"
              onClick={() => setOpen(!open)}
              className="flex items-center gap-[6px] w-full h-[30px] px-[8px] bg-white border border-[rgba(45,66,107,0.12)] rounded-[7px] hover:border-black transition-colors outline-none"
            >
              {/* Swatch */}
              <div className="shrink-0 w-[16px] h-[16px] rounded-[3px] border border-[rgba(45,66,107,0.15)] overflow-hidden"
                style={{ background: "repeating-conic-gradient(rgba(0,0,0,0.06) 0% 25%, transparent 0% 50%) 0 0/6px 6px" }}>
                <div className="w-full h-full" style={{ background: resolved }} />
              </div>
              {/* Label */}
              <span className="text-[10px] font-mono text-[rgba(34,39,39,0.6)] flex-1 text-left truncate">
                {isRef ? value : resolved}
              </span>
              {/* Chevron */}
              <svg viewBox="0 0 8 5" width="8" height="5" className="shrink-0 text-[rgba(34,39,39,0.35)]" fill="none">
                <path d="M1 1l3 3 3-3" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </button>

            {/* Dropdown panel */}
            {open && (
              <div
                className="absolute top-[34px] left-0 right-0 z-[9999] bg-white border border-[rgba(45,66,107,0.12)] rounded-[10px] shadow-xl overflow-auto"
                style={{ maxHeight: 300 }}
              >
                {/* Special colors */}
                <div className="px-[10px] pt-[10px] pb-[8px] border-b border-[rgba(45,66,107,0.06)]">
                  <div className="text-[9px] font-bold text-[rgba(34,39,39,0.4)] uppercase tracking-wider mb-[6px]">特殊色</div>
                  <div className="flex gap-[5px]">
                    {specialColors.map(sc => (
                      <button
                        key={sc.key}
                        type="button"
                        title={`${sc.key} · ${sc.hex}`}
                        onClick={() => { onChange(sc.key); setOpen(false); }}
                        className={cx(
                          "w-[20px] h-[20px] rounded-[4px] border-[2px] transition-all",
                          value === sc.key ? "border-black scale-110" : "border-[rgba(45,66,107,0.15)] hover:border-[rgba(0,0,0,0.3)]",
                        )}
                        style={{ background: sc.hex, outline: sc.hex === "#FFFFFF" ? "1px solid rgba(45,66,107,0.08)" : "none" }}
                      />
                    ))}
                  </div>
                </div>

                {/* Text colors (rgba) */}
                <div className="px-[10px] pt-[8px] pb-[8px] border-b border-[rgba(45,66,107,0.06)]">
                  <div className="text-[9px] font-bold text-[rgba(34,39,39,0.4)] uppercase tracking-wider mb-[6px]">文字色</div>
                  <div className="flex gap-[5px]">
                    {(typeof FOUNDATION_TEXT_INIT !== "undefined" ? FOUNDATION_TEXT_INIT : []).map(t => (
                      <button
                        key={t.key}
                        type="button"
                        title={`${t.key} · rgba(34,39,39,${t.alpha})`}
                        onClick={() => { onChange(t.key); setOpen(false); }}
                        className={cx(
                          "w-[20px] h-[20px] rounded-[4px] border-[2px] transition-all",
                          value === t.key ? "border-black scale-110" : "border-[rgba(45,66,107,0.15)] hover:border-[rgba(0,0,0,0.3)]",
                        )}
                        style={{ background: `rgba(34,39,39,${t.alpha})` }}
                      />
                    ))}
                  </div>
                </div>

                {/* Palette colors grouped by family */}
                <div className="p-[10px] flex flex-col gap-[8px]">
                  {Object.entries(palette || {}).map(([family, shades]) => (
                    <div key={family}>
                      <div className="text-[9px] text-[rgba(34,39,39,0.4)] mb-[4px]">
                        {(typeof FOUNDATION_COLOR_LABELS !== "undefined" && FOUNDATION_COLOR_LABELS[family]) || family}
                      </div>
                      <div className="flex gap-[2px]">
                        {(shades || []).map((hex, i) => {
                          const tokenKey = `${family}-${i}`;
                          return (
                            <button
                              key={i}
                              type="button"
                              title={`${tokenKey} · ${hex}`}
                              onClick={() => { onChange(tokenKey); setOpen(false); }}
                              className={cx(
                                "w-[18px] h-[18px] rounded-[2px] border-[2px] transition-all",
                                value === tokenKey ? "border-black scale-110" : "border-transparent hover:border-[rgba(0,0,0,0.3)]",
                              )}
                              style={{ background: hex }}
                            />
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      }

      function TokenField({ label, path, value, type, onChange, onHoverChange, palette }) {
        const inputBase =
          "h-[30px] px-[8px] bg-[#ffffff] border border-[rgba(45,66,107,0.12)] rounded-[7px] text-[#222727] outline-none focus:ring-1 focus:ring-black w-full";
        const mono = "font-mono text-[11px]";

        // css-color: any CSS color string (hex, rgba, hsl, etc.) — shows swatch + text input
        // color: hex only — shows swatch + native color picker + text input
        const isColorType = type === "color" || type === "css-color";
        const [iconOpen, setIconOpen] = useState(false);
        const [iconQuery, setIconQuery] = useState("");

        useEffect(() => {
          if (!iconOpen) return;
          let alive = true;
          (async () => {
            try {
              await window.__ENSURE_ICON_LIB_ALL__?.();
              if (!alive) return;
              // force re-render by touching state (query unchanged)
              setIconQuery((q) => q);
            } catch {}
          })();
          function onDocDown(e) {
            const el = e.target;
            const root = document.querySelector(`[data-icon-field-root="${safeCssEscape(path)}"]`);
            if (!root) return;
            if (root.contains(el)) return;
            setIconOpen(false);
          }
          document.addEventListener("mousedown", onDocDown, true);
          return () => {
            alive = false;
            document.removeEventListener("mousedown", onDocDown, true);
          };
        }, [iconOpen, path]);

        return (
          <div
            className="flex flex-col gap-[4px]"
            onMouseEnter={() => onHoverChange?.(path)}
            onMouseLeave={() => onHoverChange?.(null)}
            data-icon-field-root={path}
          >
            <div className="flex items-center justify-between gap-[6px]">
              <div className="text-[11px] leading-[15px] font-medium text-[#222727] flex-1 min-w-0 truncate">{label}</div>
              <div className={cx("text-[10px] leading-[14px] text-[rgba(34,39,39,0.45)] shrink-0", mono)}>{path}</div>
            </div>
            {type === "number" ? (
              <input
                className={cx(inputBase, mono)}
                value={String(value ?? "")}
                inputMode="numeric"
                onChange={(e) => onChange(parseMaybeNumber(e.target.value))}
              />
            ) : type === "icon" ? (
              <div className="relative">
                <button
                  type="button"
                  className={cx(
                    "w-full h-[30px] px-[8px] bg-[#ffffff] border border-[rgba(45,66,107,0.12)] rounded-[7px] outline-none focus:ring-1 focus:ring-black flex items-center gap-[8px]",
                  )}
                  onClick={() => setIconOpen((v) => !v)}
                >
                  <span className="shrink-0">
                    {renderIconFromLibrary({
                      name: String(value || ""),
                      size: 16,
                      fallbackUrl: hiaiSvgUrl("send_stroked.svg"),
                      fallbackInset: "inset-[8.66%_8.66%_3.54%_3.54%]",
                      imgStyle: { opacity: 0.9 },
                    })}
                  </span>
                  <span className={cx("flex-1 min-w-0 truncate text-left", mono)}>{String(value ?? "") || "选择图标…"}</span>
                  <svg viewBox="0 0 8 5" width="8" height="5" className="shrink-0 text-[rgba(34,39,39,0.35)]" fill="none">
                    <path d="M1 1l3 3 3-3" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                </button>

                {iconOpen ? (
                  <div
                    className="absolute top-[34px] left-0 right-0 z-[9999] bg-white border border-[rgba(45,66,107,0.12)] rounded-[10px] shadow-xl overflow-hidden"
                  >
                    <div className="p-[10px] border-b border-[rgba(45,66,107,0.06)]">
                      <input
                        className={cx(
                          "h-[30px] px-[10px] rounded-[8px] border border-[rgba(45,66,107,0.12)] outline-none focus:ring-1 focus:ring-black w-full",
                          mono,
                        )}
                        value={iconQuery}
                        placeholder="搜索图标…"
                        onChange={(e) => setIconQuery(e.target.value)}
                        autoFocus
                      />
                      <div className="text-[10px] leading-[14px] text-[rgba(34,39,39,0.45)] mt-[6px]">
                        从图标库按 name 选择替换（支持模糊搜索）。点击方块即可应用。
                      </div>
                    </div>

                    <div className="p-[10px] overflow-auto" style={{ maxHeight: 320 }}>
                      {(() => {
                        const q = String(iconQuery || "").trim().toLowerCase();
                        const names = getAllIconNames();
                        const filtered = q ? names.filter((n) => n.toLowerCase().includes(q)) : names;
                        const shown = filtered.slice(0, 240);
                        return (
                          <>
                            <div className="grid grid-cols-6 gap-[8px]">
                              {shown.map((n) => {
                                const active = String(value || "") === n;
                                return (
                                  <button
                                    key={n}
                                    type="button"
                                    title={n}
                                    onClick={() => {
                                      onChange(n);
                                      setIconOpen(false);
                                    }}
                                    className={cx(
                                      "w-[44px] h-[44px] rounded-[10px] border flex items-center justify-center transition-colors",
                                      active
                                        ? "border-black bg-[rgba(0,0,0,0.04)]"
                                        : "border-[rgba(45,66,107,0.12)] hover:bg-[rgba(83,96,143,0.07)]",
                                    )}
                                  >
                                    {renderIconFromLibrary({
                                      name: n,
                                      size: 18,
                                      fallbackUrl: hiaiSvgUrl("send_stroked.svg"),
                                      fallbackInset: "inset-[8.66%_8.66%_3.54%_3.54%]",
                                      imgStyle: { opacity: 0.9 },
                                    })}
                                  </button>
                                );
                              })}
                            </div>
                            <div className="mt-[10px] text-[10px] leading-[14px] text-[rgba(34,39,39,0.45)]">
                              {q ? `匹配 ${filtered.length} 项` : `共 ${names.length} 项`}；当前展示前 {shown.length} 项
                            </div>
                          </>
                        );
                      })()}
                    </div>
                  </div>
                ) : null}
              </div>
            ) : type === "color" ? (
              <FoundationColorPicker
                value={value}
                palette={palette || {}}
                onChange={onChange}
              />
            ) : type === "css-color" ? (
              <div className="flex items-center gap-[6px]">
                <ColorSwatch value={value} />
                <input className={cx(inputBase, mono, "flex-1")} value={String(value ?? "")} onChange={(e) => onChange(e.target.value)} />
              </div>
            ) : (
              <input className={cx(inputBase, mono)} value={String(value ?? "")} onChange={(e) => onChange(e.target.value)} />
            )}
          </div>
        );
      }

      function TokensPanel({
        title = "Tokens（可编辑）",
        subtitle = "颜色 token 引用基础参数色板，在「基础参数」页修改即可全局联动更新。",
        tokens,
        onTokensChange,
        onHoverChange,
        sections,
        isDirty,
        onSave,
        onCancel,
        palette,
      }) {
        return (
          <div className="bg-[#ffffff] rounded-[12px] overflow-hidden h-full flex flex-col">
            <div className="px-[16px] py-[12px] border-b border-[rgba(45,66,107,0.12)]">
              <div className="flex items-center justify-between gap-[12px]">
                <div className="text-[#222727] text-sm font-bold">{title}</div>
                {isDirty ? (
                  <div className="flex items-center gap-[8px]">
                    <button
                      type="button"
                      className="h-[28px] px-[10px] rounded-[8px] bg-black text-white text-[12px] font-semibold hover:opacity-85 active:opacity-70 outline-none focus:ring-1 focus:ring-black"
                      onClick={onSave}
                    >
                      保存
                    </button>
                    <button
                      type="button"
                      className="h-[28px] px-[10px] rounded-[8px] border border-[rgba(45,66,107,0.12)] bg-[#ffffff] text-[12px] font-semibold text-[#222727] hover:bg-[rgba(83,96,143,0.07)] active:opacity-90 outline-none focus:ring-1 focus:ring-black"
                      onClick={onCancel}
                    >
                      取消
                    </button>
                  </div>
                ) : null}
              </div>
              <div className="text-[rgba(34,39,39,0.6)] text-xs mt-[2px]">{subtitle}</div>
            </div>
            <div className="p-[16px] flex-1 overflow-auto flex flex-col gap-[16px]">
              {(sections || []).map((sec) => (
                <div key={sec.title} className="flex flex-col gap-[12px]">
                  <div className="text-[12px] font-bold text-[#222727]">{sec.title}</div>
                  <div className="grid grid-cols-1 gap-[12px]">
                    {sec.fields.map((f) => {
                      const v = getIn(tokens, f.path);
                      return (
                          <TokenField
                          key={f.path}
                          label={f.label}
                          path={f.path}
                          value={v}
                          type={f.type}
                          onChange={(next) => onTokensChange(setIn(tokens, f.path, next))}
                          onHoverChange={onHoverChange}
                          palette={palette}
                        />
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }
      
      function IconMagicWand({ className }) {
        return (
          <svg viewBox="0 0 16 16" className={className} aria-hidden="true">
            <path
              d="M6.11 3.04a.75.75 0 0 1 .97.4l.44 1.1 1.1.44a.75.75 0 0 1 0 1.4l-1.1.44-.44 1.1a.75.75 0 0 1-1.4 0l-.44-1.1-1.1-.44a.75.75 0 0 1 0-1.4l1.1-.44.44-1.1a.75.75 0 0 1 .43-.4ZM3.2 10.44l6.8-6.8a1.25 1.25 0 0 1 1.77 0l.6.6a1.25 1.25 0 0 1 0 1.77l-6.8 6.8a1.25 1.25 0 0 1-1.77 0l-.6-.6a1.25 1.25 0 0 1 0-1.77Z"
              fill="currentColor"
              opacity="0.92"
            />
            <path
              d="M10.47 6.53 4.93 12.07"
              stroke="currentColor"
              strokeWidth="1.2"
              strokeLinecap="round"
              opacity="0.9"
            />
          </svg>
        );
      }
      
      function IconChevronUp({ className }) {
        return (
          <svg viewBox="0 0 16 16" className={className} aria-hidden="true">
            <path
              d="M3.5 10.2 8 5.7l4.5 4.5"
              fill="none"
              stroke="currentColor"
              strokeWidth="1.4"
              strokeLinecap="round"
              strokeLinejoin="round"
            />
          </svg>
        );
      }
      
      function IconCopy({ className }) {
        return (
          <svg viewBox="0 0 16 16" className={className} aria-hidden="true">
            <path
              d="M6 5.25A1.25 1.25 0 0 1 7.25 4h5.5A1.25 1.25 0 0 1 14 5.25v6.5A1.25 1.25 0 0 1 12.75 13h-5.5A1.25 1.25 0 0 1 6 11.75v-6.5Z"
              fill="currentColor"
              opacity="0.92"
            />
            <path
              d="M4.25 3h5.2a.75.75 0 1 1 0 1.5H4.25A.75.75 0 0 0 3.5 5.25v5.2a.75.75 0 1 1-1.5 0v-5.2A2.25 2.25 0 0 1 4.25 3Z"
              fill="currentColor"
              opacity="0.65"
            />
          </svg>
        );
      }
      
      function IconRefresh({ className }) {
        return (
          <svg viewBox="0 0 16 16" className={className} aria-hidden="true">
            <path
              d="M13.2 8a5.2 5.2 0 1 1-1.2-3.3"
              fill="none"
              stroke="currentColor"
              strokeWidth="1.3"
              strokeLinecap="round"
            />
            <path
              d="M12.1 2.9h2v2"
              fill="none"
              stroke="currentColor"
              strokeWidth="1.3"
              strokeLinecap="round"
              strokeLinejoin="round"
            />
          </svg>
        );
      }
      
      function IconThumbUp({ className }) {
        return (
          <svg viewBox="0 0 16 16" className={className} aria-hidden="true">
            <path

            <path

      function IconThumbDown({ className }) {

          <svg viewBox="0 0 16 16" className={className} aria-hidden="true">
            <path
              d="M9.2 8.9 7.8 12.2c-.3.7-1.2.9-1.7.4-.3-.3-.4-.8-.3-1.2l.5-2H3.8c-.8 0-1.4-.7-1.2-1.5l.8-3.7c.1-.6.7-1 1.3-1h4.5v5.7Z"
              fill="currentColor"
              opacity="0.92"
            />
            <path
              d="M13 8.8h-2.2V2.7H13a1 1 0 0 1 1 1v4.1a1 1 0 0 1-1 1Z"

            />

      function ShimmerLine({ w = "w-full", delay = "0s" }) {
        return (
          <div
            className={cx("h-[12px] rounded-[6px]", w)}
            style={{
              background: "linear-gradient(90deg,rgba(45,66,107,0.08) 25%,rgba(255,255,255,0.70) 50%,rgba(45,66,107,0.08) 75%)",
              backgroundSize: "200% 100%",
              animation: `shimmer 1.8s ease-in-out ${delay} infinite`,
            }}
          />

      }

      function FormRecommend({
        label = "问题描述",
        placeholder = "请输入",
        scenario = "multi", // 'loading' | 'single' | 'multi'
        resetNonce = 0,
        disabled = false,
        highlightTarget,
        tokens,
      }) {
        const t = tokens || FORM_RECOMMEND_TOKENS;
        const hl = (key) =>
          highlightTarget === key ? `ring-2 ring-[${t.focusRing}] ring-offset-2 ring-offset-[rgba(255,255,255,0.75)]` : "";

        const [value, setValue] = useState("");
        const [adopted, setAdopted] = useState(false);
        const [selectedIdx, setSelectedIdx] = useState(-1);
        const [hoverIdx, setHoverIdx] = useState(-1);
        const [inputHovered, setInputHovered] = useState(false);
        const [refreshing, setRefreshing] = useState(false);

        const recommendItems = useMemo(() => {
          if (scenario === "single")
            return [
              "视频被误判违规，申诉未通过",
            ];
          if (scenario === "multi")
            return [
              "账号无法登录，验证码一直失败",
              "申诉入口找不到，页面一直跳转",
              "订单退款失败，进度长时间卡住",
            ];
          if (scenario === "ultra")
            return [
              "用户反馈账号突然被封禁，提示存在异常风险，但其表示从未进行违规操作；已尝试提交申诉与补充材料仍未通过，希望尽快恢复账号登录与发布权限，并确认后续如何避免再次触发风控。",
              "用户表示短视频被系统判定违规下架，已对照社区规范但认为内容合规；多次申诉均被驳回，要求说明具体违规点、提供可修改建议，并希望尽快恢复作品展示以减少影响。",
              "用户咨询订单退款进度一直卡在“处理中”，已超过承诺时效；担心资金安全，要求查询退款状态、明确预计到账时间，并提供遇到异常时的处理路径与可联系的人工渠道。",
            ];
          return [];
        }, [scenario]);

        // Reset & scenario change should restore initial state
        useEffect(() => {
          setValue("");
          setAdopted(false);
          setSelectedIdx(-1);
          setHoverIdx(-1);
        }, [resetNonce, scenario]);

        function adopt(idx) {
          if (disabled) return;
          const next = recommendItems?.[idx] || "";
          if (!next) return;
          setSelectedIdx(idx);
          setValue(next);
          // after adopting, bottom stripe/list disappears (user accepted)
          setAdopted(true);
        }

        function handleRefresh() {
          if (disabled || refreshing) return;
          setRefreshing(true);
          setAdopted(false);
          setSelectedIdx(-1);
          setTimeout(() => setRefreshing(false), 1500);
        }

        const hasRecommend = recommendItems.length > 0;
        // loading 场景或手动刷新中：显示彩色渐变骨架动效条
        const showStripe = (scenario === "loading" || refreshing) && !adopted;
        const showList = (scenario === "single" || scenario === "multi" || scenario === "ultra") && hasRecommend && !adopted && !refreshing;

        return (
          <div className={cx("w-full flex flex-col items-start", `gap-[${t.gapOuterPx}px]`, disabled && "opacity-60 cursor-not-allowed")}>
            {/* Title row */}
            <div className={cx("flex items-center", `gap-[${t.titleGapPx}px]`, hl("titleRow"))}>
              <div className="flex items-center">
                <p
                  className={cx(
                    `text-[${t.titleFontSizePx}px] leading-[${t.titleLineHeightPx}px] font-semibold`,
                    `text-[${t.titleColor}]`,
                    hl("label"),
