    <style>
      /* ── Platform Design Tokens (遵循基础参数) ──────────────────────────────
         颜色来源：基础参数色板
           --ui-primary    = semi-color-black  (#000000) 主按钮 / 激活态
           --ui-bg         = semi-bluegrey-0   (#FCFCFD) 页面底色
           --ui-surface    = #FFFFFF            卡片白底
           --ui-text       = semi-color-text-0 (#222727) 正文主色
           --ui-radius-sm  = semi-border-radius-small  (6px)
           --ui-radius-md  = semi-border-radius-medium (8px)
           --ui-radius-lg  = semi-border-radius-large  (12px)
      ────────────────────────────────────────────────────────────────────── */
      :root {
        --ui-primary:      #000000;
        --ui-primary-text: #ffffff;
        --ui-bg:           #f5f6f8;
        --ui-surface:      #ffffff;
        --ui-text:         #222727;
        --ui-radius-sm:    6px;
        --ui-radius-md:    8px;
        --ui-radius-lg:    12px;
        --ui-font: "PingFang SC", "PingFangSC", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: var(--ui-font);
      }
      #root {
        height: 100%;
      }
      @keyframes shimmer {
        0%   { background-position: 200% center; }
        100% { background-position: -200% center; }
      }
      /* 彩条往返流动（FormRecommend 加载态专用） */
      @keyframes aiStripeFlow {
        0%, 100% { background-position: 0%   50%; }
        50%      { background-position: 100% 50%; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes aiStripeMove {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 100% 50%;
        }
      }
      @keyframes aiInputMotionDrift {
        0% {
          transform: translateX(-6%) translateY(0%) scale(1.02);
          opacity: 0.92;
        }
        100% {
          transform: translateX(6%) translateY(-2%) scale(1.02);
          opacity: 0.92;
        }
      }
      .md { font-size: 12px; line-height: 1.6; }
      .md h1 {
        font-size: 14px;
        font-weight: 700;
        color: #222727;
        margin: 0 0 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(45,66,107,0.12);
      }
      .md h2 {
        font-size: 12px;
        font-weight: 700;
        color: #222727;
        margin: 16px 0 6px;
        padding: 4px 8px;
        background: rgba(83,96,143,0.06);
        border-radius: 6px;
        border-left: 3px solid #000000;
      }
      .md h3 {
        font-size: 11.5px;
        font-weight: 600;
        color: #222727;
        margin: 12px 0 4px;
      }
      .md h4 {
        font-size: 11px;
        font-weight: 600;
        color: rgba(34,39,39,0.7);
        margin: 8px 0 4px;
      }
      .md p {
        font-size: 12px;
        line-height: 18px;
        color: rgba(34,39,39,0.82);
        margin: 4px 0;
      }
      .md li {
        font-size: 12px;
        line-height: 18px;
        color: rgba(34,39,39,0.82);
      }
      .md blockquote {
        margin: 6px 0;
        padding: 6px 10px;
        border-left: 3px solid rgba(0,0,0,0.25);
        background: rgba(0,0,0,0.04);
        border-radius: 0 6px 6px 0;
      }
      .md blockquote p { margin: 0; color: rgba(34,39,39,0.72); font-size: 11.5px; }
      .md code {
        font-size: 10.5px;
        font-family: "SF Mono", "Fira Code", "Consolas", monospace;
        background: rgba(83,96,143,0.07);
        border: 1px solid rgba(45,66,107,0.12);
        border-radius: 4px;
        padding: 1px 5px;
      }
      .md pre {
        background: rgba(34,39,39,0.04);
        border: 1px solid rgba(45,66,107,0.1);
        border-radius: 8px;
        margin: 6px 0;
        overflow: auto;
      }
      .md pre code {
        display: block;
        padding: 10px 12px;
        font-size: 10.5px;
        line-height: 16px;
        background: none;
        border: none;
      }
      .md ul, .md ol {
        padding-left: 16px;
        margin: 4px 0;
      }
      .md table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
        margin: 6px 0;
      }
      .md th {
        text-align: left;
        font-weight: 600;
        padding: 5px 8px;
        background: rgba(83,96,143,0.07);
        border: 1px solid rgba(45,66,107,0.12);
        color: #222727;
        white-space: nowrap;
      }
      .md td {
        padding: 4px 8px;
        border: 1px solid rgba(45,66,107,0.1);
        color: rgba(34,39,39,0.82);
        vertical-align: top;
      }
      .md tr:nth-child(even) td { background: rgba(83,96,143,0.03); }
      .md hr {
        border: 0;
        border-top: 1px solid rgba(45,66,107,0.1);
        margin: 10px 0;
      }
      .md [data-token-path] {
        border-radius: 4px;
        padding: 1px 5px;
        margin: 0 1px;
        transition: background-color 120ms ease, box-shadow 120ms ease;
      }
      .md .md-token-active {
        background: rgba(0,0,0,0.07);
        box-shadow: 0 0 0 1px rgba(0,0,0,0.2) inset;
      }

      // Icon picker options (hydrated from icon library)
      window.__ICON_NAME_CACHE__ = window.__ICON_NAME_CACHE__ || { list: [], version: 0 };
      function getAllIconNames() {
        const dict = window.__ICON_LIBRARY__?.byName || {};
        const names = Object.keys(dict);
        names.sort((a, b) => a.localeCompare(b));
        return names;
      }

      const { useEffect, useId, useMemo, useRef, useState } = React;

      function cx(...parts) {
        return parts.filter(Boolean).join(" ");
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function mdToken(path, value) {
        return `<code data-token-path="${escapeHtml(path)}">${escapeHtml(value)}</code>`;
      }

      function safeCssEscape(s) {
        try {
          if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(String(s));
        } catch {}
        // Minimal fallback: escape quotes/backslashes and brackets for attribute selectors
        return String(s).replaceAll("\\\\", "\\\\\\\\").replaceAll('"', '\\"').replaceAll("[", "\\[").replaceAll("]", "\\]");
      }

      const SUMMARY_ICON_SRC = "./summary-icon.png";

      function resolveAssetUrl(relPath) {
        try {
          return new URL(relPath, window.location.href).toString();
        } catch {

        }
      }

      function hiaiSvgUrl(filename) {
        return resolveAssetUrl("./hiai%20icon%20svg/" + String(filename || ""));

      // ─── Foundation color resolver ──────────────────────────────────────────
      const FOUNDATION_TEXT_COLOR_MAP = {
        "semi-color-text-0": "rgba(34,39,39,1.0)",
        "semi-color-text-1": "rgba(34,39,39,0.8)",
        "semi-color-text-2": "rgba(34,39,39,0.6)",
        "semi-color-text-3": "rgba(34,39,39,0.35)",
      };
      // Resolve a foundation token reference (e.g. "semi-brand-5") to its actual CSS value.
      // Falls back to the literal string if it's not a known reference.
      function resolveFoundationColor(ref, palette) {
        if (!ref || typeof ref !== "string") return ref || "#000000";
        // Palette reference: "semi-{family}-{shade 0-9}"
        // Use greedy match to capture everything before the last "-digit" as the family name.
        const m = ref.match(/^(semi-.+)-(\d)$/);
        if (m) {
          const fam = m[1];
          const idx = parseInt(m[2]);
          if (palette && palette[fam] && palette[fam][idx] !== undefined)
            return palette[fam][idx];
        }
        if (ref === "semi-color-white") return "#FFFFFF";
        if (ref === "semi-color-black") return "#000000";
        if (ref === "semi-color-danger") return "#E23E25";
        if (ref === "semi-color-dark-text") return "#222727";
        if (FOUNDATION_TEXT_COLOR_MAP[ref]) return FOUNDATION_TEXT_COLOR_MAP[ref];
        return ref; // literal fallback (rgba, gradients, etc.)
      }
      // Recursively resolve all color references in a token tree.
      function resolveAllTokenColors(tokens, palette) {
        function rec(v) {
          if (typeof v === "string") return resolveFoundationColor(v, palette);
          if (Array.isArray(v)) return v.map(rec);
          if (v && typeof v === "object")
            return Object.fromEntries(Object.entries(v).map(([k, val]) => [k, rec(val)]));
          return v;
        }
        return rec(tokens);
      }

      // ─── Token persistence (localStorage) ──────────────────────────────────
      function safeJsonParse(s) {
        try { return JSON.parse(s); } catch { return null; }
      }
      function storageKeyForTokens(componentId) {
        return `hiai.tokens.v1.${String(componentId || "")}`;
      }
      function loadSavedTokens(componentId, fallback) {
        try {
          const raw = window.localStorage?.getItem(storageKeyForTokens(componentId));
          const parsed = raw ? safeJsonParse(raw) : null;
          if (parsed && typeof parsed === "object") return parsed;
        } catch {}
        return deepClone(fallback);
      }
      function saveTokens(componentId, tokens) {
        try {
          window.localStorage?.setItem(storageKeyForTokens(componentId), JSON.stringify(tokens));
        } catch {}

          "## \u00a73 Component Specifications\uff08\u7ec4\u4ef6\u89c4\u8303\uff09",
          "",
          "### 3.1 Anatomy \u2014 DOM \u89e3\u5256\u7ed3\u6784\uff08\u5fc5\u987b\u5305\u542b\uff0c\u4e0d\u5f97\u7701\u7565\u4efb\u610f\u5c42\uff09",
          "",
          "```html",
          `<!-- OuterCard: border-radius:${t.radiusOuterPx}px; padding:${t.paddingOuterPx}px; gap:${t.gapOuterPx}px; border:1px solid ${t.borderOuter} -->`,
          "<section class=\"smart-summary-card\">",
          "  <!-- Header \u533a\u57df -->",
          `  <div class=\"header\" style=\"gap:${t.headerGap}px;\">`,
          "    <h2 class=\"title\">\u7ec4\u4ef6\u6807\u9898\uff08\u5fc5\u987b\u5355\u884c\u7701\u7565\uff09</h2>",
          "    <!-- \u64cd\u4f5c\u6309\u9215\uff1a\u590d\u5236\u3001\u5237\u65b0\uff08\u53ef\u9009\uff09\u3001\u5c55\u5f00/\u6298\u53e0 -->",
          `    <button class=\"icon-btn\" style=\"padding:${t.iconButtonPad}px; border-radius:${t.radiusIconButtonPx}px;\">`,
          "      <svg class=\"copy-icon\"></svg>",
          "    </button>",
          `    <button class=\"icon-btn\" style=\"padding:${t.iconButtonPad}px; border-radius:${t.radiusIconButtonPx}px;\">`,
          "      <svg class=\"refresh-icon\"></svg>",
          "    </button>",
          `    <button class=\"collapse-btn\" style=\"padding:${t.iconButtonPad}px; border-radius:${t.radiusIconButtonPx}px;\">`,
          "      <svg class=\"chevron-icon\"></svg>",
          "    </button>",
          "  </div>",
          "  <!-- Body \u72b6\u6001\uff08\u56db\u6001\u4e92\u65a5\uff1aReady/Loading/Empty/Error\uff09 -->",
          "  <!-- Ready \u6001: \u6b63\u6587\u6bb5\u843d -->",
          "  <div class=\"body-ready\">",
          `    <p style=\"font-size:${t.bodyFontSizePx}px; line-height:${t.bodyLineHeightPx}px;\">\u6458\u8981\u5185\u5bb9\u6bb5\u843d 1</p>`,
          `    <p style=\"margin-top:${t.paragraphGap}px;\">\u6458\u8981\u5185\u5bb9\u6bb5\u843d 2</p>`,
          "  </div>",
          "  <!-- Loading \u6001: shimmer skeleton -->",
          "  <div class=\"body-loading\">",
          `    <div class=\"shimmer\" style=\"border-radius:${t.shimmer.radius}px; background:${t.shimmer.base};\"></div>`,
          "  </div>",
          "  <!-- Empty \u6001: \u7a7a\u72b6\u6001\u63d0\u793a -->",
          "  <div class=\"body-empty\">",
          `    <p style=\"font-size:${t.bodyFontSizePx}px; line-height:${t.bodyLineHeightPx}px;\">\u6682\u65e0\u53ef\u751f\u6210\u7684\u6458\u8981\u5185\u5bb9</p>`,
          `    <button class=\"primary-btn\" style=\"height:${t.button.height}px; border-radius:${t.button.radius}px;\">\u91cd\u65b0\u751f\u6210</button>`,
          "  </div>",
          "  <!-- Error \u6001: \u9519\u8bef\u72b6\u6001 -->",
          "  <div class=\"body-error\">",
          "    <div>",
          "      <p class=\"error-title\" style=\"color:#f74331;\">\u6458\u8981\u751f\u6210\u5931\u8d25</p>",
          `      <p style=\"font-size:${t.bodyFontSizePx}px; line-height:${t.bodyLineHeightPx}px;\">\u8bf7\u68c0\u67e5\u7f51\u7edc\u6216\u7a0d\u540e\u91cd\u8bd5</p>`,
          "    </div>",
          `    <button class=\"secondary-btn\" style=\"height:${t.button.height}px; border-radius:${t.button.radius}px;\">\u91cd\u8bd5</button>`,
          "  </div>",
          "  <!-- Footer: Tags + Feedback\uff08\u4ec5\u5c55\u5f00\u6001\u663e\u793a\uff09 -->",
          "  <div class=\"footer\">",
          "    <!-- Tags \u533a\u57df\uff08\u53ef\u9009\uff0c\u7eaf\u9759\u6001\u5c55\u793a\uff0c\u65e0\u4ea4\u4e92\uff09 -->",
          "    <div class=\"tags\">",
          `      <span class=\"tag\" style=\"height:${t.tag.height}px; padding:0 ${t.tag.padX}px; border-radius:${t.tag.radius}px; display:inline-flex; align-items:center;\">Pink Tag</span>`,
          "    </div>",
          "    <!-- Feedback \u533a\u57df\uff08\u53ef\u9009\uff09 -->",
          "    <div class=\"feedback\">",
          `      <button class=\"icon-btn\" style=\"width:24px; height:24px; border-radius:6px;\">`,
          "        <svg class=\"thumb-up-icon\"></svg>",
          "      </button>",
          `      <button class=\"icon-btn\" style=\"width:24px; height:24px; border-radius:6px;\">`,
          "        <svg class=\"thumb-down-icon\"></svg>",
          "      </button>",
          "    </div>",
          "  </div>",
          "</section>",
          "```",
          "",
          "### 3.2 States\uff08\u4ea4\u4e92\u72b6\u6001\u673a\uff09",
          "",
          "| \u72b6\u6001 | \u89e6\u53d1\u6761\u4ef6 | Body \u5185\u5bb9 | \u5904\u7406\u65b9\u5f0f |",
          "| --- | --- | --- | --- |",
          `| **Ready** | \u6570\u636e\u52a0\u8f7d\u5b8c\u6210 | \u6628\u6587\u6b63\u6587\uff08\u6bb5\u843d\u95f4\u8ddd ${mdToken("paragraphGap", `${t.paragraphGap}px`)}\uff09 | \u6e32\u67d3\u5185\u5bb9 |`,

          "| **Empty** | \u6ca1\u6709\u6458\u8981\u5185\u5bb9 | \u7a7a\u6001\u63d0\u793a\u6587\u6848 | \u6587\u5b57\u989c\u8272\u7528 Text Sub |",
          "| **Error** | \u8bf7\u6c42\u5931\u8d25 | \u9519\u8bef\u6807\u9898 + \u8bf4\u660e + \u91cd\u8bd5\u6309\u9215 | \u6807\u9898\u7ea2\u8272 `#f74331` |",
          "| **Collapsed** | \u7528\u6237\u70b9\u51fb\u6298\u53e0 | \u9690\u85cf Body \u533a | Header \u4fdd\u7559 |",

          "",
          "- Tag \u989c\u8272\u4ec5\u9650 Pink / Teal / Violet \u4e09\u5957\uff0c\u4e0d\u5f97\u65b0\u589e\u3002",
          "- **Tag \u4e3a\u7eaf\u9759\u6001\u5c55\u793a**\uff1a\u65e0 hover \u4ea4\u4e92\u3001\u65e0\u70b9\u51fb\u4e8b\u4ef6\u3001\u65e0 focus \u6837\u5f0f\uff0c\u4f7f\u7528 `<span>` \u5143\u7d20\u3002",
          "- **Tag \u6837\u5f0f**\uff1a`display:inline-flex; align-items:center; height:${t.tag.height}px; padding:0 ${t.tag.padX}px; border-radius:${t.tag.radius}px;`",

          "",
          "## \u00a74 Layout & Composition Logic\uff08\u5e03\u5c40\u4e0e\u7ec4\u5408\u903b\u8f91\uff09",
          "",
          "### 4.1 Container Rules\uff08\u5bb9\u5668\u89c4\u5219\uff09",
          "",
          "- **\u5bbd\u5ea6**\uff1a`width: 100%`\uff0c\u5fc5\u987b\u6491\u6ee1\u7236\u5bb9\u5668\uff0c**\u7981\u6b62\u8bbe\u5b9a `max-width`**\u3002",
          "- **\u9ad8\u5ea6**\uff1a\u968f\u5185\u5bb9\u81ea\u9002\u5e94\uff08\u7981\u6b62\u56fa\u5b9a\u9ad8\u5ea6\uff09\uff1bSkeleton \u5141\u8bb8\u4f7f\u7528 `min-height`\u3002",
          "- **\u5e03\u5c40**\uff1aFlex column\uff0cgap \u4e25\u683c\u4f7f\u7528 gapOuterPx\u3002",
          "",
          "### 4.2 Alignment\uff08\u5bf9\u9f50\uff09",
          "",
          "- Header\uff1a`display:flex; align-items:center; gap:" + t.headerGap + "px`",
          "- \u6807\u9898\u5fc5\u987b\u5355\u884c\u7701\u7565\uff1a`white-space:nowrap; overflow:hidden; text-overflow:ellipsis`",
          "- Tags \u533a\uff1aflex wrap\uff0cgap 4px\uff0c\u6b6a\u5de6\u5bf9\u9f50\u3002",
          "",
          "### 4.3 Gradient Background \u5e94\u7528\u9006\u8f91",
          "",
          "- \u6e10\u53d8\u5c42\u5fc5\u987b\u6309 §2.6 \u7684\u987a\u5e8f\u53e0\u52a0\uff0c\u4e0d\u5f97\u6539\u53d8\u987a\u5e8f\u3002",
          "- AUTO_STOP \u9700\u6839\u636e\u5b9e\u9645\u7ec4\u4ef6\u9ad8\u5ea6\u52a8\u6001\u8ba1\u7b97\uff08<200px \u7528 40%\uff1b\u2265200px \u7528 20%\uff09\u3002",
          "",
          "### 4.4 Responsive Behavior\uff08\u54cd\u5e94\u5f0f\uff09",
          "",
          "- \u65e0\u65ad\u70b9\u53d8\u5316\uff1a\u9762\u677f\u5bbd\u5ea6\u6c38\u8fdc `width:100%`\uff0c\u5c0f\u5c4f\u65f6\u4e0d\u989d\u5916\u6539\u53d8 padding\u3002",
          "- \u6298\u53e0\u903b\u8f91\u4e0d\u56e0\u65ad\u70b9\u53d8\u5316\u800c\u6539\u53d8\u3002",
          "",
          "---",
          "",
          "## \u00a75 Motion & Interaction\uff08\u52a8\u6548\u4e0e\u5fae\u4ea4\u4e92\uff09",
          "",
          "### 5.1 Shimmer Loading \u52a8\u6548",
          "",
          `- **\u89e6\u53d1**\uff1a\u6570\u636e\u52a0\u8f7d\u4e2d\u65f6\u663e\u793a Skeleton\u3002`,
          `- **Duration**\uff1a${mdToken("shimmer.durationSec", `${t.shimmer.durationSec}s`)}`,
          "- **Easing**\uff1a`linear`\uff0c\u5faa\u73af\u64ad\u653e\u3002",
          `- **Skeleton \u5e95\u8272**\uff1a${mdToken("shimmer.base", t.shimmer.base)}`,
          "- **Shimmer \u79fb\u52a8\u52a8\u753b**\uff1a`translateX(-100%)` \u2192 `translateX(100%)`\uff0c\u53e0\u5728\u57fa\u5e95\u8272\u4e0a\u3002",
          "",
          "### 5.2 Collapse / Expand \u5fae\u4ea4\u4e92",
          "",
          "- **\u89e6\u53d1**\uff1a\u70b9\u51fb Header \u53f3\u4fa7\u6298\u53e0\u6309\u9215\u3002",
          "- **Chevron \u65cb\u8f6c**\uff1a\u5c55\u5f00\u6001\u2192 chevron-up\uff0c\u6298\u53e0\u6001\u2192 chevron-down\uff1b`transition: transform 200ms ease`\u3002",
          "- **Body \u663e\u9690**\uff1a\u7b80\u5355 `display:none / display:block`\uff08\u4e0d\u8981\u5f3a\u5236\u52a0 height \u52a8\u753b\uff09\u3002",
          "",
          "### 5.3 Hover \u5fae\u4ea4\u4e92",
          "",
          `- **Trigger**\uff1amouseenter \u56fe\u6807\u6309\u9215 \u2192 \u80cc\u666f\u53e0\u52a0 ${mdToken("hoverFill", t.hoverFill)}`,
          "- **Duration**\uff1a`transition: background-color 120ms ease`",
          "",

          "",
          "## \u00a76 Anti-Patterns & Constraints\uff08\u8d1f\u9762\u7ea6\u675f / \u907f\u5751\u6307\u5357\uff09",
          "",
          "### \u274c \u7edd\u5bf9\u7981\u6b62\uff08DON'Ts\uff09",
          "",
          "- **\u7981\u6b62**\u4f7f\u7528\u5185\u8054\u6837\u5f0f\u4e2d\u7684 Tailwind \u9ed8\u8ba4\u8272\u540d\uff08\u5982 `text-gray-500`\uff09\u2014\u2014\u5fc5\u987b\u4f7f\u7528 Token \u663e\u5f0f\u6570\u503c\u3002",
          "- **\u7981\u6b62**\u5f15\u5165\u9634\u5f71\u3001\u73bb\u7483\u6001\u3001\u989d\u5916\u6e10\u53d8\u3001\u989d\u5916\u63cf\u8fb9\u3002",
          "- **\u7981\u6b62**\u65b0\u589e Tag \u989c\u8272\u2014\u2014\u4ec5\u9650 Pink / Teal / Violet \u4e09\u5957\u3002",
          "- **\u7981\u6b62**\u7ed9 Tag \u6dfb\u52a0\u4ea4\u4e92\u6837\u5f0f\u2014\u2014\u65e0 hover\u3001\u65e0 click\u3001\u65e0 focus\uff0cTag \u5fc5\u987b\u662f\u7eaf\u9759\u6001 `<span>`\u3002",
          "- **\u7981\u6b62**\u4f7f\u7528\u7ea6\u5b9a\u5916\u7684\u95f4\u8ddd\u5024\uff08\u4ec5\u5141\u8bb8 4/8/12/16 px\uff09\u3002",
          "- **\u7981\u6b62**\u8bbe\u7f6e `max-width` \u6216\u56fa\u5b9a `height`\u3002",
          "- **\u7981\u6b62**\u4f7f\u7528\u7eaf\u9ed1 `#000000`\u2014\u2014\u6b63\u6587\u5fc5\u987b\u4e3a `#222727`\u3002",
          "- **\u7981\u6b62**\u5728\u9519\u8bef\u72b6\u6001\u6807\u9898\u5916\u5f15\u5165\u7ea2\u8272\u2014\u2014\u9519\u8bef\u6807\u9898\u987f\u8272\u4e3a `#f74331`\u3002",
          "",

          "- [ ] Error \u6001\u663e\u793a\uff1a\u9519\u8bef\u6807\u9898\uff08#f74331\uff09 + \u8bf4\u660e\u6587\u6848 + \u91cd\u8bd5\u6309\u94ae",
          "- [ ] \u65e0 box-shadow\u3001\u65e0 text-shadow\u3001\u65e0 Tailwind \u9ed8\u8ba4\u8272\u540d",

          "",
          "## \u00a78 Few-Shot Code Example\uff08\u53c2\u8003\u5b9e\u73b0\u7247\u6bb5\uff09",
          "",
          "```jsx",
          "// \u2705 \u6b63\u786e\uff1a\u667a\u80fd\u6458\u8981\u7ec4\u4ef6\u5b8c\u6574\u7ed3\u6784",
          "<section style={{",
          `  width: '100%',`,
          `  borderRadius: '${t.radiusOuterPx}px',`,
          `  padding: '${t.paddingOuterPx}px',`,
          `  display: 'flex', flexDirection: 'column',`,
          `  gap: '${t.gapOuterPx}px',`,

          "    </button>",
          "    {/* \u5237\u65b0\u6309\u94ae\uff08\u53ef\u9009\uff09 */}",
          `    <button style={{ padding:'${t.iconButtonPad}px', borderRadius:'${t.radiusIconButtonPx}px' }}>`,
          "      <RefreshIcon />",
          "    </button>",
          "    {/* \u5c55\u5f00/\u6298\u53e0\u6309\u94ae */}",
          `    <button style={{ padding:'${t.iconButtonPad}px', borderRadius:'${t.radiusIconButtonPx}px' }}>`,
          "      <ChevronIcon />",
          "    </button>",
          "  </div>",
          "",
          "  {/* Body: \u56db\u72b6\u6001\u4e92\u65a5 */}",

          `        <p key={i} style={{ fontSize:'${t.bodyFontSizePx}px', lineHeight:'${t.bodyLineHeightPx}px', color:'${t.textMain}', marginTop:i>0?'${t.paragraphGap}px':'0' }}>`,
          "          {p}",
          "        </p>",
          "      ))}",
          "      {/* Loading: Shimmer */}",
          "      {state === 'loading' && <ShimmerSkeleton />}",
          "      {/* Empty: \u7a7a\u72b6\u6001 */}",
          "      {state === 'empty' && (",
          "        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>",
          `          <p style={{ fontSize:'${t.bodyFontSizePx}px', color:'${t.textSub}' }}>\u6682\u65e0\u53ef\u751f\u6210\u7684\u6458\u8981\u5185\u5bb9</p>`,
          `          <button style={{ height:'${t.button.height}px', borderRadius:'${t.button.radius}px' }}>\u91cd\u65b0\u751f\u6210</button>`,
          "        </div>",
          "      )}",
          "      {/* Error: \u9519\u8bef\u72b6\u6001 */}",
          "      {state === 'error' && (",
          "        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>",
          "          <div>",
          "            <p style={{ color:'#f74331', fontWeight:600 }}>\u6458\u8981\u751f\u6210\u5931\u8d25</p>",
          `            <p style={{ fontSize:'${t.bodyFontSizePx}px', color:'${t.textSub}' }}>\u8bf7\u68c0\u67e5\u7f51\u7edc\u6216\u7a0d\u540e\u91cd\u8bd5</p>`,
          "          </div>",
          `          <button style={{ height:'${t.button.height}px', borderRadius:'${t.button.radius}px' }}>\u91cd\u8bd5</button>`,
          "        </div>",
          "      )}",
          "    </div>",
          "  )}",
          "",
          "  {/* Footer: Tags + Feedback\uff08\u4ec5\u5c55\u5f00\u6001\uff09 */}",
          "  {!collapsed && (",
          `    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:'12px' }}>`,
          "      {/* Tags: \u7eaf\u9759\u6001 <span> */}",

          `        <div style={{ display:'flex', flexWrap:'wrap', gap:'8px' }}>`,
          "          {tags.map((tag, i) => (",
          `            <span key={i} style={{`,
          `              display:'inline-flex', alignItems:'center',`,
          `              height:'${t.tag.height}px', padding:'0 ${t.tag.padX}px',`,
          `              borderRadius:'${t.tag.radius}px',`,
          `              fontSize:'12px', lineHeight:'16px',`,
          `              background: tag.tone === 'pink' ? '${t.tag.tones.pink.bg}' :`,
          `                       tag.tone === 'teal' ? '${t.tag.tones.teal.bg}' : '${t.tag.tones.violet.bg}',`,
          `              color: tag.tone === 'pink' ? '${t.tag.tones.pink.fg}' :`,
          `                    tag.tone === 'teal' ? '${t.tag.tones.teal.fg}' : '${t.tag.tones.violet.fg}',`,
          "            }}>",
          "              {tag.label}",
          "            </span>",
          "          ))}",
          "        </div>",
          "      )}",
          "      {/* Feedback: \u70b9\u8d5e/\u70b9\u8e29 */}",
          "      {showFeedback && (",
          "        <div style={{ display:'flex', gap:'4px' }}>",
          "          <button style={{ width:'24px', height:'24px', borderRadius:'6px' }}><ThumbUpIcon /></button>",
          "          <button style={{ width:'24px', height:'24px', borderRadius:'6px' }}><ThumbDownIcon /></button>",
          "        </div>",
          "      )}",
          "    </div>",
          "  )}",
          "</section>",
          "```",
          "",
          "---",
          "",
          "## \u00a79 Agent Prompt Guide\uff08\u5feb\u901f\u8c03\u7528\u63d0\u793a\u6a21\u677f\uff09",
          "",
          "```",
          "\u4f60\u662f\u50cf\u7d20\u7ea7 UI \u4e13\u5bb6\u3002\u8bf7\u4e25\u683c\u9075\u5faa DESIGN_SKILL \u00a71-\u00a78 \u4e2d\u7684\u201c\u667a\u80fd\u6458\u8981\u7ec4\u4ef6\u9762\u677f\uff08HiAI\uff09\u201d\u89c4\u8303\u751f\u6210 UI\u3002",

          "2. Header \u5305\u542b\uff1a\u6807\u9898\uff08\u5de6\u5bf9\u9f50\uff0c\u5355\u884c\u7701\u7565\uff09 + \u590d\u5236\u6309\u94ae + \u5237\u65b0\u6309\u94ae\uff08\u53ef\u9009\uff09 + \u5c55\u5f00/\u6298\u53e0\u6309\u94ae\u3002",
          `3. \u5916\u5c42\u5361\u7247 width:100%\u3001border-radius:${t.radiusOuterPx}px\u3001padding:${t.paddingOuterPx}px\u3002`,
          `4. Tag \u662f\u7eaf\u9759\u6001 <span>\uff1a\u65e0 hover\u3001\u65e0 click\u3001\u65e0 focus\uff0c\u4f7f\u7528 display:inline-flex; align-items:center; border-radius:${t.tag.radius}px\u3002`,
          "5. Footer \u4ec5\u5728\u5c55\u5f00\u6001\u663e\u793a\uff1aTags\uff08\u5de6\u4fa7\uff09 + Feedback\uff08\u53f3\u4fa7\uff0c\u70b9\u8d5e/\u70b9\u8e29\u6309\u94ae\uff09\u3002",
          "6. Body \u56db\u72b6\u6001\uff1aReady\uff08\u6b63\u6587\uff09\u3001Loading\uff08Shimmer\uff09\u3001Empty\uff08\u7a7a\u72b6\u6001+\u91cd\u65b0\u751f\u6210\uff09\u3001Error\uff08\u9519\u8bef+\u91cd\u8bd5\uff09\u3002",
          "7. \u6240\u6709\u989c\u8272/\u95f4\u8ddd/\u5706\u89d2\u4e25\u683c\u4f7f\u7528 §2 Token \u6570\u503c\u3002",
          "8. \u751f\u6210\u540e\u81ea\u67e5 §7 Validation Rules \u5168\u90e8\u901a\u8fc7\u3002",
          "```",
          "",
        ].join("\n");
      }


      function buildFormRecommendDesignSkillMarkdown(t) {

          `| \u5916\u5c42\u7eb5\u5411 gap | gapOuterPx | ${mdToken("gapOuterPx", `${t.gapOuterPx}px`)} |`,
          `| \u6807\u9898\u884c gap | titleGapPx | ${mdToken("titleGapPx", `${t.titleGapPx}px`)} |`,
          `| AI \u6807\u7b7e padding X | aiBadgePadX | ${mdToken("aiBadgePadX", `${t.aiBadgePadX}px`)} |`,
          `| \u8f93\u5165\u6846 padding left | inputPadX | ${mdToken("inputPadX", `${t.inputPadX}px`)} |`,
          `| \u8f93\u5165\u6846 padding right | inputRightPadX | ${mdToken("inputRightPadX", `${t.inputRightPadX}px`)} |`,
          `| \u8f93\u5165\u6846 padding Y | inputPadY | ${mdToken("inputPadY", `${t.inputPadY}px`)} |`,
          `| \u5237\u65b0\u6309\u9215 offset-right | refreshBtnOffsetRightPx | ${mdToken("refreshBtnOffsetRightPx", `${t.refreshBtnOffsetRightPx}px`)} |`,
          `| \u5237\u65b0\u6309\u9215 padding | refreshBtnPadPx | ${mdToken("refreshBtnPadPx", `${t.refreshBtnPadPx}px`)} |`,
          `| \u52a0\u8f7d\u5f69\u6761\u9ad8\u5ea6 | recommendBarHeightPx | ${mdToken("recommendBarHeightPx", `${t.recommendBarHeightPx}px`)} |`,
          `| \u63a8\u8350\u5bb9\u5668 padding | recommendWrapPadPx | ${mdToken("recommendWrapPadPx", `${t.recommendWrapPadPx}px`)} |`,
          `| \u63a8\u8350\u5bb9\u5668 gap | recommendWrapGapPx | ${mdToken("recommendWrapGapPx", `${t.recommendWrapGapPx}px`)} |`,
          `| \u63a8\u8350\u6761\u76ee padding X | recommendItemPadX | ${mdToken("recommendItemPadX", `${t.recommendItemPadX}px`)} |`,
          `| \u63a8\u8350\u6761\u76ee padding Y | recommendItemPadY | ${mdToken("recommendItemPadY", `${t.recommendItemPadY}px`)} |`,
          "",
          "### 2.4 Shape & Radii\uff08\u5706\u89d2\u4f53\u7cfb\uff09",
          "",
          "| \u4f4d\u7f6e | Token | Value |",
          "| --- | --- | --- |",
          `| AI \u6807\u7b7e | aiBadgeRadiusPx | ${mdToken("aiBadgeRadiusPx", `${t.aiBadgeRadiusPx}px`)} |`,
          `| \u8f93\u5165\u6846 | inputRadiusPx | ${mdToken("inputRadiusPx", `${t.inputRadiusPx}px`)} |`,
          `| \u5237\u65b0\u6309\u9215 | refreshBtnRadiusPx | ${mdToken("refreshBtnRadiusPx", `${t.refreshBtnRadiusPx}px`)} |`,
          `| \u52a0\u8f7d\u5f69\u6761 | recommendBarRadiusPx | ${mdToken("recommendBarRadiusPx", `${t.recommendBarRadiusPx}px`)} |`,
          `| \u63a8\u8350\u5bb9\u5668 | recommendWrapRadiusPx | ${mdToken("recommendWrapRadiusPx", `${t.recommendWrapRadiusPx}px`)} |`,
          `| \u63a8\u8350\u6761\u76ee | recommendItemRadiusPx | ${mdToken("recommendItemRadiusPx", `${t.recommendItemRadiusPx}px`)} |`,
          "",
          "### 2.5 Semantic Gradients\uff08\u8bed\u4e49\u6e10\u53d8\uff09",
          "",
          "**AI \u6807\u7b7e\u80cc\u666f\uff08\u5fc5\u987b\u539f\u6837\uff09**\uff1a",
          "```css",
          `background-image: ${t.aiBadgeBg};`,
          "```",
          "**AI \u6807\u7b7e\u80cc\u666f Alt\uff08\u5fc5\u987b\u539f\u6837\uff09**\uff1a",
          "```css",
          `background-image: ${t.aiBadgeBgAlt};`,
          "```",
          "**AI \u6587\u5b57\u6e10\u53d8\uff08\u5fc5\u987b\u539f\u6837\uff09**\uff1a",
          "```css",
          `background-image: ${t.aiBadgeTextGradient};`,
          "background-clip: text; -webkit-background-clip: text; color: transparent;",
          "```",
          "**\u52a0\u8f7d\u5f69\u6761\u80cc\u666f\uff08\u5fc5\u987b\u539f\u6837\uff09**\uff1a",
          "```css",
          `background-image: ${t.recommendBarBg};`,
          "```",
          "**\u63a8\u8350\u5bb9\u5668\u80cc\u666f\uff08\u5fc5\u987b\u539f\u6837\uff09**\uff1a",
          "```css",
          `background-image: ${t.recommendWrapBg};`,
          "```",
          "**\u63a8\u8350\u6761\u76ee Hover \u80cc\u666f\uff08\u5fc5\u987b\u539f\u6837\uff09**\uff1a",
          "```css",
          `background-image: ${t.recommendItemBgHover};`,
          "```",
          "",
          "---",
          "",
          "## \u00a73 Component Specifications\uff08\u7ec4\u4ef6\u89c4\u8303\uff09",
          "",
          "### 3.1 Anatomy \u2014 DOM \u89e3\u5256\u7ed3\u6784\uff08\u5fc5\u987b\u5305\u542b\uff0c\u4e0d\u5f97\u7701\u7565\u4efb\u610f\u5c42\uff09",
          "",
          "```html",
          "<!-- OuterWrapper: display:flex; flex-direction:column -->",
          `<div class=\"form-recommend\" style=\"gap:${t.gapOuterPx}px; width:100%;\">`,
          "",
          "  <!-- TitleRow: \u5b57\u6bb5\u540d + AI\u6807\u7b7e -->",
          `  <div class=\"title-row\" style=\"display:flex; align-items:center; gap:${t.titleGapPx}px;\">`,
          "    <label class=\"field-label\">\u5b57\u6bb5\u540d</label>",
          `    <span class=\"ai-badge\" style=\"border-radius:${t.aiBadgeRadiusPx}px; padding:0 ${t.aiBadgePadX}px;`,
          `                         font-size:${t.aiBadgeTextSizePx}px; font-weight:${t.aiBadgeTextWeight};\">AI</span>`,
          "  </div>",
          "",
          "  <!-- InputWrapper: \u8f93\u5165\u6846 + \u53f3\u4fa7\u5237\u65b0\u6309\u9215 -->",
          `  <div class=\"input-wrapper\" style=\"position:relative; border-radius:${t.inputRadiusPx}px;`,
          `                                    background:${t.inputBg}; border:1px solid ${t.inputBorder};\">`,
          `    <input style=\"padding:${t.inputPadY}px ${t.inputRightPadX}px ${t.inputPadY}px ${t.inputPadX}px;`,
          `                  font-size:${t.placeholderFontSizePx}px; line-height:${t.placeholderLineHeightPx}px;\" />`,
          `    <!-- \u5237\u65b0\u6309\u9215 \u2014 \u53f3\u4fa7\u6d6ee\u4f4d -->`,
          `    <button class=\"refresh-btn\" style=\"position:absolute; right:${t.refreshBtnOffsetRightPx}px;`,
          `                                       background:${t.refreshBtnBg}; border:1px solid ${t.refreshBtnBorder};`,
          `                                       border-radius:${t.refreshBtnRadiusPx}px; padding:${t.refreshBtnPadPx}px;\">`,
          "      \u5237\u65b0\u56fe\u6807",
          "    </button>",
          "  </div>",
          "",
          "  <!-- RecommendArea: \u52a0\u8f7d\u5f69\u6761 OR \u63a8\u8350\u5217\u8868 OR \u7a7a -->",
          "  <!-- \u72b6\u6001 A: loading \u5f69\u6761 -->",
          `  <div class=\"loading-bar\" style=\"height:${t.recommendBarHeightPx}px; border-radius:${t.recommendBarRadiusPx}px;`,
          `                                   animation: stripeMove ${t.stripeAnimDurationSec}s linear infinite;\"></div>`,
          "",
          "  <!-- \u72b6\u6001 B: \u63a8\u8350\u5217\u8868\uff08\u65e0\u8fb9\u6846\uff09 -->",
          `  <div class=\"recommend-list\" style=\"border-radius:${t.recommendWrapRadiusPx}px; padding:${t.recommendWrapPadPx}px;`,
          `                                     gap:${t.recommendWrapGapPx}px; border:0;\">`,
          `    <button class=\"recommend-item\" style=\"padding:${t.recommendItemPadY}px ${t.recommendItemPadX}px;`,
          `                                           border-radius:${t.recommendItemRadiusPx}px;\">\u63a8\u8350\u6587\u6848</button>`,
          "  </div>",
          "</div>",
          "```",
          "",
          "### 3.2 States\uff08\u4ea4\u4e92\u72b6\u6001\u673a\uff09\u2014\u2014\u5fc5\u987b\u8986\u76d6\u5168\u90e8",
          "",
          "| \u72b6\u6001 | RecommendArea \u5185\u5bb9 | \u8f93\u5165\u6846\u5185\u5bb9 | \u52a0\u8f7d\u5f69\u6761 |",
          "| --- | --- | --- | --- |",
          "| **Loading** | \u5f69\u6761\u52a8\u6548\uff08\u65e0\u63a8\u8350\u6587\u5b57\uff09 | placeholder | \u663e\u793a |",
          "| **\u5355\u6761\u63a8\u8350** | 1 \u6761\u53ef\u70b9\u51fb\u6761\u76ee | placeholder | \u4e0d\u663e\u793a |",
          "| **\u591a\u6761\u63a8\u8350** | 3 \u6761\u53ef\u70b9\u51fb\u6761\u76ee | placeholder | \u4e0d\u663e\u793a |",
          "| **\u8d85\u591a\u5b57\u6570** | \u5355\u884c\u7701\u7565; hover \u5c55\u5f00\u5168\u6587 | placeholder | \u4e0d\u663e\u793a |",
          "| **\u91c7\u7eb3\u540e** | **\u7acb\u523b\u6d88\u5931** RecommendArea | \u63a1\u7eb3\u6587\u6848\u9884\u586b | \u4e0d\u663e\u793a |",
          "| **\u91c7\u7eb3\u540e\u8f93\u5165\u6846** | \u65e0 | \u81ea\u9002\u5e94\u64a4\u9ad8\uff0c\u663e\u793a\u5168\u6587 | \u4e0d\u663e\u793a |",
          "| **Hover\uff08\u6761\u76ee\uff09** | \u6e10\u53d8\u53e0\u52a0\uff08\u89c1 \u00a72.5\uff09 | \u2014 | \u2014 |",
          "| **Focus\uff08\u8f93\u5165\u6846\uff09** | \u2014 | \u89e6\u53d1 focus ring | \u2014 |",
          "",
          "### 3.3 Component-Specific Tokens\uff08\u4ec5\u672c\u7ec4\u4ef6\u4f7f\u7528\uff09",
          "",
          `- \u5237\u65b0\u6309\u9215\u9634\u5f71\uff1a\`${t.refreshBtnShadow}\``,
          `- \u5237\u65b0\u6309\u9215 offset-right\uff1a${mdToken("refreshBtnOffsetRightPx", `${t.refreshBtnOffsetRightPx}px`)}`,
          "- \u5237\u65b0\u56fe\u6807\uff1a\u56fe\u6807\u5e93 `refresh`\uff08`getIcon(\"refresh\")`\uff09",
          `- \u5f69\u6761\u52a8\u6548\u65f6\u957f\uff1a${mdToken("stripeAnimDurationSec", `${t.stripeAnimDurationSec}s`)}`,
          "",
          "---",
          "",
          "## \u00a74 Layout & Composition Logic\uff08\u5e03\u5c40\u4e0e\u7ec4\u5408\u903b\u8f91\uff09",
          "",
          "### 4.1 Container Rules\uff08\u5bb9\u5668\u89c4\u5219\uff09",
          "",
          "- **\u5bbd\u5ea6**\uff1a`width: 100%`\uff0c\u5fc5\u987b\u6491\u6ee1\u7236\u5bb9\u5668\uff0c**\u7981\u6b62 `max-width`**\u3002",
          "- **\u9ad8\u5ea6**\uff1a\u968f\u5185\u5bb9\u81ea\u9002\u5e94\uff08\u7981\u6b62\u56fa\u5b9a\u9ad8\u5ea6\uff09\u3002",
          "- **\u6ca1\u6709 AI \u63a8\u8350\u65f6**\uff1a\u8f93\u5165\u6846\u4e0b\u65b9**\u5b8c\u5168\u4e0d\u51fa\u73b0**\u5f69\u6761\u6216\u63a8\u8350\u5bb9\u5668\uff08\u4fdd\u6301\u5e72\u51c0\uff09\u3002",
          "",
          "### 4.2 Alignment\uff08\u5bf9\u9f50\uff09",
          "",
          "- TitleRow\uff1a`display:flex; align-items:center`\uff0c\u5b57\u6bb5\u540d\u4e0e AI \u6807\u7b7e\u5782\u76f4\u5c45\u4e2d\u5bf9\u9f50\u3002",
          `- InputWrapper\uff1a\u5237\u65b0\u6309\u9215 position:absolute \u53f3\u4fa7\u5b9a\u4f4d\uff0c\u5782\u76f4\u5c45\u4e2d\u3002`,
          "- RecommendList\uff1a`display:flex; flex-direction:column`\uff0c\u6761\u76ee\u5de6\u5bf9\u9f50\u3002",
          "",
          "### 4.3 Responsive Behavior\uff08\u54cd\u5e94\u5f0f\uff09",
          "",
          "- \u65e0\u65ad\u70b9\u53d8\u5316\uff0c\u5bbd\u5ea6\u59cb\u7ec8\u6091\u6ee1\u5bb9\u5668\u3002",
          "",
          "---",
          "",
          "## \u00a75 Motion & Interaction\uff08\u52a8\u6548\u4e0e\u5fae\u4ea4\u4e92\uff09",
          "",
          "### 5.1 Loading \u5f69\u6761\u52a8\u6548",
          "",
          `- **\u89e6\u53d1**\uff1aAI \u8bfb\u53d6\u63a8\u8350\u4e2d\uff08loading\u72b6\u6001\uff09\u65f6\u663e\u793a\u5f69\u6761\u3002`,
          `- **Duration**\uff1a${mdToken("stripeAnimDurationSec", `${t.stripeAnimDurationSec}s`)}\uff0cLinear\uff0c\u5faa\u73af\u3002`,
          "- **Easing**\uff1a`linear`",
          `- **\u5f69\u6761\u80cc\u666f**\uff1a\u89c1 \u00a72.5 \u4e2d\u7684 recommendBarBg\u3002`,
          `- **\u9ad8\u5ea6**\uff1a${mdToken("recommendBarHeightPx", `${t.recommendBarHeightPx}px`)}\uff1b\u5706\u89d2\uff1a${mdToken("recommendBarRadiusPx", `${t.recommendBarRadiusPx}px`)}\u3002`,
          "",
          "### 5.2 \u63a8\u8350\u6761\u76ee Hover",
          "",
          `- **Trigger**\uff1amouseenter \u63a8\u8350\u6761\u76ee \u2192 \u80cc\u666f\u53e0\u52a0 recommendItemBgHover\uff08\u89c1 \u00a72.5\uff09`,
          "- **Duration**\uff1a`transition: background-image 150ms ease`",
          "- **\u8d85\u591a\u5b57\u6570\u5c55\u5f00**\uff1ahover \u65f6\u53bb\u9664\u5355\u884c\u7701\u7565\uff0c\u5c55\u5f00\u5168\u6587\uff0c`transition: max-height 200ms ease`\u3002",
          "",
          "### 5.3 \u91c7\u7eb3\u4ea4\u4e92",
          "",
          "- **\u70b9\u51fb\u6761\u76ee**\uff1a\u6587\u6848\u9884\u586b\u81f3\u8f93\u5165\u6846\uff1bRecommendArea **\u7acb\u523b\u6d88\u5931**\uff08display:none\uff09\u3002",
          "- **\u7981\u6b62**\uff1a\u91c7\u7eb3\u540e RecommendArea \u6307\u5ef6\u6d88\u5931\uff08\u5fc5\u987b\u7acb\u5373\u6d88\u5931\uff09\u3002",
          "",
          "### 5.4 \u5237\u65b0\u6309\u9215\uff08Refresh Button\uff09\u4ea4\u4e92",
          "",
          `- **\u663e\u793a\u89e6\u53d1**\uff1amouseenter input-wrapper \u2192 \u5237\u65b0\u6309\u9215\u7acb\u5373\u51fa\u73b0\uff08position:absolute\uff0c right:6px\uff0c top:50%\uff0c transform:translateY(-50%)\uff0c\u5782\u76f4\u5c45\u4e2d\uff09\u3002`,
          "- **\u9690\u85cf\u89e6\u53d1**\uff1amouseleave input-wrapper \u2192 \u6309\u9215\u7acb\u5373\u9690\u85cf\u3002",
          "- **\u4e0d\u5206\u5834\u666f**\uff1a\u4e0d\u8bba\u662f\u5426\u5df2\u91c7\u7eb3\u5185\u5bb9\uff0c\u6309\u9215 hover \u65f6\u5747\u53ef\u89c1\uff1b\u70b9\u51fb\u540e\u91cd\u7f6e\u91c7\u7eb3\u72b6\u6001\u5e76\u91cd\u65b0\u751f\u6210\u63a8\u8350\u3002",
          "",
          "**\u6309\u9215\u6837\u5f0f\uff08\u5fc5\u987b\u50cf\u7d20\u7ea7\u8fd8\u539f\uff09**\uff1a",
          "```css",
          "position: absolute;",
          "right: 6px;",
          "top: 50%;",
          "transform: translateY(-50%);",
          "background: #ffffff;",
          "border: 1px solid rgba(34,39,39,0.09);",
          "border-radius: 6px;",
          "padding: 4px;",
          "cursor: pointer;",
          "/* \u9ed8\u8ba4\u9634\u5f71 L3 */",
          "box-shadow: 0 2px 8px rgba(31,69,77,0.05), 0 2px 4px rgba(31,69,77,0.04), 0 1px 2px rgba(31,69,77,0.04);",
          "display: flex;",
          "align-items: center;",
          "justify-content: center;",
          "z-index: 2;",
          "transition: box-shadow 0.15s, opacity 0.15s;",
          "opacity: 1;",
          "```",
          "",
          "**Hover \u72b6\u6001\uff08\u5fc5\u987b\u50cf\u7d20\u7ea7\u8fd8\u539f\uff09**\uff1a",
          "```css",
          "/* Hover \u65f6\u9634\u5f71\u52a0\u6df1 */",
          "box-shadow: 0 4px 12px rgba(31,69,77,0.10), 0 2px 6px rgba(31,69,77,0.07), 0 1px 2px rgba(31,69,77,0.05);",
          "```",
          "",
          "**Refreshing \u72b6\u6001\uff08\u5237\u65b0\u4e2d\uff09**\uff1a",
          "```css",
          "cursor: not-allowed;",
          "opacity: 0.5;",
          "```",
          "",
          "**\u56fe\u6807\u6837\u5f0f\u4e0e\u52a8\u753b**\uff1a",
          "- **\u56fe\u6807\u6765\u6e90**\uff1a\u56fe\u6807\u5e93 `refresh`\uff08`getIcon(\"refresh\")`\uff09\u6216 fallback URL",
          "- **\u56fe\u6807\u5c3a\u5bf8**\uff1a16\u00d716px",
          "- **\u5237\u65b0\u52a8\u753b**\uff1a`animation: spin 0.8s linear infinite`\uff08\u4ec5\u5728 refreshing \u72b6\u6001\u65f6\u89e6\u53d1\uff09",
          "- **\u56fe\u6807\u6e10\u53d8**\uff1a\u5fc5\u987b\u4f7f\u7528 refreshIconGradient \u6e10\u53d8\uff08\u7981\u6b62\u7eaf\u8272\uff09",
          "",
          "**\u5237\u65b0\u6309\u9215\u56fe\u6807\u6e10\u53d8\uff08\u5fc5\u987b\u539f\u6837\uff09**\uff1a",
          "```css",
          `background-image: ${t.refreshIconGradient};`,
          "background-clip: text; -webkit-background-clip: text; color: transparent;",
          "/* \u6216 SVG linearGradient stops \u63d0\u53d6\u81ea\u8be5\u6e10\u53d8\u5b57\u7b26\u4e32 */",
          "```",
          "",
          "---",
          "",
          "## \u00a76 Anti-Patterns & Constraints\uff08\u8d1f\u9762\u7ea6\u675f / \u907f\u5751\u6307\u5357\uff09",
          "",
          "### \u274c \u7edd\u5bf9\u7981\u6b62\uff08DON'Ts\uff09",
          "",
          "- **\u7981\u6b62**\u5f15\u5165 Tailwind \u9ed8\u8ba4\u8272\u677f\u540d\u2014\u2014\u5fc5\u987b\u4f7f\u7528 Token \u663e\u5f0f\u6570\u503c\u3002",
          "- **\u7981\u6b62**\u6539\u52a8 AI \u6807\u7b7e\u4e0e\u63a8\u8350\u5f69\u6761\u7684\u6e10\u53d8\u914d\u65b9\u4e0e\u987a\u5e8f\u3002",
          "- **\u7981\u6b62**\u5f15\u5165\u9634\u5f71\u3001\u73bb\u7483\u6001\u3001\u989d\u5916\u63cf\u8fb9\u4f53\u7cfb\u3002",
          "- **\u7981\u6b62**\u5f53\u6ca1\u6709 AI \u63a8\u8350\u65f6\u5c55\u793a\u5f69\u6761\u6216\u63a8\u8350\u5bb9\u5668\u3002",
          "- **\u7981\u6b62**\u91c7\u7eb3\u540e\u5ef6\u8fdf\u6d88\u5931 RecommendArea\uff08\u5fc5\u987b\u7acb\u5373\u6d88\u5931\uff09\u3002",
          "- **\u7981\u6b62**\u7ed9\u63a8\u8350\u5bb9\u5668\u52a0 border\uff08\u5c9b radius \u306f\u5fc5\u8981\uff0c\u4f46 border \u5fc5\u987b\u4e3a 0\uff09\u3002",
          "- **\u7981\u6b62**\u8bbe\u5b9a `max-width` \u6216\u56fa\u5b9a `height`\u3002",
          "- **\u7981\u6b62**\u4f7f\u7528\u7eaf\u9ed1 `#000000`\u2014\u2014\u6b63\u6587\u5fc5\u987b\u4e3a `#222727`\u3002",
          "- **\u7981\u6b62**\u5237\u65b0\u6309\u9215\u56fe\u6807\u4f7f\u7528\u7eaf\u8272\uff08\u5982 `#222727`\uff09\u2014\u2014\u5fc5\u987b\u4f7f\u7528 `refreshIconGradient` \u6e10\u53d8\u8272\u3002",

          "> \u56de\u590d\u63a8\u8350\u533a\u53f3\u4fa7 4 \u4e2a\u64cd\u4f5c\u94ae\uff08\u5173\u95ed/\u5237\u65b0/\u590d\u5236/\u53d1\u9001\uff09\u5fc5\u987b\u4e3a **Borderless \u00b7 Tertiary \u00b7 Small \u00b7 Icon-only**\uff0824\u00d724\uff0cicon 16\u00d716\uff0c\u5c45\u4e2d\uff09\u3002\u5e95\u90e8\u5de5\u5177\u680f\u56fe\u6807\u94ae\uff08\u8868\u60c5/\u56fe\u7247\u7b49\uff09\u5fc5\u987b\u4e3a **Borderless \u00b7 Tertiary \u00b7 Default \u00b7 Icon-only**\uff0836\u00d736\uff0cicon 16\u00d716\uff09\u3002\u53f3\u4e0b\u89d2\u53d1\u9001\u952e\u5fc5\u987b\u4e3a **Solid \u00b7 Secondary \u00b7 Small \u00b7 Icon-only**\uff0824\u00d724\uff0c\u9ed1\u5e95\uff09\uff1b\u7981\u6b62\u4f7f\u7528\u7eff\u5e95\u6df1\u8272\u6309\u94ae\u3002",
          "",
          "---",
          "",
          "## \u00a72 Global Design Tokens\uff08\u5168\u5c40\u8bbe\u8ba1\u53d8\u91cf\uff09",
          "",
          "> \u6240\u6709\u6570\u503c\u5747\u4e3a\u5f3a\u7ea6\u675f\uff0c\u4e0d\u5f97\u66ff\u6362\u3002\u4e0b\u65b9\u53d8\u91cf\u5373\u4e3a\u7ec4\u4ef6\u6240\u6709\u6837\u5f0f\u7684\u552f\u4e00\u6765\u6e90\u3002",

          "| Role | Token | Value | \u7528\u9014 |",

          `| \u5185\u5361\u8fb9\u6846 | cardBorder | ${mdToken("cardBorder", t.cardBorder)} | InputCard \u767d\u8272 1px \u8fb9\u6846 |`,

          `| \u53d1\u9001\u6309\u9215\uff08\u6709\u5185\u5bb9\uff09 | sendBtnBgEnabled | ${mdToken("sendBtnBgEnabled", t.sendBtnBgEnabled)} | \u6709\u8f93\u5165\u5185\u5bb9\u65f6\u53d1\u9001\u952e\u5e95\u8272 |`,

          `| Focus Ring | focusRing | ${mdToken("focusRing", t.focusRing)} | \u7126\u70b9\u73af\u989c\u8272 |`,
          `| Tooltip \u80cc\u666f | tooltipBg | ${mdToken("tooltipBg", t.tooltipBg)} | \u63a8\u8350\u6761\u76ee hover tooltip |`,
          `| Tooltip \u6587\u5b57 | tooltipTextColor | ${mdToken("tooltipTextColor", t.tooltipTextColor)} | Tooltip \u6587\u5b57 |`,
          `| \u5206\u5272\u7ebf | recoDividerColor | ${mdToken("recoDividerColor", t.recoDividerColor)} | \u63a8\u8350\u64cd\u4f5c\u533a\u7ad6\u7ebf |`,

          "### 2.2 Typography\uff08\u6392\u7248\uff09",
          "",

          `| \u8f93\u5165\u533a placeholder | textColorPlaceholder | ${mdToken("textFontSizePx", `${t.textFontSizePx}px`)} | ${mdToken("textLineHeightPx", `${t.textLineHeightPx}px`)} | 400 | ${mdToken("textColorPlaceholder", t.textColorPlaceholder)} |`,

          `| \u63a8\u8350\u6807\u9898"\u56de\u590d\u63a8\u8350" | recoTitleFontSizePx | ${mdToken("recoTitleFontSizePx", `${t.recoTitleFontSizePx}px`)} | ${mdToken("recoTitleLineHeightPx", `${t.recoTitleLineHeightPx}px`)} | ${mdToken("recoTitleFontWeight", String(t.recoTitleFontWeight))} | \u6e10\u53d8\u6587\u5b57\uff08\u89c1 \u00a72.5\uff09 |`,

          `| Tooltip \u6587\u6848 | tooltipFontSizePx | ${mdToken("tooltipFontSizePx", `${t.tooltipFontSizePx}px`)} | ${mdToken("tooltipLineHeightPx", `${t.tooltipLineHeightPx}px`)} | 400 | ${mdToken("tooltipTextColor", t.tooltipTextColor)} |`,
          "",
          "### 2.3 Spacing & Sizing\uff08\u95f4\u8ddd\u4e0e\u5c3a\u5bf8\uff09",
          "",
          "> **\u5408\u6cd5\u95f4\u8ddd\u9636\u68af\uff08Spacing Scale\uff09**\uff1a\u4ec5\u5141\u8bb8\u4f7f\u7528 `[4, 6, 8, 12]` px\uff0c\u7981\u6b62\u51fa\u73b0\u5176\u4ed6\u95f4\u8ddd\u5024\u3002",
          "",
          "| \u4f4d\u7f6e | Token | Value |",
          "| --- | --- | --- |",
          `| OuterShell padding | outerPadPx | ${mdToken("outerPadPx", `${t.outerPadPx}px`)} |`,
          `| OuterShell gap | outerGapPx | ${mdToken("outerGapPx", `${t.outerGapPx}px`)} |`,
          `| StatusRow padding X | statusPadX | ${mdToken("statusPadX", `${t.statusPadX}px`)} |`,
          `| StatusRow padding Y | statusPadY | ${mdToken("statusPadY", `${t.statusPadY}px`)} |`,
          `| InputCard padding | cardPadPx | ${mdToken("cardPadPx", `${t.cardPadPx}px`)} |`,
          `| InputCard gap | cardGapPx | ${mdToken("cardGapPx", `${t.cardGapPx}px`)} |`,
          `| ActionsRow gap | actionsGapPx | ${mdToken("actionsGapPx", `${t.actionsGapPx}px`)} |`,
          `| IconButton padding\uff08\u5bf9\u9f50\u53c2\u8003\uff0c\u5b9e\u73b0\u4ee5 HiUI \u56fe\u6807\u6309\u94ae size \u89c4\u8303\u4e3a\u51c6\uff09 | iconBtnPadPx | ${mdToken("iconBtnPadPx", `${t.iconBtnPadPx}px`)} |`,
          `| SendButton padding\uff08\u5bf9\u9f50\u53c2\u8003\uff09 | sendBtnPadPx | ${mdToken("sendBtnPadPx", `${t.sendBtnPadPx}px`)} |`,
          `| SendButton height\uff08\u5bf9\u9f50\u53c2\u8003\uff09 | sendBtnHeightPx | ${mdToken("sendBtnHeightPx", `${t.sendBtnHeightPx}px`)} |`,
          `| RecoOuter padding | recoOuterPadPx | ${mdToken("recoOuterPadPx", `${t.recoOuterPadPx}px`)} |`,
          `| RecoOuter gap | recoOuterGapPx | ${mdToken("recoOuterGapPx", `${t.recoOuterGapPx}px`)} |`,
          `| RecoHeader padX | recoHeaderPadX | ${mdToken("recoHeaderPadX", `${t.recoHeaderPadX}px`)} |`,
          `| RecoHeader height | recoHeaderHeightPx | ${mdToken("recoHeaderHeightPx", `${t.recoHeaderHeightPx}px`)} |`,
          `| RecoItem padding | recoItemPadPx | ${mdToken("recoItemPadPx", `${t.recoItemPadPx}px`)} |`,
          `| Tooltip padX | tooltipPadX | ${mdToken("tooltipPadX", `${t.tooltipPadX}px`)} |`,
          `| Tooltip padY | tooltipPadY | ${mdToken("tooltipPadY", `${t.tooltipPadY}px`)} |`,
          "",
          "### 2.4 Shape & Radii\uff08\u5706\u89d2\u4f53\u7cfb\uff09",
          "",
          "| \u4f4d\u7f6e | Token | Value |",
          "| --- | --- | --- |",
          `| OuterShell \u5706\u89d2 | outerRadiusPx | ${mdToken("outerRadiusPx", `${t.outerRadiusPx}px`)} |`,
          `| InputCard \u5706\u89d2 | cardRadiusPx | ${mdToken("cardRadiusPx", `${t.cardRadiusPx}px`)} |`,
          `| IconButton \u5706\u89d2 | iconBtnRadiusPx | ${mdToken("iconBtnRadiusPx", `${t.iconBtnRadiusPx}px`)} |`,
          `| SendButton \u5706\u89d2 | sendBtnRadiusPx | ${mdToken("sendBtnRadiusPx", `${t.sendBtnRadiusPx}px`)} |`,

          `| Tooltip \u5706\u89d2 | tooltipRadiusPx | ${mdToken("tooltipRadiusPx", `${t.tooltipRadiusPx}px`)} |`,
          "",
          "### 2.5 Semantic Gradient\uff08\u8bed\u4e49\u6e10\u53d8\uff09",
          "",
          "**\u63a8\u8350\u6807\u9898\u6e10\u53d8\u6587\u5b57**\uff08`recoTitleGradient`\uff0c\u5fc5\u987b\u539f\u6837\uff09\uff1a",

          `background-image: ${t.recoTitleGradient};`,

          "",
          "## \u00a73 Component Specifications\uff08\u7ec4\u4ef6\u89c4\u8303\uff09",
          "",
          "### 3.1 Anatomy \u2014 DOM \u89e3\u5256\u7ed3\u6784\uff08\u5fc5\u987b\u5305\u542b\uff0c\u4e0d\u5f97\u7701\u7565\u4efb\u610f\u5c42\uff09",
          "",
          "#### 3.1.1 \u5c42\u7ea7\u5173\u7cfb\u8bf4\u660e",
          "",
          "**MotionLayer \u4f4d\u4e8e\u6700\u5e95\u5c42**\uff0c\u5728\u7eaf\u767d\u8272\u8f93\u5165\u533a\u57df\uff08InputCard\uff09\u7684\u4e0b\u65b9\uff1a",
          "",
          "- **MotionLayer**: `zIndex: 0`\uff08\u6700\u5e95\u5c42\uff09",
          "- **StatusRow**: `zIndex: 10`",
          "- **InputCard**: `zIndex: 10`",
          "",
          "#### 3.1.2 DOM \u7ed3\u6784",
          "",
          "```html",
          `<!-- OuterShell: background:${t.outerBg}; border-radius:${t.outerRadiusPx}px; padding:${t.outerPadPx}px; gap:${t.outerGapPx}px; overflow:hidden; position:relative -->`,
          "<div class=\"outer-shell\">",
          "  <!-- MotionLayer: position:absolute; bottom:0; pointer-events:none; zIndex:0 -->",
          `  <div class=\"motion-layer\" style=\"height:${t.motionHeightPx}px; left:${t.motionInsetXPercentLeft}%; right:${t.motionInsetXPercentRight}%; opacity:${t.motionOpacity}; z-index:0;\">`,
          "    <!-- MotionImageContainer: position:absolute; inset: -75% -7.07% -->",
          "    <div class=\"motion-image-container\" style=\"position:absolute; top:-75%; right:-7.07%; bottom:-75%; left:-7.07%;\">",
          `      <img alt=\"\" src=\"${AI_INPUT_ASSETS.motionPng}\" style=\"display:block; width:100%; height:100%; max-width:none;\" />`,
          "    </div>",
          "  </div>",
          "  <!-- StatusRow -->",
          `  <div class=\"status-row\" style=\"padding:${t.statusPadY}px ${t.statusPadX}px; z-index:10;\">`,
          "    <p>AI \u57fa\u4e8e\u804a\u5929\u4e0a\u4e0b\u6587\u52a8\u6001\u751f\u6210\u7684\u63d0\u9192\u6587\u6848\uff08\u9ed8\u8ba4 \u226420 \u5b57\uff09</p>",
          "  </div>",
          `  <!-- InputCard: background:${t.cardBg}; border:1px solid ${t.cardBorder}; border-radius:${t.cardRadiusPx}px; padding:${t.cardPadPx}px; gap:${t.cardGapPx}px; z-index:10 -->`,
          "  <div class=\"input-card\">",
          "    <!-- [\u53ef\u9009] RecoPanel: \u5728 TextArea \u4e4b\u4e0a -->",
          `    <div class=\"reco-panel\" style=\"background:${t.recoOuterBg}; border-radius:${t.recoOuterRadiusPx}px; padding:${t.recoOuterPadPx}px; gap:${t.recoOuterGapPx}px;\">`,
          `      <div class=\"reco-header\" style=\"height:${t.recoHeaderHeightPx}px; padding:0 ${t.recoHeaderPadX}px;\">`,
          "        <span class=\"reco-title\">\u56de\u590d\u63a8\u8350\uff08\u6e10\u53d8\u6587\u5b57\uff09</span>",
          "        <div class=\"reco-actions\">\u5173\u95ed/\u5237\u65b0/\u590d\u5236/\u53d1\u9001 \u56fe\u6807\u6309\u9215 + \u7ad6\u5206\u5272\u7ebf</div>",
          "      </div>",
          `      <button class=\"reco-item\" style=\"padding:${t.recoItemPadPx}px; border-radius:${t.recoItemRadiusPx}px; position:relative\">\u63a8\u8350\u6587\u6848</button>`,
          "    </div>",
          "    <!-- TextArea -->",
          `    <div role=\"textbox\" contenteditable=\"true\" style=\"font-size:${t.textFontSizePx}px; line-height:${t.textLineHeightPx}px; min-height:${t.textLineHeightPx*2}px;\"></div>`,
          "    <!-- ActionsRow -->",
          `    <div class=\"actions-row\" style=\"display:flex; align-items:center; gap:${t.actionsGapPx}px;\">`,
          "      <div class=\"left-icons\" style=\"flex:1; display:flex; align-items:center;\">\u9b54\u6cd5\u68d2/\u8868\u60c5/\u56fe\u7247/\u4e0b\u5212\u7ebf/\u52a0\u7c97/\u6709\u5e8f\u5217\u8868/\u65e0\u5e8f\u5217\u8868/\u94fe\u63a5/\u8c03\u8272\u677f</div>",
          `      <button class=\"send-btn\" style=\"height:${t.sendBtnHeightPx}px; padding:${t.sendBtnPadPx}px; border-radius:${t.sendBtnRadiusPx}px;\">send icon</button>`,
          "    </div>",
          "  </div>",
          "</div>",
          "```",
          "",
          "### 3.2 States\uff08\u4ea4\u4e92\u72b6\u6001\u673a\uff09",
          "",
          "| \u72b6\u6001 | \u89e6\u53d1\u6761\u4ef6 | SendButton \u80cc\u666f | \u56fe\u6807\u5904\u7406 | \u8f93\u5165\u533a\u989c\u8272 |",
          "| --- | --- | --- | --- | --- |",
          `| **Default\uff08\u7a7a\u6001\uff09** | value \u4e3a\u7a7a | ${mdToken("sendBtnBgDisabled", t.sendBtnBgDisabled)} | \u539f\u8272\u56fe\u6807 | placeholder \u8272 ${mdToken("textColorPlaceholder", t.textColorPlaceholder)} |`,
          `| **Typing\uff08\u6709\u5185\u5bb9\uff09** | value \u975e\u7a7a | ${mdToken("sendBtnBgEnabled", t.sendBtnBgEnabled)} | \u4f7f\u7528\u56fe\u6807\u5e93 send icon\uff08\u7981\u6b62\u4f9d\u8d56 filter \u5f3a\u5236\u53cd\u8272\uff09 | ${mdToken("textColorValue", t.textColorValue)} |`,
          `| **Hover\uff08\u56fe\u6807\u6309\u9215\uff09** | mouseenter | \u53e0\u52a0 ${mdToken("hoverFill", t.hoverFill)} | \u2014 | \u2014 |`,
          `| **Focus** | \u83b7\u5f97\u7126\u70b9 | \u2014 | \u2014 | outline: 1px solid ${mdToken("focusRing", t.focusRing)} |`,
          `| **RecoPanel \u663e\u793a** | \u6709\u63a8\u8350\u6570\u636e\u4e14\u672a\u5173\u95ed | \u2014 | \u2014 | \u63a8\u8350\u9762\u677f\u5728 InputCard \u5185\u6700\u9876\u90e8 |`,
          `| **RecoItem Hover** | hover \u63a8\u8350\u6761\u76ee | \u2014 | \u2014 | item bg \u2192 ${mdToken("recoItemBgHover", t.recoItemBgHover)}\uff1bTooltip \u51fa\u73b0 |`,
          "| **StatusRow \u6587\u6848** | \u57fa\u4e8e\u5f53\u524d\u804a\u5929\u4e0a\u4e0b\u6587 | \u2014 | \u52a8\u6001\u751f\u6210\uff0c\u9ed8\u8ba4\u4e0d\u8d85\u8fc7 20 \u5b57 | \u2014 |",
          "",
          "### 3.3 Component-Specific Tokens\uff08\u4ec5\u672c\u7ec4\u4ef6\u4f7f\u7528\uff09",
          "",
          `- \u56fe\u6807\u5c3a\u5bf8\u56fa\u5b9a\uff1aiconSizePx = ${t.iconSizePx}px\uff0c**\u4e0d\u5f97\u6539\u53d8**\u3002`,
          "- \u5de5\u5177\u680f/\u8bdd\u672f\u63a8\u8350\u56fe\u6807\uff1a**\u5fc5\u987b** \u901a\u8fc7\u56fe\u6807\u5e93 `getIcon(name)` \u5f15\u7528\uff08AIInput \u5206\u7c7b\uff0c\u8d44\u6e90\u4e3a `hiai icon svg/` \u5185 SVG\uff09\u3002",
          "",
          "```",
          `motion \u5c42\uff08\u975e\u56fe\u6807\u5e93\uff09: ${AI_INPUT_ASSETS.motionPng}`,
          "magic-wand  : getIcon(\"magic-wand\")",
          "smile       : getIcon(\"IconFaceSmileStroked\")",
          "image       : getIcon(\"image-01-stroked\")",
          "underline   : getIcon(\"underline-01-stroked\")",
          "bold        : getIcon(\"bold-01-stroked\")",
          "ol          : getIcon(\"icon_order-list_outlined\")",
          "ul          : getIcon(\"icon_disorder-list_outlined\")",
          "link        : getIcon(\"link-03-stroked\")",
          "palette     : getIcon(\"palette-stroked\")",
          "send        : getIcon(\"hiai-send-stroked\")",
          "reco-close  : getIcon(\"hiai-x-close-stroked\")",
          "reco-refresh: getIcon(\"refresh\")",
          "reco-copy   : getIcon(\"IconCopyStroked2\")",
          "reco-send   : getIcon(\"hiai-send-stroked\")",
          "```",
          "",
          "---",
          "",
          "## \u00a74 Layout & Composition Logic\uff08\u5e03\u5c40\u4e0e\u7ec4\u5408\u903b\u8f91\uff09",
          "",
          "### 4.1 Container Rules\uff08\u5bb9\u5668\u89c4\u5219\uff09",
          "",
          "- **\u5bbd\u5ea6**\uff1a`width: 100%`\uff0c\u968f\u7236\u5bb9\u5668\u6491\u6ee1\uff0c**\u7981\u6b62\u8bbe\u5b9a max-width**\u3002",
          `- **\u9ad8\u5ea6**\uff1a\u968f\u5185\u5bb9\u81ea\u9002\u5e94\uff08\u7981\u6b62\u56fa\u5b9a\u9ad8\u5ea6\uff09\uff1bTextArea \u6700\u5c0f\u9ad8\u5ea6 = textLineHeightPx \u00d7 2 = ${t.textLineHeightPx * 2}px\u3002`,
          "- **\u6ea2\u51fa**\uff1aOuterShell \u5fc5\u987b `overflow: hidden`\uff08\u4fdd\u8bc1\u52a8\u6548\u5c42\u88ab\u5706\u89d2\u88c1\u5207\uff09\u3002",
          "",
          "### 4.2 Alignment\uff08\u5bf9\u9f50\uff09",
          "",
          "- OuterShell \u5185\u5b50\u5143\u7d20\uff1a`flex-direction: column; align-items: flex-start`",
          "- ActionsRow\uff1a`display: flex; align-items: center`\uff1b\u5de6\u4fa7\u56fe\u6807\u7ec4 `flex: 1`\uff1bSendButton `flex-shrink: 0`",
          "- RecoHeader\uff1a`display: flex; align-items: center`\uff1b\u5de6\u4fa7 Title `flex: 1`\uff1b\u53f3\u4fa7 Actions `flex-shrink: 0`",
          "",
          "### 4.3 Responsive Behavior\uff08\u54cd\u5e94\u5f0f\uff09",

        const blocks = PLATFORM_SKILL_BUSINESS_SECTIONS.map((sec) => sec.build(r(tokenBag[sec.tokenKey])));

      }

      function getIn(obj, path) {
        return path.split(".").reduce((acc, key) => (acc == null ? acc : acc[key]), obj);
      }

      function setIn(obj, path, value) {
        const keys = path.split(".");
        const root = Array.isArray(obj) ? obj.slice() : { ...obj };
        let cur = root;
        for (let i = 0; i < keys.length - 1; i++) {
          const k = keys[i];
          const next = cur[k];
          cur[k] = Array.isArray(next) ? next.slice() : { ...(next || {}) };
          cur = cur[k];
        }
        cur[keys[keys.length - 1]] = value;
        return root;
      }

      function parseMaybeNumber(v) {
        if (typeof v !== "string") return v;
        const trimmed = v.trim();
        if (trimmed === "") return v;
        const n = Number(trimmed);
        return Number.isFinite(n) ? n : v;
      }

      function deepClone(v) {
        try {
          return structuredClone(v);
        } catch {
          return JSON.parse(JSON.stringify(v));
        }
      }

      function ColorSwatch({ value }) {

          </div>

      }

        const resolved = resolveFoundationColor(value, palette || {});
        const isRef = typeof value === "string" && value.startsWith("semi-");

        const specialColors = [

      function TokenField({ label, path, value, type, onChange, onHoverChange, palette }) {
        const inputBase =
          "h-[30px] px-[8px] bg-[#ffffff] border border-[rgba(45,66,107,0.12)] rounded-[7px] text-[#222727] outline-none focus:ring-1 focus:ring-black w-full";

            try {
              await window.__ENSURE_ICON_LIB_ALL__?.();
              if (!alive) return;
              // force re-render by touching state (query unchanged)
              setIconQuery((q) => q);

          function onDocDown(e) {
            const el = e.target;
            const root = document.querySelector(`[data-icon-field-root="${safeCssEscape(path)}"]`);
            if (!root) return;
            if (root.contains(el)) return;
            setIconOpen(false);
          }
          document.addEventListener("mousedown", onDocDown, true);
          return () => {
            alive = false;
            document.removeEventListener("mousedown", onDocDown, true);
          };

                            </div>
                          </>
                        );
                      })()}
                    </div>
                  </div>
                ) : null}
              </div>
            ) : type === "color" ? (
              <FoundationColorPicker
                value={value}
                palette={palette || {}}

            ) : type === "css-color" ? (
              <div className="flex items-center gap-[6px]">
                <ColorSwatch value={value} />
                <input className={cx(inputBase, mono, "flex-1")} value={String(value ?? "")} onChange={(e) => onChange(e.target.value)} />
              </div>
            ) : (
              <input className={cx(inputBase, mono)} value={String(value ?? "")} onChange={(e) => onChange(e.target.value)} />
            )}
          </div>
        );

            <div className="p-[16px] flex-1 overflow-auto flex flex-col gap-[16px]">
              {(sections || []).map((sec) => (
                <div key={sec.title} className="flex flex-col gap-[12px]">
                  <div className="text-[12px] font-bold text-[#222727]">{sec.title}</div>

      async function loadIconLibraryManifest() {

          return await res.json();

        }
      }

      async function loadIconLibraryCategory(file) {
        const url = resolveAssetUrl(`./icon-library/${file}`);
        try {
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) throw new Error(String(res.status));
          return await res.json();
        } catch {
          const key = String(file || "").replace(/\\.json$/i, "");
          return ICON_LIBRARY_INLINE.categories?.[key] || { icons: [] };
        }

      window.__ICON_LIBRARY__ = window.__ICON_LIBRARY__ || { byName: Object.create(null) };
      window.getIcon = window.getIcon || ((name) => window.__ICON_LIBRARY__?.byName?.[String(name || "")] || null);

      // Preload minimal icon set so other components can render icons
      // even if the user hasn't opened the Icon Library tab yet.
      (async () => {
        try {
          const dict = window.__ICON_LIBRARY__?.byName;
          if (!dict) return;
          for (const file of ["AIInput.json", "AIIcons.json", "FusionWorkbench.json", "Development.json", "HiAI-Interface.json"]) {
            const data = await loadIconLibraryCategory(file);
            (data?.icons || []).forEach((ic) => {
              if (ic?.name) dict[String(ic.name)] = ic;
            });
          }
        } catch {}
      })();

      window.__ENSURE_ICON_LIB_ALL__ =
        window.__ENSURE_ICON_LIB_ALL__ ||
        (async () => {
          if (window.__ICON_LIBRARY__?._allLoaded) return;
          if (window.__ICON_LIBRARY__?._allLoading) return window.__ICON_LIBRARY__._allLoading;
          const p = (async () => {
            try {
              const manifest = await loadIconLibraryManifest();
              const files = (manifest?.categories || []).map((c) => c.file).filter(Boolean);
              for (const f of files) {
                const data = await loadIconLibraryCategory(f);
                (data?.icons || []).forEach((ic) => {
                  if (ic?.name) window.__ICON_LIBRARY__.byName[String(ic.name)] = ic;
                });
              }
              window.__ICON_LIBRARY__._allLoaded = true;
            } catch {}
          })();
          window.__ICON_LIBRARY__._allLoading = p;
          return p;

      function insetClassToStyle(insetCls) {
        // inset-[top_right_bottom_left] (underscore-separated), supports 1/2/3/4 values like CSS shorthand.
        const raw = String(insetCls || "");
        const m = raw.match(/^inset-\[(.*)\]$/);
        if (!m) return { inset: 0 };
        const v = String(m[1] || "").trim();
        if (!v) return { inset: 0 };
        const parts = v.split("_").map((s) => s.trim()).filter(Boolean);
        const [a, b, c, d] = parts;
        if (parts.length === 1) return { top: a, right: a, bottom: a, left: a };
        if (parts.length === 2) return { top: a, right: b, bottom: a, left: b };
        if (parts.length === 3) return { top: a, right: b, bottom: c, left: b };
        if (parts.length >= 4) return { top: a, right: b, bottom: c, left: d };
        return { inset: 0 };

        priA: "#0f6d5f",
        sec: "#222727",
        secH: "#000000",
        secA: "#000000",
        white: "#ffffff",
        bdr: "rgba(45,66,107,0.12)",
        t1: "rgba(34,39,39,0.8)",
        t0: "#222727",
        disBg: "#e6e7ea",
        disTx: "rgba(34,39,39,0.35)",
        f0: "rgba(83,96,143,0.07)",
        f1: "rgba(83,96,143,0.12)",
      };

      function hiuiToolbarIconButtonStyle({ group, variant, state, size, chrome }) {
        const C = HIUI_BTN_CHROME;
        const isSm = size === "small";
        const h = isSm ? 24 : 36;
        const padX = isSm ? 4 : 8;
        const padY = isSm ? 4 : 8;
        const radius = 8;
        const applyChrome = (base) => {
          const next = { ...base };
          if (chrome && typeof chrome === "object") {
            if (chrome.radiusPx != null) next.radius = chrome.radiusPx;
            if (chrome.heightPx != null) next.h = chrome.heightPx;
            if (chrome.padXPx != null) next.padX = chrome.padXPx;
            if (chrome.padYPx != null) next.padY = chrome.padYPx;
            if (chrome.border !== undefined) next.border = chrome.border;
            if (chrome.bgByState && Object.prototype.hasOwnProperty.call(chrome.bgByState, state)) {
              next.bg = chrome.bgByState[state];
            }
          }
          return next;
        };

        if (state === "disabled") {
          if (group === "light") {
            return applyChrome({ bg: C.disBg, border: `1px solid ${C.bdr}`, radius, h, padX, padY });
          }
          return applyChrome({ bg: "transparent", border: "none", radius, h, padX, padY });
        }

        if (group === "solid") {
          let bg = variant === "primary" ? C.pri : C.sec;
          if (state === "hover") bg = variant === "primary" ? C.priH : C.secH;
          else if (state === "active") bg = variant === "primary" ? C.priA : C.secA;
          return applyChrome({ bg, border: "none", radius, h, padX, padY });
        }

        if (group === "light") {
          let bg = C.white;
          const border = `1px solid ${C.bdr}`;
          if (variant === "primary") {
            if (state === "hover") bg = C.f0;
            else if (state === "active") bg = C.f1;
          } else {
            if (state === "hover") bg = C.f0;
            else if (state === "active") bg = C.f1;
          }
          return applyChrome({ bg, border, radius, h, padX, padY });
        }

        let bg = "transparent";
        const border = "none";
        if (variant === "primary") {
          if (state === "hover") bg = C.f0;
        } else {
          if (state === "hover") bg = C.f0;
        }
        return applyChrome({ bg, border, radius, h, padX, padY });
      }

      function HiuiToolbarIconButton({ group, variant, size, title, onClick, disabled, fontFamily, children, className, chrome }) {
        const [st, setSt] = useState("default");
        const eff = disabled ? "disabled" : st;
        const s = hiuiToolbarIconButtonStyle({
          group,
          variant,
          state: eff,
          size: size || "small",
          chrome,
        });
        return (
          <button
            type="button"
            title={title}
            disabled={!!disabled}
            onClick={onClick}
            onMouseEnter={() => !disabled && setSt("hover")}
            onMouseLeave={() => !disabled && setSt("default")}
            onMouseDown={() => !disabled && setSt("active")}
            onMouseUp={() => !disabled && setSt("hover")}
            onBlur={() => setSt("default")}
            className={cx(
              "inline-flex items-center justify-center shrink-0 box-border outline-none",
              disabled ? "cursor-not-allowed" : "cursor-pointer",
              !disabled && "focus-visible:ring-2 focus-visible:ring-[#24cda5]/45 focus-visible:ring-inset",
              className,

            style={{
              fontFamily: fontFamily || HIUI_BUTTON_TOKENS.fontFamily,
              backgroundColor: s.bg,
              border: s.border,
              borderRadius: s.radius,
              minHeight: s.h,
              height: s.h,
              padding: `${s.padY}px ${s.padX}px`,
            }}
          >
            {children}
          </button>
        );
      }

      /** HiUI 按钮展示：色值与尺寸自 Figma node 187:846（get_design_context） */

        function appearance(group, variant, state, content, size) {

          } else if (group === "borderless") {

          if (state === "loading") {

                spinColor = C.pri;
              } else {
                color = C.t1;
                spinColor = C.t1;
              }
            } else if (group === "borderless") {
              if (variant === "primary") {
                color = C.pri;
                spinColor = C.pri;

                color = C.t1;
                spinColor = C.t1;
              }

              if (variant === "text") {

                spinColor = C.t1;
              } else {
                color = C.pri;
                spinColor = C.pri;
              }
            }
            if (content === "label") minW = isSm ? 68 : 76;
          }

          return {
            bg,
            color,
            border,
            iconColor,
            spinColor,
            minW,
            w,
            h: boxH,
            padX: boxPadX,
            padY: boxPadY,

            radius,

        function HiuiPlusGlyph({ color }) {

        function Cell({ group, variant, state, content, size }) {
          const a = appearance(group, variant, state, content, size);

      /** 会话列表 — Figma 6760:68494（展开）、6190:93899（纯头像收起）；头像用 conversation-list-assets，图标走图标库 + hiaiSvgUrl */

        useEffect(() => {
          let alive = true;
          (async () => {
            try {
              setErr("");
              setLoading(true);
              const m = await loadIconLibraryManifest();
              if (!alive) return;
              const cats = m?.categories || [];
              const next = [];
              const dict = window.__ICON_LIBRARY__?.byName;
              for (const c of cats) {
                if (!c?.file) continue;
                try {
                  const data = await loadIconLibraryCategory(c.file);
                  if (!alive) return;
                  let list = data?.icons || [];
                  if (!list.length && c.id) {
                    try {
                      const r = await fetch(resolveAssetUrl("./icon-library-data.json"), { cache: "no-store" });
                      if (r.ok) {
                        const agg = await r.json();
                        const extra = agg?.categories?.[c.id];
                        if (Array.isArray(extra) && extra.length) list = extra.slice();
                      }
                    } catch {}
                  }
                  next.push({ id: c.id, label: c.label || c.id, icons: list });
                  if (dict) {
                    list.forEach((ic) => {
                      if (ic?.name) dict[String(ic.name)] = ic;
                    });
                  }
                } catch {
                  if (!alive) return;
                  next.push({ id: c.id, label: c.label || c.id, icons: [] });
                }
              }
              if (!alive) return;
              setSections(next);
            } catch (e) {
              if (!alive) return;
              setErr(String(e?.message || e));
            } finally {
              if (alive) setLoading(false);
            }
          })();
          return () => {
            alive = false;
          };
        }, []);

      /**

      function SmartSummaryCard({

        const computedTags = useMemo(() => {

        function pushToast(next) {
          setToast(next);

          pushToast._t = window.setTimeout(() => setToast(null), 1600);
        }
        
        async function handleCopy() {
          if (disabled || state !== "ready") return;
          const text = (items || []).join("\\n");
          try {
            await navigator.clipboard.writeText(text);
            pushToast({ type: "success", text: "已复制" });
            onCopy?.(text);
          } catch (e) {
            pushToast({ type: "danger", text: "复制失败" });
          }
        }
        
        function handleRefresh() {
          if (disabled) return;
          pushToast({ type: "success", text: "已触发刷新" });
          onRefresh?.();
        }
        
        function handleRetry() {
          if (disabled) return;
          pushToast({ type: "success", text: "已重试" });
          onRetry?.();
        }
        
        function handleFeedback(next) {
          if (disabled || state !== "ready") return;
          const v = feedback === next ? null : next;

        const isInteractive = !disabled;
        const isBusy = state === "loading";
        const isError = state === "error";
        const isEmpty = state === "empty";
        
        const t = tokens || SMART_SUMMARY_TOKENS;
        const gradientStopPct =
          measuredH > 0 && measuredH < t.gradientThresholdPx ? t.gradientStopSmallPct : t.gradientStopLargePct;
        const containerGradient =
          `linear-gradient(180deg, rgba(255,255,255,0) 0%, #ffffff ${gradientStopPct}%), ` +
          `linear-gradient(${t.gradientAngleDeg}deg, ${t.gradient2}), ` +
          "linear-gradient(90deg, #ffffff 0%, #ffffff 100%)";
        const hl = (key) =>
          highlightTarget === key ? `ring-2 ring-[${t.focusRing}] ring-offset-2 ring-offset-[rgba(255,255,255,0.75)]` : "";
        
        const outer = cx(
          // 宽度：自适应撑满父容器
          `relative w-full rounded-[${t.radiusOuterPx}px] border border-[${t.borderOuter}] p-[${t.paddingOuterPx}px] flex flex-col gap-[${t.gapOuterPx}px]`,
          disabled && "opacity-60 cursor-not-allowed",
        );
        
        useEffect(() => {
          const el = containerRef.current;
          if (!el || typeof ResizeObserver === "undefined") return;
          const ro = new ResizeObserver((entries) => {
            const box = entries?.[0]?.contentRect;
            if (!box) return;
            setMeasuredH(box.height);
          });
          ro.observe(el);
          return () => ro.disconnect();
        }, []);
        
        return (
          <section
            ref={containerRef}
            className={cx(outer, "bg-[#ffffff]")}
            style={{ backgroundImage: containerGradient }}
            aria-busy={isBusy ? "true" : "false"}
            aria-disabled={disabled ? "true" : "false"}

                    "px-[10px] py-[6px] rounded-[8px] text-xs border",

                  aria-live="polite"

            {/* Header */}

                      "h-[24px] w-[24px] rounded-[6px] p-[4px] flex items-center justify-center transition-colors",

                      "outline-none focus:ring-1 focus:ring-black",
                      (!isInteractive || isBusy) && "pointer-events-none opacity-60",

                      "outline-none focus:ring-1 focus:ring-black",
                      (!isInteractive || isBusy) && "pointer-events-none opacity-60",
                    )}
                    aria-label="刷新摘要"
                    onClick={handleRefresh}
                    disabled={!isInteractive || isBusy}
                  >
                    {renderIconFromLibrary({
                      name: t.iconRefreshName || "refresh",
                      size: t.iconSize,
                      fallbackUrl: hiaiSvgUrl("refresh-ccw-02-stroked.svg"),
                      fallbackInset: "inset-[8.33%_8.33%_8.33%_4.17%]",

                  </button>

                  aria-expanded={collapsed ? "false" : "true"}
                  aria-controls={panelId}
                  onClick={() => {
                    if (!isInteractive) return;
                    setCollapsed((v) => !v);
                  }}
                  disabled={!isInteractive}
                >
                  <IconChevronUp
                    className={cx(
                      `size-[${t.iconSize}px] text-[${t.iconNeutral}] transition-transform`,
                      collapsed && "rotate-180",
                    )}
                  />
                </button>
              </div>
            </div>
            
            {/* Body */}

                "w-full rounded-[6px] border border-[rgba(255,255,255,0)] bg-[rgba(255,255,255,0)]",

                hl("body"),

              {isBusy ? (

                  <ShimmerLine delay="0.18s" />
                  <div className="flex gap-[8px] pt-[8px]">
                    <ShimmerLine w="w-[84px]" delay="0.32s" />
                    <ShimmerLine w="w-[64px]" delay="0.44s" />
                    <ShimmerLine w="w-[92px]" delay="0.56s" />

              ) : isError ? (
                <div className="flex items-start justify-between gap-[12px]">

                    <div className="text-[12px] leading-[16px] text-[rgba(34,39,39,0.6)]">

                  <button
                    type="button"

                  <button

            </div>
            
            {/* Footer: tags + feedback + updatedAt
                需求：收起时仅显示 Header；Footer 仅展开时显示 */}

                            ? `bg-[${t.tag.tones.pink.bg}] text-[${t.tag.tones.pink.fg}]`
                            : tag.tone === "teal"
                              ? `bg-[${t.tag.tones.teal.bg}] text-[${t.tag.tones.teal.fg}]`

                        )}

                  </div>

                  <div />

                <div className="flex items-center gap-[10px] shrink-0">
                  {showActions?.feedback ? (
