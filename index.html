                          "h-[24px] w-[24px] rounded-[6px] p-[4px] flex items-center justify-center transition-colors",
                          isInteractive && "hover:bg-[rgba(83,96,143,0.07)] active:opacity-90",
                          feedback === "up" && "bg-[rgba(62,179,70,0.12)]",
                          "outline-none focus:ring-1 focus:ring-black",
                          (!isInteractive || isBusy || state !== "ready") && "pointer-events-none opacity-60",
                        )}
                        aria-label="反馈：有帮助"
                        onClick={() => handleFeedback("up")}
                        disabled={!isInteractive || isBusy || state !== "ready"}
                      >
                        <IconThumbUp className={cx("size-[16px]", feedback === "up" ? "text-[#3eb346]" : "text-[rgba(34,39,39,0.75)]")} />
                      </button>
                      <button
                        type="button"
                        className={cx(
                          "h-[24px] w-[24px] rounded-[6px] p-[4px] flex items-center justify-center transition-colors",
                          isInteractive && "hover:bg-[rgba(83,96,143,0.07)] active:opacity-90",
                          feedback === "down" && "bg-[rgba(247,67,49,0.12)]",
                          "outline-none focus:ring-1 focus:ring-black",
                          (!isInteractive || isBusy || state !== "ready") && "pointer-events-none opacity-60",
                        )}
                        aria-label="反馈：无帮助"
                        onClick={() => handleFeedback("down")}
                        disabled={!isInteractive || isBusy || state !== "ready"}
                      >
                        <IconThumbDown className={cx("size-[16px]", feedback === "down" ? "text-[#f74331]" : "text-[rgba(34,39,39,0.75)]")} />
                      </button>
                    </div>
                  ) : null}
                </div>
              </div>
            ) : null}
          </section>
        );
      }

      const AGENT_STATUS_SUMMARY_FLAGS = ["标签", "标签"];
      const AGENT_STATUS_SUMMARY_ROWS = [
        {
          label: "问题诉求",
          value: "用户反馈 dou+ 投放显示异常，对处理结果存疑，称只接到一次电话却被告知多次联系，并询问某视频能否发布，希望通过电话联系告知处理结果。",
        },
        {
          label: "服务历程",
          value: "2025 年 7 月 1 日 14:32 系统创建工单，14:33 工单转交至新工单 IM_安全风控_一线_BPO_抖音社区，承接人叶玲于 16:47 创建升级，16:57 得出作品可能涉嫌违反规范、暂不支持投放 DOU+ 的结论。",
        },
        {
          label: "解决方案",
          value: "7 月 1 日受理用户 dou+ 投放异常及视频发布咨询问题，升级处理组建议更换视频后重投；因用户希望电话同步处理结果，需补充外呼说明并记录工单处置结果。",
        },
      ];
      const AGENT_STATUS_PLAN_STEPS = [
        { tone: "done", title: "对工单进行问题诊断，明确处理内容", owner: "@ 方案研判 | 研判 Ryan" },
        { tone: "current", title: "结合历史服务记录，总结问题诉求与风险", owner: "@ 工单助手 Ticko" },
        { tone: "pending", title: "完成工单处理并记录工单", owner: "@ 工单助手 Ticko" },
      ];

      function AgentStatusBar({ tokens, scenario = "hosted", interactive = true, highlightTarget = null }) {
        const t = useMemo(
          () => resolveAllTokenColors({ ...AGENT_STATUS_TOKENS, ...(tokens || {}) }, FOUNDATION_COLORS_INIT),
          [tokens],
        );
        const [viewState, setViewState] = useState(scenario);
        const hi = (key) => highlightTarget === key;

        function withHighlight(key, style) {
          if (!hi(key)) return style;
          const base = style || {};
          return {
            ...base,
            boxShadow: base.boxShadow ? `${base.boxShadow}, 0 0 0 2px ${t.focusRing}` : `0 0 0 2px ${t.focusRing}`,
          };
        }

        useEffect(() => {
          setViewState(scenario);
        }, [scenario]);

        const isExpanded = viewState === "expanded" || viewState === "expandedNoPlan";
        const showPlanning = viewState === "expanded";
        const isManual = viewState === "manual";
        const isCompleted = viewState === "completed";
        const isFailed = viewState === "failed";
        const statusTone = isManual ? "manual" : isCompleted ? "completed" : "hosted";
        const rootBg = isExpanded ? t.shellExpandedGradient : t.shellBg;
        const headerText = isManual
          ? "人工客服已暂停托管"
          : isCompleted
            ? "工单已处理完成"
            : isFailed
              ? ""
              : "已完成任务规划";
        const baseTags = isManual
          ? [
              { label: "待干预", tone: "manual" },
              { label: "标签" },
              { label: "标签" },
            ]
          : [
              { label: statusTone === "completed" ? "处理完成" : "托管中", tone: statusTone },
              { label: "标签" },
              { label: "标签" },
            ];

        function maybeSet(next) {
          if (!interactive) return;
          setViewState(next);
        }

        function renderLibraryIcon(tokenKey, fallbackFile, size, inset, imgStyle) {
          return renderIconFromLibrary({
            name: t[tokenKey],
            size: size || t.actionIconSizePx,
            fallbackUrl: hiaiSvgUrl(fallbackFile),
            fallbackInset: inset || "inset-[8.33%]",
            imgStyle,
          });
        }

        function renderStatusTag(item, idx) {
          const toneBg =
            item.tone === "manual"
              ? t.manualStatusBg
              : item.tone === "completed"
                ? t.completedStatusBg
                : t.hostedStatusBg;
          const toneFg =
            item.tone === "manual"
              ? t.manualStatusFg
              : item.tone === "completed"
                ? t.completedStatusFg
                : t.hostedStatusFg;
          const isStatus = Boolean(item.tone);
          const bg = isStatus ? toneBg : t.neutralTagBg;
          const fg = isStatus ? toneFg : t.neutralTagFg;
          return (
            <div
              key={`${item.label || item.iconOnly || "tag"}-${idx}`}
              style={{
                display: "inline-flex",
                alignItems: "center",
                gap: `${t.tagIconGapPx}px`,
                padding: `${t.statusTagPadYPx}px ${item.iconOnly ? 6 : t.statusTagPadXPx}px`,
                minHeight: 20,
                borderRadius: t.statusTagRadiusPx,
                background: bg,
                color: fg,
                flexShrink: 0,
              }}
            >
              {item.icon ? (
                <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center" }}>
                  {item.icon === "clock"
                    ? renderLibraryIcon("iconClockName", "alarm-clock-stroked.svg", 12)
                    : renderLibraryIcon("iconBookmarkName", "bookmark-add-stroked2.svg", 12)}
                </span>
              ) : null}
              {item.iconOnly ? renderLibraryIcon("iconBookmarkName", "bookmark-add-stroked2.svg", 12) : null}
              {item.label ? (
                <span
                  style={{
                    fontSize: t.tagTextFontPx,
                    lineHeight: `${t.tagTextLinePx}px`,
                    whiteSpace: "nowrap",
                  }}
                >
                  {item.label}
                </span>
              ) : null}
              {item.closable ? renderLibraryIcon("iconCloseName", "x-close-stroked.svg", 12, "inset-[15.76%]") : null}
            </div>
          );
        }

        function renderTextButton({ label, iconToken, iconFile, iconAfter = false, accent = false, onClick }) {
          return (
            <button
              type="button"
              onClick={onClick}
              disabled={!interactive}
              className={cx(
                "outline-none transition-colors",
                interactive ? "cursor-pointer" : "cursor-default",
                interactive && `hover:bg-[${t.actionHoverBg}] focus-visible:ring-1 focus-visible:ring-[${t.focusRing}]`,
              )}
              style={withHighlight("agentActions", {
                display: "inline-flex",

                gap: `${t.actionGapPx}px`,
                padding: `${t.actionPadYPx}px ${t.actionPadXPx}px`,
                borderRadius: t.actionRadiusPx,

              {!iconAfter && iconToken ? renderLibraryIcon(iconToken, iconFile, t.actionIconSizePx) : null}
              <span>{label}</span>

        }

        function renderMetaRow() {
          return (

                gap: `${t.metaGapPx}px`,
                flexWrap: "wrap",

                fontSize: t.tagTextFontPx,
                lineHeight: `${t.tagTextLinePx}px`,

              <div style={{ display: "inline-flex", alignItems: "center", gap: `${t.metaIconGapPx}px`, minWidth: 0 }}>

                  style={{
                    width: 12,
                    height: 12,
                    borderRadius: 9999,
                    background: "linear-gradient(135deg, rgba(36,205,165,0.2), rgba(122,97,250,0.16))",

              <div style={{ display: "inline-flex", alignItems: "center", gap: `${t.metaIconGapPx}px`, minWidth: 0 }}>
                {renderLibraryIcon("iconFileName", "file-05-stroked.svg", t.metaIconSizePx, "inset-[4.17%_12.5%]")}

              </div>
            </div>
          );
        }

        function renderPrimaryAction(iconToken, iconFile, onClick, label) {
          return (
            <button
              type="button"
              aria-label={label}
              onClick={onClick}
              disabled={!interactive}
              className={cx(
                "outline-none transition-colors",
                interactive ? "cursor-pointer" : "cursor-default",
                interactive && `hover:bg-[${t.primaryIconBtnHoverBg}] focus-visible:ring-1 focus-visible:ring-[${t.focusRing}]`,
              )}
              style={withHighlight("agentActions", {
                width: t.primaryIconBtnSizePx,
                height: t.primaryIconBtnSizePx,
                borderRadius: t.primaryIconBtnRadiusPx,
                border: "none",
                display: "inline-flex",
                alignItems: "center",
                justifyContent: "center",
                background: t.primaryIconBtnBg,
                color: t.primaryIconColor,
                flexShrink: 0,
              })}
            >
              {renderIconFromLibrary({
                name: t[iconToken],
                size: 16,
                fallbackUrl: hiaiSvgUrl(iconFile),
                fallbackInset: "inset-[8.33%]",

        function renderExpandedSummary() {
          return (
            <div style={withHighlight("agentSummary", { display: "flex", flexDirection: "column", gap: `${t.cardSectionGapPx}px`, width: "100%" })}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <span
                  style={{
                    fontSize: 12,
                    lineHeight: "16px",
                    fontWeight: 600,
                    backgroundImage: t.summaryTitleGradient,
                    WebkitBackgroundClip: "text",
                    backgroundClip: "text",
                    color: "transparent",
                    whiteSpace: "nowrap",

                  工单总结
                </span>
                <div style={{ display: "flex", alignItems: "center", gap: `${t.tagGapPx}px`, flexWrap: "wrap", marginLeft: "auto" }}>
                  {AGENT_STATUS_SUMMARY_FLAGS.map((flag, idx) => renderStatusTag({ label: flag }, idx))}
                </div>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: `${t.summaryParagraphGapPx}px` }}>
                {AGENT_STATUS_SUMMARY_ROWS.map((row) => (
                  <div key={row.label} style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                    <div
                      style={{
                        width: t.summaryLabelWidthPx,
                        flexShrink: 0,
                        fontSize: 12,
                        lineHeight: "16px",
                        fontWeight: 600,
                        color: t.summaryLabelColor,
                        whiteSpace: "nowrap",
                      }}
                    >
                      {row.label}
                    </div>
                    <div
                      style={{
                        flex: 1,
                        minWidth: 0,
                        fontSize: 12,
                        lineHeight: "16px",
                        color: t.summaryBodyColor,

                    >
                      {row.value}
                    </div>
                  </div>

              </div>
            </div>
          );
        }

        function renderPlanningStep(step, idx) {
          const isCurrent = step.tone === "current";
          const isDone = step.tone === "done";
          return (
            <div key={`${step.title}-${idx}`} style={{ display: "flex", gap: 8, width: "100%" }}>
              <div style={{ width: 16, display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 2 }}>
                <span
                  style={{
                    width: t.planningNodeSizePx,
                    height: t.planningNodeSizePx,
                    borderRadius: 9999,
                    boxSizing: "border-box",
                    background: isDone ? t.planningDoneBg : isCurrent ? t.planningCurrentBg : t.planningPendingBg,
                    border: `1px solid ${isDone ? t.planningDoneFg : isCurrent ? t.planningCurrentRing : t.planningLineColor}`,
                    boxShadow: isCurrent ? `0 0 0 3px ${t.planningCurrentRing}` : "none",
                    display: "inline-flex",
                    alignItems: "center",
                    justifyContent: "center",
                    flexShrink: 0,

                >
                  <span
                    style={{
                      width: 6,
                      height: 6,
                      borderRadius: 9999,
                      background: isDone ? t.planningDoneFg : isCurrent ? t.accentTextColor : "rgba(34,39,39,0.35)",
                    }}

        const colorSections = Object.entries(palette).map(([family, shades]) => {

          "",

          "## 5. 圆角（Border Radius）",

          "",
          "| Token | 数值 | 语义 |",

          "---",
          "",
          "## 6. 使用规范",

            if (p.startsWith("card")) return "inputCard";
            if (p.startsWith("text")) return "textArea";
            if (p.startsWith("reco")) return "replyRecommend";
            if (p.startsWith("actions") || p.startsWith("icon") || p.startsWith("send")) return "actionsRow";
            if (p === "hoverFill") return "actionsRow";
            if (p === "focusRing") return "inputCard";
            return "inputCard";
          }

          if (panelComponentId === "hiuiButton") {
            if (p === "previewBg" || p === "captionColor" || p === "fontFamily" || p === "componentName") return "hiuiBtnPreview";
            if (p === "focusRing") return "hiuiBtnPreview";
            return "hiuiBtnPreview";
          }

          if (panelComponentId === "conversationList") {
            if (p.startsWith("shell") || p === "fontFamily" || p === "componentName" || p === "focusRing") return "convShell";
            if (p.startsWith("collapsedShell") || p.startsWith("collapsedList") || p === "shellCollapseTransitionMs") return "convShell";
            if (p.startsWith("collapsedToggle")) return "convCollapsedToggle";
            if (p.startsWith("header") || p.startsWith("title")) return "convHeader";
            if (p.startsWith("listScroll")) return "convScroll";
            return "convRow";
          }

          return null;
        }, [hoverTokenPath, panelComponentId]);

        function clamp(n, min, max) {
          return Math.max(min, Math.min(max, n));
        }

        const LAYOUT_PAD = 12;    // outer padding each side
        const HANDLE_W = 12;      // each drag-handle width

        function getAvailableW() {
          const vw = viewportW || 0;
          const asideW = showComponentAside ? asidePx : 0;

          let nHandles = 0;
          if (showComponentAside) nHandles += 1; // Aside <-> UI

          if (mainView === "business" && panelComponentId !== "iconLibrary") {
            // 业务组件视图：根据 Token/Skill 开关计算 DragHandle 数量
            if (showTokensPanel) nHandles += 1; // UI <-> Tokens
            if (showSkillPanel) {
              if (showTokensPanel) nHandles += 1; // Tokens <-> Skill
              else nHandles += 1; // UI <-> Skill
            }
          } else {
            // 图标库/其他视图：保持原有逻辑
            nHandles += (iconLibraryMidHidden ? 1 : 2);
          }

          return Math.max(0, vw - LAYOUT_PAD * 2 - asideW - HANDLE_W * nHandles);
        }

        function onDragStart(which, e) {
          e.preventDefault();
          dragRef.current = {
            active: which,
            startX: e.clientX,
            startLeft: leftPx,
            startRight: rightPx,
            startMid: midPx,
            startAside: asidePx,
          };
          window.addEventListener("pointermove", onDragMove);
          window.addEventListener("pointerup", onDragEnd, { once: true });
        }

        useEffect(() => {
          const minAside = 120; const maxAside = 260;
          const minLeft = 320; const maxLeft = 2000; // UI 面板最大设为 2000px，允许撑宽
          const minMid = 260; const maxMid = 700;
          const minRight = 280; const maxRight = 800;

          const avail = getAvailableW();
          if (!avail) return;

          // 业务组件视图：根据 Token/Skill 开关布局
          if (mainView === "business" && panelComponentId !== "iconLibrary") {
            if (!showTokensPanel && !showSkillPanel) {
              // 都关闭：UI 撑满
              let l = clamp(leftPx, minLeft, maxLeft);
              l = clamp(avail, minLeft, maxLeft);
              setLeftPx(l);
              setMidPx(0);
              setRightPx(0);
              return;
            }

            if (showTokensPanel && !showSkillPanel) {
              // 只开 Token：UI + Token
              let l = clamp(leftPx, minLeft, maxLeft);
              let m = clamp(midPx < minMid ? 380 : midPx, minMid, maxMid);
              const sum = l + m;
              if (sum !== avail) {
                m = clamp(avail - l, minMid, maxMid);
                l = clamp(avail - m, minLeft, maxLeft);
                m = clamp(avail - l, minMid, maxMid);
              }
              setLeftPx(l);
              setMidPx(m);
              setRightPx(0);
              return;
            }

            if (!showTokensPanel && showSkillPanel) {
              // 只开 Skill：UI + Skill
              let l = clamp(leftPx, minLeft, maxLeft);
              let r = clamp(rightPx < minRight ? 480 : rightPx, minRight, maxRight);
              const sum = l + r;
              if (sum !== avail) {
                r = clamp(avail - l, minRight, maxRight);
                l = clamp(avail - r, minLeft, maxLeft);
                r = clamp(avail - l, minRight, maxRight);
              }
              setLeftPx(l);
              setMidPx(0);
              setRightPx(r);
              return;
            }

            // 都开：UI + Token + Skill（原有逻辑）
            let m = clamp(midPx < minMid ? 380 : midPx, minMid, maxMid);
            let l = clamp(leftPx, minLeft, maxLeft);
            let r = clamp(rightPx, minRight, maxRight);
            const sum = l + m + r;
            if (sum !== avail) {
              r = clamp(avail - l - m, minRight, maxRight);
              if (l + m + r !== avail) m = clamp(avail - l - r, minMid, maxMid);
              if (l + m + r !== avail) l = clamp(avail - m - r, minLeft, maxLeft);
              r = clamp(avail - l - m, minRight, maxRight);
            }
            setLeftPx(l); setMidPx(m); setRightPx(r);
            return;
          }

          // 图标库/其他视图：保持原有逻辑
          if (iconLibraryMidHidden) {
            let l = clamp(leftPx, minLeft, maxLeft);
            let r = avail - l;
            r = clamp(r, minRight, maxRight);
            l = avail - r;
            l = clamp(l, minLeft, maxLeft);
            setLeftPx(l);
            setMidPx(0);
            setRightPx(r);
            return;
          }

          let m = midPx < minMid ? 380 : midPx;
          m = clamp(m, minMid, maxMid);
          let l = clamp(leftPx, minLeft, maxLeft);
          let r = clamp(rightPx, minRight, maxRight);

          const sum = l + m + r;
          if (sum === avail) return;

          r = clamp(avail - l - m, minRight, maxRight);
          if (l + m + r !== avail) m = clamp(avail - l - r, minMid, maxMid);
          if (l + m + r !== avail) l = clamp(avail - m - r, minLeft, maxLeft);
          r = clamp(avail - l - m, minRight, maxRight);

          setLeftPx(l); setMidPx(m); setRightPx(r);
        }, [viewportW, asidePx, showComponentAside, iconLibraryMidHidden, showTokensPanel, showSkillPanel, mainView, panelComponentId]);

        function onDragMove(e) {
          const d = dragRef.current;
          if (!d.active) return;
          const dx = e.clientX - d.startX;

          const minAside = 120; const maxAside = 260;
          const minLeft = 320; const maxLeft = 2000;
          const minMid = 260; const maxMid = 700;
          const minRight = 280; const maxRight = 800;
          const avail = getAvailableW();

          if (d.active === "aside") {
            const a = clamp(d.startAside + dx, minAside, maxAside);
            setAsidePx(a);
          } else if (d.active === "lr") {
            // lr 模式：UI <-> Skill（只开 Skill 或图标库）
            let l = clamp(d.startLeft + dx, minLeft, maxLeft);
            let r = avail - l;
            r = clamp(r, minRight, maxRight);
            l = avail - r;
            l = clamp(l, minLeft, maxLeft);
            setLeftPx(l);
            // 如果是业务组件且只开 Skill，不要改 midPx
            if (!(mainView === "business" && panelComponentId !== "iconLibrary")) {
              setMidPx(0);
            }
            setRightPx(r);
          } else if (d.active === "left") {
            // left 模式：UI <-> Tokens（业务组件且都开）
            if (mainView === "business" && panelComponentId !== "iconLibrary" && showTokensPanel && !showSkillPanel) {
              // 只开 Token：UI <-> Tokens
              let l = clamp(d.startLeft + dx, minLeft, maxLeft);
              let m = clamp(avail - l, minMid, maxMid);
              l = clamp(avail - m, minLeft, maxLeft);
              m = clamp(avail - l, minMid, maxMid);
              setLeftPx(l);
              setMidPx(m);
              setRightPx(0);
            } else {
              // 都开：UI <-> Tokens
              let l = clamp(d.startLeft + dx, minLeft, maxLeft);
              let m = clamp(avail - l - d.startRight, minMid, maxMid);
              l = clamp(avail - m - d.startRight, minLeft, maxLeft);
              const r = clamp(avail - l - m, minRight, maxRight);
              setLeftPx(l); setMidPx(m); setRightPx(r);
            }
          } else if (d.active === "right") {
            // right 模式：Tokens <-> Skill（业务组件且都开）
            let m = clamp(d.startMid + dx, minMid, maxMid);
            let r = clamp(avail - d.startLeft - m, minRight, maxRight);
            m = clamp(avail - d.startLeft - r, minMid, maxMid);
            const l = clamp(avail - m - r, minLeft, maxLeft);
            setLeftPx(l); setMidPx(m); setRightPx(r);
          }
        }

        function onDragEnd() {
          dragRef.current.active = null;
          window.removeEventListener("pointermove", onDragMove);
        }
        
        const DragHandle = ({ which }) => (

        const md = String(mdText || "");

        // Extract a token value by its data-token-path attribute (exact match)
        function tkn(path, fallback) {
          const safe = path.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const re = new RegExp('data-token-path="' + safe + '">([^<]+)</code>');
          const m = md.match(re);
          return m ? m[1].trim() : (fallback !== undefined ? fallback : "");
        }
        function num(path, fallback) {
          const v = parseFloat(tkn(path, ""));
          return isNaN(v) ? fallback : v;
        }
        function col(path, fallback) {
          const v = tkn(path, "");
          return v || fallback || "";
        }

        if (componentId === "smartSummary") {
          // shimmer.base is embedded in a CSS code block, not in a data-token-path attribute
          const shimBaseMatch =
            md.match(/class="shimmer" style="[^"]*background:([^;"\\]+)/) ||
            md.match(/shimmer.*?background:([rgba(#][^;\\n"]+)/s);
          const shimBase = shimBaseMatch ? shimBaseMatch[1].trim() : col("shimmer.base", "rgba(45,66,107,0.10)");
          return {
            outerRadius:      num("radiusOuterPx", 12),
            outerPadding:     num("paddingOuterPx", 12),
            titleFontSize:    num("titleFontSizePx", 12),
            titleFontWeight:  num("titleFontWeight", 600),
            bodyFontSize:     num("bodyFontSizePx", 12),
            bodyGap:          num("paragraphGap", 4),

          (componentId === "fusionWorkbench" || componentId === "hiuiButton" || componentId === "conversationList") ? "a" :
          "single";
        const [activeTab, setActiveTab] = React.useState(defaultTab);
        const [refreshTick, setRefreshTick] = React.useState(0);
        const [promptText, setPromptText] = React.useState(() => defaultSandboxSingleTestPrompt(componentId));

        React.useEffect(() => {
          setActiveTab(
            componentId === "smartSummary"  ? "ready"  :
            componentId === "formRecommend" ? "multi"  :
            componentId === "agentStatusBar" ? "hosted" :
            componentId === "imBubble" ? "im" :

            "single",

        React.useEffect(() => {
          setPromptText(defaultSandboxSingleTestPrompt(componentId));

        const v = React.useMemo(
          () => parseMdDesignValues(mdText, componentId),

          componentId === "smartSummary"

              label: "Skill 已声明固定头像 token（imAvatarPeerUrl / imAvatarSelfUrl）",
              pass:
                /data-token-path="imAvatarPeerUrl"/.test(String(mdText || "")) &&
                /data-token-path="imAvatarSelfUrl"/.test(String(mdText || "")),
            },
          ];
          if (componentId === "fusionWorkbench") return [
            { id: "f1", label: "Shell 背景色已定义", pass: Boolean(v.shellBg) },
            { id: "f2", label: "主槽圆角 > 0", pass: v.mainFrostRadiusPx > 0 },
            { id: "f3", label: "列表列宽 > 0", pass: v.listColumnWidthPx > 0 },
            { id: "f4", label: "详情卡片圆角 > 0", pass: v.detailCardRadiusPx > 0 },
            { id: "f5", label: "详情卡片内边距 > 0", pass: v.detailCardPadPx > 0 },
            { id: "f6", label: "详情卡片阴影已定义", pass: Boolean(v.detailCardShadow) },
            { id: "f7", label: "主标题字色已定义", pass: Boolean(v.textPrimary) },
            { id: "f8", label: "Focus ring 已定义", pass: Boolean(v.focusRing) },
          ];
          if (componentId === "hiuiButton") return [
            { id: "h1", label: "预览区背景 previewBg 已定义", pass: Boolean(v.previewBg) },
            { id: "h2", label: "说明文字色 captionColor 已定义", pass: Boolean(v.captionColor) },
            { id: "h3", label: "Skill 含 HiUI 按钮章节", pass: /DESIGN_SKILL — 按钮/.test(String(mdText || "")) },
          ];
          if (componentId === "conversationList") return [
            { id: "c1", label: "外壳宽度 > 0", pass: v.shellWidthPx > 0 },
            { id: "c2", label: "外壳圆角 > 0", pass: v.shellRadiusPx > 0 },
            { id: "c3", label: "外壳背景已定义", pass: Boolean(v.shellBg) },
            { id: "c4", label: "选中行背景已定义", pass: Boolean(v.rowSelectedBg) },
            { id: "c5", label: "选中左条宽度 > 0", pass: v.rowActiveBarWpx > 0 },
            { id: "c6", label: "头像尺寸 > 0", pass: v.avatarSizePx > 0 },
            { id: "c7", label: "标题字色已定义", pass: Boolean(v.titleColor) },
            { id: "c8", label: "Skill 含 shellWidthPx 标记", pass: /data-token-path="shellWidthPx"/.test(String(mdText || "")) },
          ];
          return [
            { id: "r1",  label: "外层圆角 = 12px",              pass: v.outerRadius === 12 },
            { id: "r2",  label: "外层内边距 = 12px",            pass: v.outerPadding === 12 },
            { id: "r3",  label: "输入卡片圆角 ≥ 8px",           pass: v.cardRadius >= 8 },
            { id: "r4",  label: "图标尺寸 = 16px",              pass: v.iconSize === 16 },
            { id: "r5",  label: "发送按钮高度已定义",            pass: v.sendBtnHeight > 0 },
            { id: "r6",  label: "焦点环颜色已定义",             pass: Boolean(v.focusRing) },
            { id: "r7",  label: "推荐标题渐变已定义",           pass: Boolean(v.recoTitleGrad) },
            { id: "r8",  label: "动效透明度 ∈ [0,1]",           pass: v.motionOpacity >= 0 && v.motionOpacity <= 1 },
            { id: "r9",  label: "外层背景色已定义",             pass: Boolean(v.outerBg) },
            { id: "r10", label: "输入卡片背景色已定义",          pass: Boolean(v.cardBg) },
          ];
        }, [componentId, v, mdText]);

        const passCount = checks.filter(c => c.pass).length;
        const allPass   = passCount === checks.length;

        function renderPreview() {
          if (componentId === "smartSummary")  return <SpecSmartSummary v={v} scenario={activeTab} />;
          if (componentId === "formRecommend") return <SpecFormRecommend v={v} scenario={activeTab} />;
          if (componentId === "agentStatusBar") return <SpecAgentStatusBarSandbox v={v} scenario={activeTab} />;
          if (componentId === "imBubble") return <SpecImBubble v={v} />;
          if (componentId === "fusionWorkbench") return <SpecFusionWorkbenchSandbox v={v} />;
          if (componentId === "hiuiButton") return <SpecHiuiButtonSandbox v={v} />;
          if (componentId === "conversationList") return <SpecConversationListSandbox v={v} />;
          return <SpecAiInput v={v} scenario={activeTab} />;
        }

        const compLabel =
          componentId === "smartSummary"  ? "智能摘要组件面板" :
          componentId === "formRecommend" ? "表单推荐" :
          componentId === "agentStatusBar" ? "Agent状态栏" :
          componentId === "imBubble" ? "IM气泡" :
          componentId === "fusionWorkbench" ? "融合工作台框架" :
          componentId === "hiuiButton" ? "按钮（HiUI）" :
          componentId === "conversationList" ? "会话列表" :
          "AI 输入框";

        return (
          <div
            className="fixed inset-0 flex items-center justify-center p-[12px] box-border"
            style={{ zIndex: 9999, background: "rgba(34,39,39,0.52)", backdropFilter: "blur(4px)" }}
            onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}
          >
            <style>{`
              @keyframes sandboxShimmer {
                0%   { background-position: 200% center; }
                100% { background-position: -200% center; }
              }
              @keyframes sandboxStripeFlow {
                0%, 100% { background-position: 0%   50%; }
                50%      { background-position: 100% 50%; }
              }
            `}</style>
            <div
              className="bg-[#ffffff] rounded-[16px] flex flex-col overflow-hidden min-h-0"
              style={{
                width: "min(980px, 95vw)", height: "min(820px, 92vh)", maxHeight: "92vh",
                boxShadow: "0 32px 80px rgba(34,39,39,0.22), 0 0 0 1px rgba(45,66,107,0.10)",
              }}
            >
              {/* Header */}
              <div className="flex items-center justify-between px-[24px] py-[14px] border-b border-[rgba(45,66,107,0.12)] shrink-0">
                <div className="flex flex-col gap-[3px] min-w-0 pr-[8px]">
                  <div className="flex items-center gap-[10px] flex-wrap">
                    <span className="text-[15px] font-bold text-[#222727]">单测</span>
                    <span className={cx(
                      "px-[8px] py-[2px] rounded-[99px] text-[11px] font-semibold",
                      allPass ? "bg-[rgba(0,0,0,0.07)] text-black" : "bg-[rgba(233,30,99,0.10)] text-[#c0174a]",
                    )}>
                      {passCount} / {checks.length} 项通过
                    </span>
                    <span className="text-[12px] text-[rgba(34,39,39,0.45)]">— {compLabel}</span>
                  </div>
                  <div className="text-[12px] text-[rgba(34,39,39,0.45)] leading-[18px]">
                    下方预览按 Skill Markdown 解析还原 UI 参数；右侧校验约束是否可追溯。顶部 Prompt 供复制到外部模型，检验从 0 到 1 生成是否与规范一致。
                  </div>
                </div>
                <button
                  type="button"
                  className="flex items-center justify-center w-[30px] h-[30px] rounded-[8px] hover:bg-[rgba(83,96,143,0.09)] text-[rgba(34,39,39,0.4)] text-[20px] font-light outline-none focus:ring-1 focus:ring-black shrink-0"
                  onClick={onClose} aria-label="关闭单测"
                >×</button>
              </div>

              {/* 单测 Prompt：对外部 LLM 的指令模板（站内预览仍只读 Skill 解析） */}
              <div className="shrink-0 px-[24px] py-[12px] border-b border-[rgba(45,66,107,0.08)] bg-[rgba(83,96,143,0.03)]">
                <div className="flex items-center justify-between gap-[12px] mb-[8px]">
                  <span className="text-[11px] font-semibold text-[rgba(34,39,39,0.45)] tracking-wide">单测 Prompt（可编辑 · 可复制）</span>
                  <button
                    type="button"
                    className="h-[28px] px-[12px] rounded-[6px] text-[12px] font-semibold bg-black text-white hover:opacity-90 active:opacity-80 outline-none focus:ring-1 focus:ring-black shrink-0"
                    onClick={() => setRefreshTick((t) => t + 1)}
                  >重新单测</button>
                </div>
                <textarea
                  value={promptText}
                  onChange={(e) => setPromptText(e.target.value)}
                  className="w-full min-h-[76px] max-h-[160px] resize-y rounded-[8px] border border-[rgba(45,66,107,0.14)] px-[12px] py-[8px] text-[12px] leading-[18px] text-[#222727] bg-white outline-none focus:ring-1 focus:ring-black box-border"
                  spellCheck={false}
                />
                <div className="text-[11px] text-[rgba(34,39,39,0.42)] mt-[6px] leading-[16px]">
                  Prompt 不参与站内解析；修改 Token 或 Skill 正文后可点「重新单测」刷新左侧预览与右侧校验。
                </div>
              </div>

              {/* Body */}
              <div className="flex flex-1 min-h-0 overflow-hidden">
                {/* Left: Spec-driven preview */}
                <div className="flex-1 flex flex-col overflow-hidden border-r border-[rgba(45,66,107,0.10)]">
                  <div className="flex items-center gap-[4px] px-[16px] py-[10px] border-b border-[rgba(45,66,107,0.08)] shrink-0" style={{ background: "rgba(83,96,143,0.025)" }}>
                    <span className="text-[11px] font-semibold text-[rgba(34,39,39,0.4)] mr-[6px]">数据场景</span>
                    {scenarios.map(s => (
                      <button
                        key={s.id} type="button"
                        className={cx(
                          "px-[10px] h-[26px] rounded-[6px] text-[12px] font-medium transition-colors outline-none focus:ring-1 focus:ring-black",
                          activeTab === s.id ? "bg-black text-[#ffffff]" : "text-[rgba(34,39,39,0.65)] hover:bg-[rgba(83,96,143,0.08)]",
                        )}
                        onClick={() => setActiveTab(s.id)}
                      >{s.label}</button>
                    ))}
                  </div>
                  <div className="flex-1 overflow-auto p-[28px]" style={{ background: "rgba(83,96,143,0.025)" }}>
                    <div className="max-w-[500px] mx-auto">
                      <div className="flex items-center gap-[6px] mb-[14px]">
                        <div className="w-[6px] h-[6px] rounded-full" style={{ background: "#000000" }} />
                        <span className="text-[11px] text-[rgba(34,39,39,0.4)] font-medium tracking-wide">
                          Skill 驱动生成 · {scenarios.find(s => s.id === activeTab)?.label}
                        </span>
                      </div>
                      {renderPreview()}
                    </div>
                  </div>
                </div>

                {/* Right: Validation checklist */}
                <div className="w-[268px] flex flex-col overflow-hidden shrink-0">
                  <div className="px-[16px] py-[10px] border-b border-[rgba(45,66,107,0.08)] shrink-0" style={{ background: "rgba(83,96,143,0.025)" }}>
                    <span className="text-[11px] font-semibold text-[rgba(34,39,39,0.4)] tracking-wide">Skill 内容校验</span>
                  </div>
                  <div className="flex-1 overflow-auto p-[12px] flex flex-col gap-[4px]">
                    {checks.map(check => (
                      <div
                        key={check.id}
                        className={cx(
                          "flex items-start gap-[8px] px-[10px] py-[8px] rounded-[8px]",
                          check.pass ? "bg-[rgba(0,0,0,0.04)]" : "bg-[rgba(233,30,99,0.07)]",
                        )}
                      >
                        <span className="shrink-0 text-[13px] leading-[18px]">{check.pass ? "✅" : "❌"}</span>
                        <span className={cx("text-[12px] leading-[18px]", check.pass ? "text-[rgba(34,39,39,0.7)]" : "text-[#c0174a]")}>
                          {check.label}
                        </span>
                      </div>
                    ))}
                  </div>
                  <div className={cx(
                    "px-[16px] py-[13px] border-t border-[rgba(45,66,107,0.12)] shrink-0",
                    allPass ? "bg-[rgba(0,0,0,0.04)]" : "bg-[rgba(233,30,99,0.05)]",
                  )}>
                    <div className={cx("text-[12px] font-semibold", allPass ? "text-black" : "text-[#c0174a]")}>
                      {allPass ? "✅ Skill 约束完整，可配合单测 Prompt 做外部生成对照" : `❌ Skill 中有 ${checks.length - passCount} 项约束缺失或异常`}
                    </div>
                    <div className="text-[11px] text-[rgba(34,39,39,0.45)] mt-[3px]">
                      {allPass ? "颜色、字体、圆角等参数已在 Markdown 中可追溯" : "请在左侧 Token 面板修正对应参数，Skill 将同步更新"}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────────────────

      ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);

      // Icon picker now uses custom grid dropdown (no datalist needed).
    </script>
    <script>
      (function () {
        function showBootHint() {
          var root = document.getElementById("root");
          if (!root || root.children.length > 0) return;
          var issues = [];
          if (!window.React) issues.push("React");
          if (!window.ReactDOM) issues.push("ReactDOM");
          if (!window.Babel) issues.push("Babel");
          if (!window.marked) issues.push("marked");
          var detail = issues.length
            ? "<p><strong>未加载的脚本：</strong>" + issues.join("、") + "。请确认在项目根目录用 HTTP 访问（勿用 file://），并检查 <code>vendor/</code> 是否完整。</p>"
            : "<p>脚本已加载，但界面未渲染。请打开开发者工具 (F12) → Console 查看报错，并尝试强制刷新（Cmd+Shift+R / Ctrl+Shift+R）。</p>";
          root.innerHTML =
            '<div style="padding:24px;max-width:640px;margin:0 auto;font:14px/1.6 system-ui,-apple-system,sans-serif;color:#222727;background:#fff;border-radius:12px;border:1px solid rgba(45,66,107,0.15)">' +
            "<h1 style=\"font-size:16px;margin:0 0 10px\">HiAI Design.MD 未能启动</h1>" +
            detail +
            "<p style=\"opacity:.65;font-size:12px;margin-top:14px\">本地示例：<code style=\"background:#f2f4f7;padding:2px 6px;border-radius:4px\">python3 -m http.server 8080</code> → 浏览器打开 <code>http://127.0.0.1:8080/index.html</code></p>" +
            "</div>";
        }
        window.addEventListener("load", function () {
          setTimeout(showBootHint, 12000);
        });
      })();
    </script>
  </body>
</html>
